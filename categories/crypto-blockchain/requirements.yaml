- id: "CRY-016"
  title: "PBKDF2 Key Derivation"
  description: "Read password, salt, and iterations (one per line). Output PBKDF2-HMAC-SHA256 derived key (32 bytes) as hex."
  difficulty: 3
  stdlib_modules: [std.crypto, std.io, std.encoding]
  input_format: "Line 1: password. Line 2: salt. Line 3: iteration count (integer)"
  output_format: "64-character lowercase hex derived key"
  test_cases:
    - input: "password\nsalt\n4096"
      expected_output: "c5e478d59288c841aa530db6845c4c8d962893a001ce4e11a4963873aa98134a"
    - input: "hello\nworld\n1000"
      expected_output: "bc2a8392e1db0a8b2609772ef81ea3a2f5a1cdb0a02095d8a2a4a9a5d7e6e2e5"
  constraints: ["Must use PBKDF2 with HMAC-SHA256", "Output 32 bytes", "Parse iteration count as integer"]

- id: "CRY-017"
  title: "Scrypt Key Derivation"
  description: "Read password and salt from stdin. Output scrypt-derived key (32 bytes) with N=16384, r=8, p=1 as hex."
  difficulty: 3
  stdlib_modules: [std.crypto, std.io, std.encoding]
  input_format: "Line 1: password. Line 2: salt"
  output_format: "64-character lowercase hex derived key"
  test_cases:
    - input: "password\nNaCl\n"
      expected_output: "a8430d7e581f9ca03c952df506ac66c757899d67a21d71c0f1900bd778ac1d14"
    - input: "test\nsalt\n"
      expected_output: "72f47a5f6bcb1b96a9d77b2c2f1463395d4a3a325fada6290fc0fef7bcddb58e"
    - input: "hello\nworld\n"
      expected_output: "112191f6cf9a48ad3d20bdb2ed4c9754ca31aebd62f5ad15cb9c5303a17063c8"
  constraints: ["N=16384, r=8, p=1", "Output 32 bytes"]

- id: "CRY-018"
  title: "Argon2id Password Hash"
  description: "Read password and salt from stdin. Output Argon2id hash with t=3, m=65536, p=4 as hex."
  difficulty: 3
  stdlib_modules: [std.crypto, std.io, std.encoding]
  input_format: "Line 1: password. Line 2: salt (must be at least 8 chars)"
  output_format: "64-character lowercase hex Argon2id derived key (32 bytes)"
  test_cases:
    - input: "password123\nsaltysalt"
      expected_output: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"
    - input: "secure\nrandomsalt"
      expected_output: "b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3"
  constraints: ["t=3, m=65536 KiB, p=4 lanes", "Output 32 bytes", "Salt must be >= 8 bytes"]

