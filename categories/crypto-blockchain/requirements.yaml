- id: "CRY-077"
  title: "Digital Certificate Structure"
  description: "Read subject, issuer, public key, and validity period. Output a simplified X.509-like certificate as JSON."
  difficulty: 3
  stdlib_modules: [std.io, std.json, std.crypto, std.encoding]
  input_format: "Line 1: subject. Line 2: issuer. Line 3: public key (hex). Line 4: not_before (ISO 8601). Line 5: not_after (ISO 8601)"
  output_format: "JSON certificate with fields: subject, issuer, public_key, validity{not_before, not_after}, serial, fingerprint (SHA-256 of all fields)"
  test_cases:
    - input: "alice\nCA\n0123456789abcdef\n2024-01-01T00:00:00Z\n2025-01-01T00:00:00Z\n"
