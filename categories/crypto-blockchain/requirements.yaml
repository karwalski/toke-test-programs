  constraints: ["Value must be in [0, 2^n)", "Generate Pedersen-like commitment", "Output error if out of range"]

- id: "CRY-081"
  title: "Simple ZK Proof of Knowledge (Schnorr)"
  description: "Generate a Schnorr proof of knowledge of discrete log. Prove knowledge of x where y = g^x mod p."
  difficulty: 5
  stdlib_modules: [std.crypto, std.io, std.math]
  input_format: "Line 1: p (prime). Line 2: g (generator). Line 3: x (secret). Line 4: PROVE | VERIFY"
  output_format: "PROVE: commitment,challenge,response. VERIFY: VALID/INVALID (reads commitment,challenge,response,y from additional lines)"
  test_cases:
    - input: "23\n5\n7\nPROVE"
      expected_output: "<commitment>,<challenge>,<response>"
    - input: "23\n5\n0\nVERIFY\n<commitment>\n<challenge>\n<response>\n<y>"
      expected_output: "VALID"
  constraints: ["Schnorr identification protocol", "Challenge derived from hash of commitment", "Non-interactive (Fiat-Shamir heuristic)"]

- id: "CRY-082"
  title: "Pedersen Commitment"
  description: "Create a Pedersen commitment C = g^v * h^r mod p for a value v with blinding factor r."
  difficulty: 4
  stdlib_modules: [std.crypto, std.io, std.math]
  input_format: "Line 1: p (prime). Line 2: g (generator 1). Line 3: h (generator 2). Line 4: v (value). Line 5: r (blinding factor)"
  output_format: "Commitment value (integer)"
  test_cases:
    - input: "23\n5\n7\n3\n4"
      expected_output: "16"
    - input: "97\n5\n7\n10\n20"
      expected_output: "68"
  constraints: ["C = (g^v * h^r) mod p", "Generators g and h must have unknown discrete log relation for security"]

