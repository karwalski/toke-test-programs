- id: "CRY-103"
  title: "Slashing Condition Check"
  description: "Read validator attestations. Detect double-voting or surround-voting slashing conditions."
  difficulty: 3
  stdlib_modules: [std.io, std.json, std.str]
  input_format: "JSON array of attestations {validator, source_epoch, target_epoch, target_root}"
  output_format: "List of slashable validators and reason, or NO_VIOLATIONS"
