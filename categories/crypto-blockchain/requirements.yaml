    - input: "bob\nCA\ndeadbeefcafe\n2024-06-01T00:00:00Z\n2024-12-31T23:59:59Z\n"
      expected_output: "{\"fingerprint\":\"44f304d789df5b24b3597cf568036f21420a8b2d2c0515d46d2d9665a186d65f\",\"issuer\":\"CA\",\"public_key\":\"deadbeefcafe\",\"serial\":\"5f3d4792189ff5f8e99e59ef4ce214e0\",\"subject\":\"bob\",\"validity\":{\"not_after\":\"2024-12-31T23:59:59Z\",\"not_before\":\"2024-06-01T00:00:00Z\"}}"
    - input: "charlie.example.com\nRoot CA Inc\nabcdef0123456789abcdef0123456789\n2023-03-15T12:00:00Z\n2026-03-15T12:00:00Z\n"
      expected_output: "{\"fingerprint\":\"6d5ab2e45938631385c1bf4f15cf04d0ad9cbee1c6170f44dee6872ec28c56a2\",\"issuer\":\"Root CA Inc\",\"public_key\":\"abcdef0123456789abcdef0123456789\",\"serial\":\"bcd8e286f7d0f4129f74dbee8c16e2cb\",\"subject\":\"charlie.example.com\",\"validity\":{\"not_after\":\"2026-03-15T12:00:00Z\",\"not_before\":\"2023-03-15T12:00:00Z\"}}"
  constraints: ["Generate random serial number", "Fingerprint is SHA-256 of canonical JSON of certificate fields (excluding fingerprint)"]

- id: "CRY-078"
  title: "Certificate Chain Validation"
  description: "Read a chain of certificates (JSON array). Validate each certificate is signed by its issuer."
  difficulty: 4
  stdlib_modules: [std.io, std.json, std.crypto, std.encoding]
  input_format: "JSON array of certificates in order [leaf, intermediate, ..., root]. Each has: subject, issuer, signature, public_key"
  output_format: "VALID or ERROR: <reason at position N>"
  test_cases:
    - input: "[{\"subject\":\"site\",\"issuer\":\"inter\",\"signature\":\"valid\",\"public_key\":\"pk1\"},{\"subject\":\"inter\",\"issuer\":\"root\",\"signature\":\"valid\",\"public_key\":\"pk2\"},{\"subject\":\"root\",\"issuer\":\"root\",\"signature\":\"valid\",\"public_key\":\"pk3\"}]"
      expected_output: "VALID"
    - input: "[{\"subject\":\"site\",\"issuer\":\"wrong\",\"signature\":\"valid\",\"public_key\":\"pk1\"},{\"subject\":\"inter\",\"issuer\":\"root\",\"signature\":\"valid\",\"public_key\":\"pk2\"}]"
      expected_output: "ERROR: Certificate 0 issuer 'wrong' does not match certificate 1 subject 'inter'"
  constraints: ["Each cert's issuer must match next cert's subject", "Root cert is self-signed", "Verify signatures"]

- id: "CRY-079"
  title: "Commitment Scheme (Hash-Based)"
  description: "Implement a commit-reveal scheme. Phase 1: commit (output hash of value+nonce). Phase 2: verify reveal."
  difficulty: 2
  stdlib_modules: [std.crypto, std.io, std.encoding]
  input_format: "Line 1: COMMIT value nonce | VERIFY value nonce commitment_hash"
  output_format: "COMMIT: the commitment hash. VERIFY: VALID or INVALID"
  test_cases:
    - input: "COMMIT secret123 randomnonce456"
      expected_output: "<sha256 of 'secret123||randomnonce456'>"
    - input: "VERIFY secret123 randomnonce456 <correct_hash>"
      expected_output: "VALID"
  constraints: ["commitment = SHA-256(value || nonce)", "Verify by recomputing and comparing"]

