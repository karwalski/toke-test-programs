# Crypto & Blockchain Program Requirements
# 135 unique requirements covering hashing, symmetric/asymmetric crypto,
# digital signatures, blockchain structures, Merkle trees, wallets,
# transactions, smart contract logic, key management, password security,
# encoding, random generation, zero-knowledge concepts, token/NFT logic, consensus.

- id: "CRY-001"
  title: "SHA-256 Hash"
  description: "Read a string from stdin and output its SHA-256 hash as a lowercase hex string."
  difficulty: 1
  stdlib_modules: [std.crypto, std.io, std.encoding]
  input_format: "A single line of text"
  output_format: "64-character lowercase hex SHA-256 digest"
  test_cases:
    - input: "hello"
      expected_output: "2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"
    - input: "blockchain"
      expected_output: "625da44e4eaf58d61cf048d168aa6f5e492dea166d8bb54ec06c30de07db57e1"
  constraints: ["Must use std.crypto.sha256", "Output must be lowercase hex"]

- id: "CRY-002"
  title: "SHA-512 Hash"
  description: "Read a string from stdin and output its SHA-512 hash as a lowercase hex string."
  difficulty: 1
  stdlib_modules: [std.crypto, std.io, std.encoding]
  input_format: "A single line of text"
  output_format: "128-character lowercase hex SHA-512 digest"
  test_cases:
    - input: "hello"
      expected_output: "9b71d224bd62f3785d96d46ad3ea3d73319bfbc2890caadae2dff72519673ca72323c3d99ba5c11d7c7acc6e14b8c5da0c4663475c2e5c3adef46f73bcdec043"
    - input: "test"
      expected_output: "ee26b0dd4af7e749aa1a8ee3c10ae9923f618980772e473f8819a5d4940e0db27ac185f8a0e1d5f84f88bc887fd67b143732c304cc5fa9ad8e6f57f50028a8ff"
  constraints: ["Must use std.crypto.sha512", "Output must be lowercase hex"]

- id: "CRY-003"
  title: "MD5 Hash (Legacy)"
  description: "Read a string from stdin and output its MD5 hash. Print a warning that MD5 is insecure."
  difficulty: 1
  stdlib_modules: [std.crypto, std.io, std.encoding]
  input_format: "A single line of text"
  output_format: "Line 1: 32-character lowercase hex MD5 digest. Line 2: WARNING: MD5 is cryptographically broken"
  test_cases:
    - input: "hello"
      expected_output: "5d41402abc4b2a76b9719d911017c592\nWARNING: MD5 is cryptographically broken"
    - input: "password"
      expected_output: "5f4dcc3b5aa765d61d8327deb882cf99\nWARNING: MD5 is cryptographically broken"
  constraints: ["Must output security warning", "Must use std.crypto.md5"]

- id: "CRY-004"
  title: "HMAC-SHA256"
  description: "Read a key and message (one per line) from stdin. Output the HMAC-SHA256 as hex."
  difficulty: 2
  stdlib_modules: [std.crypto, std.io, std.encoding]
  input_format: "Line 1: key string. Line 2: message string"
  output_format: "64-character lowercase hex HMAC-SHA256"
  test_cases:
    - input: "secret\nhello world"
      expected_output: "734cc62f32841568f45f6c1a8eb8307a1ee74a56d72e2bd4652b032514b15c09"
    - input: "key\nmessage"
      expected_output: "6e9ef29b75fffc5b7abae527d58fdadb2fe42e7219011976917343065f58ed4a"
  constraints: ["Must use std.crypto.hmac with sha256"]

- id: "CRY-005"
  title: "Base64 Encode"
  description: "Read binary-safe text from stdin and output its Base64 encoding."
  difficulty: 1
  stdlib_modules: [std.encoding, std.io]
  input_format: "A single line of text"
  output_format: "Base64 encoded string"
  test_cases:
    - input: "Hello, World!"
      expected_output: "SGVsbG8sIFdvcmxkIQ=="
    - input: "crypto"
      expected_output: "Y3J5cHRv"
  constraints: ["Must use std.encoding.base64_encode", "Standard Base64 alphabet with padding"]

- id: "CRY-006"
  title: "Base64 Decode"
  description: "Read a Base64 encoded string from stdin and output the decoded plaintext."
  difficulty: 1
  stdlib_modules: [std.encoding, std.io]
  input_format: "A single Base64 encoded string"
  output_format: "Decoded plaintext"
  test_cases:
    - input: "SGVsbG8sIFdvcmxkIQ=="
      expected_output: "Hello, World!"
    - input: "YmxvY2tjaGFpbg=="
      expected_output: "blockchain"
  constraints: ["Must use std.encoding.base64_decode", "Handle padding correctly"]

- id: "CRY-007"
  title: "Hex Encode"
  description: "Read a string from stdin and output its hexadecimal encoding."
  difficulty: 1
  stdlib_modules: [std.encoding, std.io]
  input_format: "A single line of text"
  output_format: "Lowercase hex encoded string"
  test_cases:
    - input: "hello"
      expected_output: "68656c6c6f"
    - input: "ABC"
      expected_output: "414243"
  constraints: ["Must use std.encoding.hex_encode", "Output lowercase"]

- id: "CRY-008"
  title: "Hex Decode"
  description: "Read a hex encoded string from stdin and output the decoded plaintext."
  difficulty: 1
  stdlib_modules: [std.encoding, std.io]
  input_format: "A hex encoded string (lowercase)"
  output_format: "Decoded plaintext"
  test_cases:
    - input: "68656c6c6f"
      expected_output: "hello"
    - input: "776f726c64"
      expected_output: "world"
  constraints: ["Must use std.encoding.hex_decode", "Handle even-length input"]

- id: "CRY-009"
  title: "Base58 Encode"
  description: "Read a hex string from stdin and output its Base58 (Bitcoin alphabet) encoding."
  difficulty: 2
  stdlib_modules: [std.encoding, std.io, std.math]
  input_format: "A hex encoded byte string"
  output_format: "Base58 encoded string using Bitcoin alphabet (123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz)"
  test_cases:
    - input: "0062e907b15cbf27d5425399ebf6f0fb50ebb88f18"
      expected_output: "1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa"
    - input: "68656c6c6f"
      expected_output: "Cn8eVZg"
  constraints: ["Must implement Bitcoin Base58 alphabet", "Preserve leading zero bytes as '1' characters"]

- id: "CRY-010"
  title: "Base58 Decode"
  description: "Read a Base58 (Bitcoin alphabet) encoded string and output the decoded hex."
  difficulty: 2
  stdlib_modules: [std.encoding, std.io, std.math]
  input_format: "A Base58 encoded string"
  output_format: "Lowercase hex string of decoded bytes"
  test_cases:
    - input: "Cn8eVZg"
      expected_output: "68656c6c6f"
    - input: "11"
      expected_output: "0000"
  constraints: ["Must implement Bitcoin Base58 alphabet", "Leading '1' characters decode to 0x00 bytes"]

- id: "CRY-011"
  title: "Double SHA-256"
  description: "Read a hex string from stdin and output the double SHA-256 hash (hash the hash) as hex. Used in Bitcoin."
  difficulty: 2
  stdlib_modules: [std.crypto, std.io, std.encoding]
  input_format: "A hex encoded byte string"
  output_format: "64-character lowercase hex of SHA256(SHA256(input_bytes))"
  test_cases:
    - input: "68656c6c6f"
      expected_output: "9595c9df90075148eb06860365df33584b75bff782a510c6cd4883a419833d50"
    - input: ""
      expected_output: "5df6e0e2761359d30a8275058e299fcc0381534545f55cf43e41983f5d4c9456"
  constraints: ["Hash raw bytes, not the hex string itself", "Apply SHA-256 twice"]

- id: "CRY-012"
  title: "RIPEMD-160 Hash"
  description: "Read a string from stdin and output its RIPEMD-160 hash as hex. Used in Bitcoin address generation."
  difficulty: 2
  stdlib_modules: [std.crypto, std.io, std.encoding]
  input_format: "A single line of text"
  output_format: "40-character lowercase hex RIPEMD-160 digest"
  test_cases:
    - input: "hello"
      expected_output: "108f07b8382412612c048d07d13f814118445acd"
    - input: "blockchain"
      expected_output: "f1d8e3a44b689a2e03d6b0c095b3a9aa69cb2842"
  constraints: ["Must use std.crypto.ripemd160"]

- id: "CRY-013"
  title: "Hash160 (Bitcoin)"
  description: "Read a hex-encoded public key from stdin. Output RIPEMD160(SHA256(pubkey_bytes)) as hex."
  difficulty: 2
  stdlib_modules: [std.crypto, std.io, std.encoding]
  input_format: "Hex encoded public key bytes"
  output_format: "40-character lowercase hex Hash160 result"
  test_cases:
    - input: "0250863ad64a87ae8a2fe83c1af1a8403cb53f53e486d8511dad8a04887e5b2352"
      expected_output: "f54a5851e9372b87810a8e60cdd2e7cfd80b6e31"
    - input: "68656c6c6f"
      expected_output: "b6a9c8c230722b7c748331a8b450f05566dc7d0f"
  constraints: ["Apply SHA-256 first, then RIPEMD-160", "Input is hex-encoded bytes"]

