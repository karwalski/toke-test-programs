    - input: "[{\"validator\":\"a\",\"source_epoch\":1,\"target_epoch\":2,\"target_root\":\"x\"},{\"validator\":\"a\",\"source_epoch\":1,\"target_epoch\":2,\"target_root\":\"y\"}]"
      expected_output: "SLASHABLE: a (double vote at epoch 2)"
