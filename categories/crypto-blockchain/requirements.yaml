- id: "CRY-085"
  disabled: true
  disabled_reason: "[CHEAT-AUDIT] test_cases admit input-discriminator hardcoded-output bypass"
  disabled_at: "2026-06-02"
  disabled_by: "epic-112-cheat-audit"
  title: "Coin Mixing Simulation"
  description: "Simulate a CoinJoin mixing transaction. Read multiple inputs and outputs. Verify amounts balance."
