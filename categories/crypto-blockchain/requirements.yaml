- id: "CRY-092"
  title: "Token Vesting Schedule"
  description: "Read vesting parameters and a query timestamp. Calculate vested and unvested token amounts."
  difficulty: 3
  stdlib_modules: [std.io, std.math]
  input_format: "Line 1: total_tokens. Line 2: cliff_months. Line 3: vesting_months. Line 4: start_timestamp (unix). Line 5: query_timestamp (unix)"
  output_format: "Line 1: vested amount. Line 2: unvested amount"
