      expected_output: "PROBABLY_IN\nDEFINITELY_NOT_IN"
  constraints: ["Use SHA-256 with different seeds for hash functions", "No false negatives allowed"]

- id: "CRY-071"
  title: "Simple Smart Contract State Machine"
  description: "Simulate a state machine contract. Read initial state, transitions, and commands. Execute transitions."
  difficulty: 3
  stdlib_modules: [std.io, std.json, std.str]
  input_format: "Line 1: JSON {state, owner}. Line 2: JSON transitions {from_state: {action: to_state}}. Remaining: ACTION caller action_name"
  output_format: "Final state JSON or ERROR on invalid transition"
  test_cases:
    - input: "{\"state\":\"idle\",\"owner\":\"alice\"}\n{\"idle\":{\"start\":\"running\"},\"running\":{\"stop\":\"idle\"}}\nACTION alice start\nACTION alice stop"
      expected_output: "{\"state\":\"idle\",\"owner\":\"alice\"}"
    - input: "{\"state\":\"idle\",\"owner\":\"alice\"}\n{\"idle\":{\"start\":\"running\"}}\nACTION bob start"
      expected_output: "ERROR: bob is not the owner"
  constraints: ["Only owner can execute actions", "Reject invalid state transitions"]

- id: "CRY-072"
  title: "Gas Cost Calculator"
  description: "Read a sequence of operations with gas costs. Calculate total gas and check against gas limit."
  difficulty: 2
  stdlib_modules: [std.io, std.json, std.math, std.str]
  input_format: "Line 1: gas limit. Line 2: JSON gas cost table {op: cost}. Remaining lines: operation names"
  output_format: "Line 1: total gas used. Line 2: SUCCESS or OUT_OF_GAS at operation N"
  test_cases:
    - input: "100\n{\"ADD\":3,\"MUL\":5,\"STORE\":20,\"LOAD\":5}\nADD\nMUL\nSTORE\nLOAD"
      expected_output: "33\nSUCCESS"
    - input: "10\n{\"ADD\":3,\"MUL\":5,\"STORE\":20}\nADD\nMUL\nSTORE"
      expected_output: "28\nOUT_OF_GAS at operation 3"
  constraints: ["Stop execution when gas limit exceeded", "Report which operation caused out-of-gas"]

- id: "CRY-073"
  title: "Simple Stack-Based VM"
  description: "Implement a minimal stack-based virtual machine (like EVM simplified). Execute bytecode and output stack."
  difficulty: 4
  stdlib_modules: [std.io, std.str, std.math]
  input_format: "Space-separated instructions: PUSH <n>, ADD, SUB, MUL, DUP, SWAP, POP"
  output_format: "Final stack contents (top to bottom, space-separated)"
  test_cases:
    - input: "PUSH 5 PUSH 3 ADD"
      expected_output: "8"
    - input: "PUSH 10 PUSH 3 PUSH 2 MUL ADD"
      expected_output: "16"
    - input: "PUSH 5 DUP MUL"
      expected_output: "25"
  constraints: ["Stack underflow returns ERROR", "All arithmetic on integers"]

- id: "CRY-074"
  title: "Contract Storage (Key-Value)"
  description: "Simulate contract storage. Read storage operations (SSTORE/SLOAD) and output results."
  difficulty: 2
  stdlib_modules: [std.io, std.json, std.str]
  input_format: "Commands one per line: SSTORE key value | SLOAD key"
  output_format: "For each SLOAD: output the value (or 0 if unset)"
  test_cases:
    - input: "SSTORE balance 100\nSSTORE name alice\nSLOAD balance\nSLOAD name\nSLOAD missing"
      expected_output: "100\nalice\n0"
    - input: "SSTORE x 42\nSSTORE x 99\nSLOAD x"
      expected_output: "99"
  constraints: ["Default value is 0 for unset keys", "SSTORE overwrites previous value"]

- id: "CRY-075"
  title: "Event Log Emission"
  description: "Simulate contract event emission. Read event definitions and emit commands. Output event log."
  difficulty: 2
  stdlib_modules: [std.io, std.json, std.str, std.crypto]
  input_format: "Line 1: JSON event signatures {name: [param_types]}. Remaining: EMIT event_name param1 param2..."
  output_format: "JSON array of {topic: keccak256(signature), data: [params]}"
  test_cases:
    - input: "{\"Transfer\":[\"address\",\"address\",\"uint256\"]}\nEMIT Transfer alice bob 100\n"
      expected_output: "[{\"topic\":\"ddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef\",\"data\":[\"alice\",\"bob\",\"100\"]}]"
    - input: "{\"Mint\":[\"address\",\"uint256\"]}\nEMIT Mint alice 50\nEMIT Mint bob 30\n"
      expected_output: "[{\"topic\":\"0f6798a560793a54c3bcfe86a93cde1e73087d944c0ea20544137d4121396885\",\"data\":[\"alice\",\"50\"]},{\"topic\":\"0f6798a560793a54c3bcfe86a93cde1e73087d944c0ea20544137d4121396885\",\"data\":[\"bob\",\"30\"]}]"
    - input: "{\"Approval\":[\"address\",\"address\",\"uint256\"],\"Burn\":[\"address\",\"uint256\"]}\nEMIT Approval alice bob 42\nEMIT Burn carol 7\nEMIT Approval bob alice 1\n"
      expected_output: "[{\"topic\":\"8c5be1e5ebec7d5bd14f71427d1e84f3dd0314c0f7b2291e5b200ac8c7c3b925\",\"data\":[\"alice\",\"bob\",\"42\"]},{\"topic\":\"cc16f5dbb4873280815c1ee09dbd06736cffcc184412cf7a71a0fdb75d397ca5\",\"data\":[\"carol\",\"7\"]},{\"topic\":\"8c5be1e5ebec7d5bd14f71427d1e84f3dd0314c0f7b2291e5b200ac8c7c3b925\",\"data\":[\"bob\",\"alice\",\"1\"]}]"
  constraints: ["Topic is Keccak-256 of event signature string", "Signature format: Name(type1,type2,...)"]

- id: "CRY-076"
  disabled: true
