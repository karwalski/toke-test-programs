- id: "CRY-090"
  title: "SegWit Transaction Weight"
  description: "Read legacy size and witness size. Calculate transaction weight and virtual size (vBytes)."
  difficulty: 2
  stdlib_modules: [std.io, std.math]
  input_format: "Line 1: non-witness size (bytes). Line 2: witness size (bytes)"
  output_format: "Line 1: weight units. Line 2: virtual size (vBytes, ceiling)"
  test_cases:
    - input: "100\n50"
      expected_output: "450\n113"
    - input: "200\n100"
      expected_output: "900\n225"
  constraints: ["weight = non_witness * 4 + witness * 1", "vsize = ceil(weight / 4)"]

- id: "CRY-091"
