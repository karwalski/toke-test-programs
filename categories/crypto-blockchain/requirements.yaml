  input_format: "Line 1: master seed (hex, 64+ chars). Line 2: derivation path (e.g., m/44'/0'/0'/0/0)"
  output_format: "Line 1: derived private key (hex). Line 2: derived chain code (hex)"
  test_cases:
    - input: "000102030405060708090a0b0c0d0e0f\nm/0'"
      expected_output: "<derived_key_hex>\n<chain_code_hex>"
