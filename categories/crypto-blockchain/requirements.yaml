      expected_output: "{\"inputs\":[{\"txid\":\"a\",\"vout\":0}],\"outputs\":[{\"address\":\"recipient\",\"amount\":4},{\"address\":\"change\",\"amount\":0.5}]}"
    - input: "[{\"txid\":\"a\",\"vout\":0,\"amount\":10}]\nrecipient\n5\n1"
      expected_output: "{\"inputs\":[{\"txid\":\"a\",\"vout\":0}],\"outputs\":[{\"address\":\"recipient\",\"amount\":5},{\"address\":\"change\",\"amount\":4}]}"
  constraints: ["Select smallest set of UTXOs that covers amount + fee", "Include change output if remainder > 0", "Error if insufficient funds"]

- id: "CRY-054"
  title: "Nonce-Based Account Balance"
  description: "Read a JSON ledger of transactions and an address. Calculate balance using account model (not UTXO)."
  difficulty: 2
  stdlib_modules: [std.io, std.json, std.math]
  input_format: "Line 1: JSON array of {from, to, amount, nonce}. Line 2: target address"
  output_format: "Line 1: balance. Line 2: next nonce"
  test_cases:
    - input: "[{\"from\":\"a\",\"to\":\"b\",\"amount\":10,\"nonce\":0},{\"from\":\"b\",\"to\":\"a\",\"amount\":3,\"nonce\":0}]\na"
      expected_output: "-7\n1"
    - input: "[{\"from\":\"x\",\"to\":\"y\",\"amount\":5,\"nonce\":0},{\"from\":\"x\",\"to\":\"z\",\"amount\":3,\"nonce\":1}]\nx"
      expected_output: "-8\n2"
  constraints: ["Debit sender, credit receiver", "Track nonce as count of outgoing transactions"]

- id: "CRY-055"
  title: "ERC-20 Token Transfer Logic"
  description: "Simulate ERC-20 token transfers. Read initial balances and transfer commands. Output final balances."
  difficulty: 3
  stdlib_modules: [std.io, std.json, std.math, std.str]
  input_format: "Line 1: JSON initial balances {address: amount}. Remaining lines: TRANSFER from to amount"
  output_format: "JSON final balances (sorted by address)"
  test_cases:
    - input: "{\"alice\":100,\"bob\":50}\nTRANSFER alice bob 30\nTRANSFER bob alice 10"
      expected_output: "{\"alice\":80,\"bob\":70}"
    - input: "{\"alice\":10,\"bob\":0}\nTRANSFER alice bob 20"
      expected_output: "ERROR: Insufficient balance for alice"
  constraints: ["Reject transfers exceeding balance", "Report first error encountered"]

- id: "CRY-056"
  title: "ERC-20 Allowance and TransferFrom"
  description: "Simulate ERC-20 approve/transferFrom. Read commands and output results."
  difficulty: 3
  stdlib_modules: [std.io, std.json, std.math, std.str]
  input_format: "Line 1: JSON initial balances. Remaining lines: APPROVE owner spender amount | TRANSFER_FROM spender owner to amount"
  output_format: "JSON {balances: {}, allowances: {owner: {spender: amount}}}"
  test_cases:
    - input: "{\"alice\":100,\"bob\":0}\nAPPROVE alice bob 50\nTRANSFER_FROM bob alice bob 30"
      expected_output: "{\"balances\":{\"alice\":70,\"bob\":30},\"allowances\":{\"alice\":{\"bob\":20}}}"
    - input: "{\"alice\":100,\"bob\":0}\nAPPROVE alice bob 10\nTRANSFER_FROM bob alice bob 20"
      expected_output: "ERROR: Allowance exceeded for bob spending from alice"
  constraints: ["Check allowance before transferFrom", "Deduct from allowance on transferFrom", "Reject on insufficient allowance or balance"]

- id: "CRY-057"
  title: "NFT Mint and Transfer"
  description: "Simulate NFT minting and transfers. Read commands and output ownership state."
  difficulty: 3
  stdlib_modules: [std.io, std.json, std.str]
  input_format: "Commands one per line: MINT token_id owner | TRANSFER token_id from to"
  output_format: "JSON mapping of token_id to owner (sorted by token_id)"
  test_cases:
    - input: "MINT 1 alice\nMINT 2 bob\nTRANSFER 1 alice bob"
      expected_output: "{\"1\":\"bob\",\"2\":\"bob\"}"
    - input: "MINT 1 alice\nTRANSFER 1 bob alice"
      expected_output: "ERROR: bob does not own token 1"
  constraints: ["Cannot mint existing token_id", "Only owner can transfer", "Report first error"]

- id: "CRY-058"
  title: "Simple DEX Order Book"
  description: "Read buy/sell orders and match them. Output executed trades and remaining orders."
  difficulty: 4
  stdlib_modules: [std.io, std.json, std.math, std.str]
  input_format: "Commands one per line: BUY amount price | SELL amount price"
  output_format: "Line 1: JSON array of executed trades {buyer_price, seller_price, amount}. Line 2: JSON remaining orders"
  test_cases:
    - input: "SELL 10 100\nBUY 5 100"
      expected_output: "[{\"price\":100,\"amount\":5}]\n{\"sells\":[{\"amount\":5,\"price\":100}],\"buys\":[]}"
    - input: "BUY 10 50\nSELL 10 60"
      expected_output: "[]\n{\"sells\":[{\"amount\":10,\"price\":60}],\"buys\":[{\"amount\":10,\"price\":50}]}"
  constraints: ["Match when buy_price >= sell_price", "Execute at seller's price", "Partial fills allowed"]

- id: "CRY-059"
  title: "Automated Market Maker (Constant Product)"
  description: "Simulate a constant product AMM (x*y=k). Read initial reserves and swap commands. Output results."
  difficulty: 4
  stdlib_modules: [std.io, std.json, std.math, std.str]
  input_format: "Line 1: reserve_x reserve_y (integers). Remaining lines: SWAP_X amount | SWAP_Y amount"
  output_format: "After each swap: output amount received. Final line: RESERVES x y"
  test_cases:
    - input: "1000 1000\nSWAP_X 100"
      expected_output: "90\nRESERVES 1100 910"
    - input: "1000 2000\nSWAP_X 500\nSWAP_Y 200"
      expected_output: "666\n74\nRESERVES 1426 1334"
  constraints: ["x * y = k (constant product)", "No fees in basic version", "Integer arithmetic (floor division)"]

- id: "CRY-060"
  title: "Hash Time-Lock Contract (HTLC)"
  description: "Simulate an HTLC. Read setup parameters and a claim/refund action. Validate and output result."
  difficulty: 3
  stdlib_modules: [std.crypto, std.io, std.json, std.str]
  input_format: "Line 1: JSON {sender, receiver, amount, hashlock (hex), timelock (unix)}. Line 2: ACTION claim <preimage> | refund. Line 3: current_time (unix)"
  output_format: "SUCCESS: <recipient> receives <amount> | FAILED: <reason>"
  test_cases:
    - input: "{\"sender\":\"alice\",\"receiver\":\"bob\",\"amount\":100,\"hashlock\":\"2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824\",\"timelock\":1000}\nclaim hello\n500"
      expected_output: "SUCCESS: bob receives 100"
    - input: "{\"sender\":\"alice\",\"receiver\":\"bob\",\"amount\":100,\"hashlock\":\"abc\",\"timelock\":1000}\nrefund\n1500"
      expected_output: "SUCCESS: alice receives 100"
  constraints: ["Claim: SHA256(preimage) must equal hashlock AND current_time < timelock", "Refund: current_time >= timelock"]

- id: "CRY-061"
  title: "Multi-Signature Verification"
  description: "Read an M-of-N multisig config, message, and signatures. Verify at least M valid signatures exist."
  difficulty: 4
  stdlib_modules: [std.crypto, std.io, std.json, std.encoding]
  input_format: "Line 1: M (required sigs). Line 2: JSON array of public keys (hex). Line 3: message. Line 4: JSON array of signatures (hex)"
  output_format: "VALID (M of N) or INVALID: only K valid signatures"
  test_cases:
    - input: "2\n[\"pubkey1\",\"pubkey2\",\"pubkey3\"]\nmessage\n[\"sig1\",\"sig2\"]"
      expected_output: "VALID (2 of 3)"
    - input: "2\n[\"pubkey1\",\"pubkey2\",\"pubkey3\"]\nmessage\n[\"sig1\"]"
      expected_output: "INVALID: only 1 valid signatures"
  constraints: ["Verify each signature against all public keys", "Count unique valid signer-key pairs", "M <= N"]

- id: "CRY-062"
  title: "Shamir Secret Sharing - Split"
  description: "Read a secret (integer), threshold T, and total shares N. Output N shares as (x, y) pairs."
  difficulty: 4
  stdlib_modules: [std.crypto, std.io, std.math]
  input_format: "Line 1: secret (integer). Line 2: threshold T. Line 3: total shares N"
  output_format: "N lines, each: x,y (share coordinates)"
  test_cases:
    - input: "1234\n3\n5"
      expected_output: "1,<y1>\n2,<y2>\n3,<y3>\n4,<y4>\n5,<y5>"
    - input: "42\n2\n3"
      expected_output: "1,<y1>\n2,<y2>\n3,<y3>"
  constraints: ["Use polynomial of degree T-1 over prime field", "Secret is constant term", "Random coefficients from CSPRNG"]

- id: "CRY-063"
  title: "Shamir Secret Sharing - Reconstruct"
  description: "Read T or more shares as (x,y) pairs. Reconstruct the secret using Lagrange interpolation."
  difficulty: 4
  stdlib_modules: [std.io, std.math]
  input_format: "Line 1: prime modulus. Remaining lines: x,y (share pairs)"
  output_format: "Reconstructed secret integer"
  test_cases:
    - input: "65537\n1,100\n2,200\n3,350"
      expected_output: "50"
    - input: "97\n1,50\n2,60\n3,73"
      expected_output: "42"
  constraints: ["Lagrange interpolation at x=0", "All arithmetic modulo prime", "Need at least T shares"]

- id: "CRY-064"
  title: "Vanity Address Generator"
  description: "Read a prefix string. Generate key pairs until the address starts with the given prefix. Output the address and private key."
  difficulty: 3
  stdlib_modules: [std.crypto, std.io, std.encoding, std.str]
  input_format: "A prefix string (e.g., '1Ab')"
  output_format: "Line 1: matching address. Line 2: private key (hex)"
  test_cases:
    - input: "1A"
      expected_output: "1A<rest of address>\n<private key hex>"
    - input: "1B"
      expected_output: "1B<rest of address>\n<private key hex>"
  constraints: ["Generate random private keys", "Derive Bitcoin address", "Loop until prefix matches", "Limit iterations to prevent timeout"]

- id: "CRY-065"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: '<derived_key_hex>\\n<chain_code_hex>'"
  disabled_at: "2026-06-01"
