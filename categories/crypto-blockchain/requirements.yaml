  test_cases:
    - input: "alice\n[{\"txid\":\"1\",\"from\":\"bob\",\"to\":\"alice\",\"amount\":10,\"fee\":0.1},{\"txid\":\"2\",\"from\":\"alice\",\"to\":\"bob\",\"amount\":3,\"fee\":0.1}]"
