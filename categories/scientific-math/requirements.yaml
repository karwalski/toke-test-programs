  input_format: "Line 1: text rows cols. Lines 2..rows+1: text rows. Line rows+2: pattern rows cols. Lines rows+3...: pattern rows."
  output_format: "Found at: (row,col) per occurrence (0-indexed). Count: N"
  test_cases:
