  difficulty: 2
  stdlib_modules: [std.str, std.collections, std.io]
  input_format: "Line 1: string A. Line 2: string B."
  output_format: "LCS length: N\\nLCS: subsequence_string"
  test_cases:
    - input: "ABCBDAB\nBDCABA"
      expected_output: "LCS length: 4\nLCS: BCBA"
    - input: "AGGTAB\nGXTXAYB"
      expected_output: "LCS length: 4\nLCS: GTAB"
  constraints:
    - "DP solution O(mn)"
    - "If multiple LCS exist, output lexicographically smallest"

- id: "SCI-038"
  title: "Suffix Array Builder"
