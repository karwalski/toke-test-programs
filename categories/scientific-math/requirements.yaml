      expected_output: "odd\neven"
  constraints:
    - "N is 64-bit unsigned"
    - "reverse_bits: for 32-bit integer"

- id: "SCI-103"
  title: "Segment Tree"
  description: "Build a segment tree for range-minimum and range-sum queries with point updates."
  difficulty: 4
  stdlib_modules: [std.collections, std.io]
