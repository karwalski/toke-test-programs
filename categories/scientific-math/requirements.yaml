  difficulty: 4
  stdlib_modules: [std.math, std.collections, std.io]
  input_format: "Line 1: n_states. Lines 2..n+1: transition matrix rows (rows sum to 1). Line n+2: initial_state. Line n+3: steps."
  output_format: "Simulated visit counts: s0=N s1=N ...\\nSteady state: s0=X.XXXX s1=X.XXXX ..."
  test_cases:
    - input: "2\n0.7 0.3\n0.4 0.6\n0\n10000"
      expected_output: "Simulated visit counts: ~5714 ~4286\nSteady state: s0=0.5714 s1=0.4286"
    - input: "3\n0.5 0.25 0.25\n0.25 0.5 0.25\n0.25 0.25 0.5\n0\n10000"
      expected_output: "Steady state: s0=0.3333 s1=0.3333 s2=0.3333"
  constraints:
    - "Compute steady state by power iteration (multiply by large power)"
    - "Rows of transition matrix must sum to 1 (±1e-6)"

- id: "SCI-050"
