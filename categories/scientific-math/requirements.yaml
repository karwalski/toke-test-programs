  difficulty: 4
  stdlib_modules: [std.math, std.io]
  input_format: "Line 1: mode (forward|inverse). Line 2: N (power of 2). Line 3: N space-separated values."
  output_format: "Transformed values (space-separated, 6 decimal places)"
  test_cases:
    - input: "forward\n4\n1 1 1 1"
      expected_output: "2.000000 0.000000 0.000000 0.000000"
    - input: "forward\n4\n1 2 3 4"
      expected_output: "5.000000 -2.000000 -0.707107 -0.707107"
  constraints:
    - "N must be a power of 2"
    - "Normalised Haar: multiply by 1/sqrt(2) at each level"

- id: "SCI-127"
  title: "Bezier Curve Evaluator"
  description: "Evaluate a Bezier curve at N uniformly spaced parameter values using de Casteljau's algorithm."
  difficulty: 3
  stdlib_modules: [std.math, std.io]
  input_format: "Line 1: degree D (number of control points = D+1). Lines 2..D+2: x y control points. Line D+3: N (sample points)."
  output_format: "N lines of x y (curve points, 4 decimal places)"
  test_cases:
    - input: "2\n0 0\n1 2\n2 0\n5"
      expected_output: "0.0000 0.0000\n0.5000 0.7500\n1.0000 1.0000\n1.5000 0.7500\n2.0000 0.0000"
    - input: "1\n0 0\n1 1\n3"
      expected_output: "0.0000 0.0000\n0.5000 0.5000\n1.0000 1.0000"
  constraints:
    - "De Casteljau's recursive algorithm"
    - "t ranges from 0 to 1 inclusive"

- id: "SCI-128"
  title: "Gaussian Elimination"
  description: "Solve a system of linear equations Ax=b using Gaussian elimination with partial pivoting."
  difficulty: 3
  stdlib_modules: [std.math, std.collections, std.io]
  input_format: "Line 1: n. Lines 2..n+1: augmented matrix row [a_i1 ... a_in b_i]."
  output_format: "x1=X.XXXXXX x2=X.XXXXXX ... (solution, 6 dp) or NO UNIQUE SOLUTION"
  test_cases:
    - input: "2\n2 1 5\n4 3 11"
      expected_output: "x1=2.000000 x2=1.000000"
    - input: "3\n2 1 -1 8\n-3 -1 2 -11\n-2 1 2 -3"
      expected_output: "x1=2.000000 x2=3.000000 x3=-1.000000"
  constraints:
    - "Partial pivoting required"
    - "Detect singular or underdetermined systems"

- id: "SCI-129"
  title: "Voronoi Diagram (Fortune's Algorithm)"
  description: "Compute the Voronoi diagram of 2D points using Fortune's sweep line algorithm."
  difficulty: 5
  stdlib_modules: [std.math, std.collections, std.io]
  input_format: "Line 1: N. Lines 2..N+1: x y (sites)."
  output_format: "Voronoi edges: (x1,y1)-(x2,y2) (one per finite edge). Num edges: N"
  test_cases:
    - input: "3\n0 0\n3 0\n1.5 3"
      expected_output: "(3 Voronoi edges defining the 3 regions)\nNum edges: N"
    - input: "4\n0 0\n2 0\n0 2\n2 2"
      expected_output: "(4 Voronoi edges for square arrangement)\nNum edges: N"
  constraints:
    - "Fortune's O(n log n) algorithm"
    - "Clip to bounding box"

- id: "SCI-130"
  title: "Fast Inverse Square Root"
  description: "Implement the famous fast inverse square root approximation (Quake III algorithm) and compare to exact value."
  difficulty: 2
  stdlib_modules: [std.math, std.io]
  input_format: "Lines of positive floats"
  output_format: "x: fast=X.XXXXXX exact=X.XXXXXX error=X.XX%"
  test_cases:
    - input: "4.0\n2.0\n0.25"
      expected_output: "4.0: fast=0.499985 exact=0.500000 error=0.00%\n2.0: fast=0.706825 exact=0.707107 error=0.04%\n0.25: fast=1.999395 exact=2.000000 error=0.03%"
    - input: "1.0"
      expected_output: "1.0: fast=~1.0 exact=1.000000 error=~0%"
  constraints:
    - "Use 0x5F3759DF magic constant"
    - "One Newton-Raphson refinement step"
