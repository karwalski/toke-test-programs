      expected_output: "phi(1) = 1\nphi(6) = 2\nphi(12) = 4\nphi(36) = 12"
    - input: "7"
      expected_output: "phi(7) = 6"
  constraints:
    - "Use Euler's product formula"
    - "n up to 10^6"

- id: "SCI-101"
  title: "Möbius Function"
  description: "Compute the Möbius function μ(n) for a range and use it for inclusion-exclusion."
  difficulty: 3
  stdlib_modules: [std.math, std.io]
  input_format: "Lines of integers n"
  output_format: "mu(n) = N (one per input: 1, -1, or 0)"
  test_cases:
    - input: "1\n2\n4\n6\n30"
      expected_output: "mu(1) = 1\nmu(2) = -1\nmu(4) = 0\nmu(6) = 1\nmu(30) = -1"
    - input: "12"
      expected_output: "mu(12) = 0"
  constraints:
    - "μ(1)=1, μ(n)=(-1)^k if n is product of k distinct primes, μ(n)=0 if n has squared prime factor"
    - "n up to 10^7"

- id: "SCI-102"
  title: "Bit Manipulation Toolkit"
