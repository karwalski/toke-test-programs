      expected_output: "(3,5)\n(5,7)\n(11,13)\n(17,19)\n(29,31)\n(41,43)\ncount: 6 pairs."
    - input: "10"
      expected_output: "(3,5)\n(5,7)\ncount: 2 pairs."
  constraints:
    - "Use sieve for prime generation"
    - "p <= N"

- id: "SCI-100"
  title: "Euler's Totient Function"
  description: "Compute Euler's totient φ(n) for a range of integers."
  difficulty: 2
  stdlib_modules: [std.math, std.io]
