  difficulty: 4
  stdlib_modules: [std.math, std.collections, std.io, std.str]
  input_format: "Line 1: capacity n, false_positive_rate p. Lines of: ADD item | CONTAINS item | STATS"
  output_format: "CONTAINS: PROBABLY_IN | NOT_IN. STATS: bits=N k=N fill=X.XX%"
  test_cases:
    - input: "100 0.01\nADD hello\nCONTAINS hello\nCONTAINS world\nSTATS"
      expected_output: "PROBABLY_IN\nNOT_IN\nbits=... k=... fill=..."
    - input: "10 0.1\nADD a\nCONTAINS a"
      expected_output: "PROBABLY_IN"
  constraints:
