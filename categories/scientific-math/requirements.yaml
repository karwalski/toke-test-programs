  difficulty: 1
  stdlib_modules: [std.math, std.io]
  input_format: "Single integer N (trials)"
  output_format: "Stay wins: N (X.XX%)\\nSwitch wins: N (X.XX%)"
  test_cases:
    - input: "100000"
      expected_output: "Stay wins: ~33333 (~33.33%)\nSwitch wins: ~66667 (~66.67%)"
    - input: "3"
      expected_output: "Stay wins: N (X.XX%)\nSwitch wins: N (X.XX%)"
  constraints:
    - "Use seeded random for reproducibility? No -- just run with system random"
    - "Result should converge to 1/3 and 2/3 for large N"

- id: "SCI-047"
