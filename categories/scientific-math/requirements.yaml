  output_format: "C(0)=1 C(1)=1 C(2)=2 ... (one per line)"
  test_cases:
    - input: "5"
      expected_output: "C(0)=1\nC(1)=1\nC(2)=2\nC(3)=5\nC(4)=14"
    - input: "1"
      expected_output: "C(0)=1"
  constraints:
