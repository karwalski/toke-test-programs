  difficulty: 3
  stdlib_modules: [std.str, std.collections, std.io]
  input_format: "Line 1: string s. Line 2: string t."
  output_format: "Distance: N\\nAlignment:\\n(s with gap chars)\\n(t with gap chars)"
  test_cases:
    - input: "kitten\nsitting"
      expected_output: "Distance: 3\nAlignment:\nkitten-\nsitten g->sitting..."
    - input: "abc\nabc"
      expected_output: "Distance: 0\nAlignment:\nabc\nabc"
  constraints:
    - "Operations: insert, delete, substitute (cost 1 each)"
    - "Show one valid alignment"

- id: "SCI-037"
  title: "Longest Common Subsequence"
