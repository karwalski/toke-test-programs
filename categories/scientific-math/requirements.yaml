      expected_output: "Iteration 1: x=0.000000 f(x)=6.000000\nIteration 2: x=1.200000 f(x)=1.440000\nIteration 3: x=1.753846 f(x)=0.306746\nIteration 4: x=1.959397 f(x)=0.042251\nIteration 5: x=1.998475 f(x)=0.001527\nIteration 6: x=1.999998 f(x)=0.000002\nIteration 7: x=2.000000 f(x)=0.000000\nRoot: 2.000000 (7 iterations)"
