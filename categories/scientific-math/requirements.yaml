  difficulty: 1
  stdlib_modules: [std.math, std.str, std.io]
  input_format: "Lines of 4-digit integers"
  output_format: "N: step1 step2 ... 6174 (K steps) or REPUNIT if all digits same"
  test_cases:
    - input: "1234"
      expected_output: "1234: 3087 8352 6174 (3 steps)"
    - input: "3524"
      expected_output: "3524: 3087 8352 6174 (3 steps)"
  constraints:
    - "Pad to 4 digits with leading zeros as needed"
