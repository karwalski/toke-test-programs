  difficulty: 3
  stdlib_modules: [std.collections, std.str, std.io]
  input_format: "Lines of: INSERT word | SEARCH word | PREFIX prefix | WORDS_WITH prefix"
  output_format: "SEARCH: true/false. PREFIX: count. WORDS_WITH: word list."
  test_cases:
    - input: "INSERT apple\nINSERT app\nINSERT application\nSEARCH app\nPREFIX app\nWORDS_WITH app"
      expected_output: "true\n3\napp apple application"
