  difficulty: 2
  stdlib_modules: [std.math, std.io]
  input_format: "Line 1: N. Lines 2..N+1: x y vertices in order."
  output_format: "Area: X.XXXXXX\\nPerimeter: X.XXXXXX\\nWinding: CW | CCW"
