  difficulty: 2
  stdlib_modules: [std.math, std.io]
  input_format: "Line 1: steps. Line 2: trials."
  output_format: "Mean final distance: X.XX\\nMean max distance: X.XX\\nExpected RMS: X.XX"
  test_cases:
    - input: "100\n1000"
      expected_output: "Mean final distance: ~X.XX\nMean max distance: ~X.XX\nExpected RMS: 10.00"
    - input: "1\n4"
      expected_output: "Mean final distance: 1.00\nMean max distance: 1.00\nExpected RMS: 1.00"
  constraints:
    - "4 directions: N/S/E/W with equal probability"
    - "Distance = Euclidean from origin"

- id: "SCI-049"
  title: "Markov Chain Simulator"
