      expected_output: "(-5.0000,1.0000)-(1.0000,1.0000)\n(1.0000,-5.0000)-(1.0000,1.0000)\n(1.0000,1.0000)-(1.0000,7.0000)\n(1.0000,1.0000)-(7.0000,1.0000)\nNum edges: 4"
    - input: "2\n0 0\n4 0\n"
