  difficulty: 3
  stdlib_modules: [std.collections, std.io]
  input_format: "Lines of: INSERT key value | EXTRACT_MIN | PEEK | DECREASE_KEY key new_value | SIZE"
  output_format: "EXTRACT_MIN/PEEK: key=K value=V. SIZE: N."
  test_cases:
