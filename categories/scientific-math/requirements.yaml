  output_format: "Result per query"
  test_cases:
    - input: "5\n1 3 2 7 9\nQUERY_SUM 1 3\nQUERY_MIN 0 4\nUPDATE 2 0\nQUERY_SUM 1 3"
      expected_output: "12\n1\n10"
    - input: "3\n5 1 3\nQUERY_MIN 0 2"
      expected_output: "1"
  constraints:
    - "0-indexed, inclusive ranges"
    - "O(log n) queries and updates"

- id: "SCI-104"
  title: "Fenwick Tree (Binary Indexed Tree)"
  description: "Implement a Fenwick tree for prefix sums with point updates."
  difficulty: 3
  stdlib_modules: [std.collections, std.io]
  input_format: "Line 1: N. Line 2: N space-separated integers. Lines of: UPDATE i delta | PREFIX i | RANGE l r"
  output_format: "Result per query"
  test_cases:
