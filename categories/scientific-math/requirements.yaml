  input_format: "Lines of: INSERT key | DELETE key | SEARCH key | RANGE lo hi | PRINT"
  output_format: "SEARCH: FOUND key | NOT FOUND. RANGE: key1 key2 ... PRINT: level-by-level."
  test_cases:
