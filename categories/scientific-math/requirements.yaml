  description: "Determine whether two line segments intersect and compute the intersection point if they do."
  difficulty: 3
  stdlib_modules: [std.math, std.io]
  input_format: "Line 1: x1 y1 x2 y2 (segment 1). Line 2: x3 y3 x4 y4 (segment 2)."
  output_format: "INTERSECT at (X.XXXXXX, Y.XXXXXX) | PARALLEL | COLLINEAR | NO INTERSECT"
  test_cases:
    - input: "0 0 1 1\n0 1 1 0"
      expected_output: "INTERSECT at (0.500000, 0.500000)"
    - input: "0 0 1 0\n0 1 1 1"
      expected_output: "PARALLEL"
  constraints:
    - "Use cross-product method"
    - "Treat collinear overlapping as COLLINEAR"

- id: "SCI-053"
