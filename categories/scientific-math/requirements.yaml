  stdlib_modules: [std.math, std.collections, std.io]
  input_format: "Line 1: N. Lines 2..N+1: x y."
  output_format: "Closest pair: (x1,y1) and (x2,y2)\\nDistance: X.XXXXXX"
  test_cases:
