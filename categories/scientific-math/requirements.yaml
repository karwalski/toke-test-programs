  difficulty: 4
  stdlib_modules: [std.math, std.collections, std.io]
  input_format: "Line 1: N. Lines 2..N+1: x y (one point per line)."
  output_format: "Hull points (in counter-clockwise order): (x,y) (x,y) ...\\nHull area: X.XXXXXX"
  test_cases:
    - input: "6\n0 3\n1 1\n2 2\n4 4\n0 0\n1 2"
      expected_output: "Hull points: (0,0) (1,1) (4,4) (0,3)\nHull area: X.XXXXXX"
    - input: "3\n0 0\n1 0\n0 1"
      expected_output: "Hull points: (0,0) (1,0) (0,1)\nHull area: 0.500000"
  constraints:
    - "Handle collinear points correctly (exclude interior)"
    - "Area via shoelace formula"

- id: "SCI-051"
  title: "Convex Hull (Jarvis March)"
  description: "Compute the convex hull using the Jarvis march (gift wrapping) algorithm."
  difficulty: 3
  stdlib_modules: [std.math, std.collections, std.io]
  input_format: "Line 1: N. Lines 2..N+1: x y."
  output_format: "Hull points (counter-clockwise): (x,y) (x,y) ...\\nHull size: N points"
  test_cases:
    - input: "5\n0 0\n1 1\n2 0\n1 -1\n0.5 0"
      expected_output: "Hull points: (0,0) (2,0) (1,1)\nHull size: 3 points"
    - input: "4\n0 0\n4 0\n0 4\n4 4"
      expected_output: "Hull points: (0,0) (4,0) (4,4) (0,4)\nHull size: 4 points"
  constraints:
    - "O(nh) where h is hull size"
    - "Start from lowest-leftmost point"

- id: "SCI-052"
