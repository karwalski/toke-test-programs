  difficulty: 2
  stdlib_modules: [std.math, std.io]
  input_format: "Line 1: max_group_size. Line 2: simulations (for Monte Carlo estimate)."
  output_format: "N: analytical=X.XXXX simulated=X.XXXX (one line per group size 1..max)"
  test_cases:
    - input: "5\n10000"
      expected_output: "1: analytical=0.0000 simulated=~0.0000\n...\n5: analytical=0.0271 simulated=~0.027"
    - input: "23\n10000"
      expected_output: "(... 23: analytical=0.5073 simulated=~0.507)"
  constraints:
    - "365 days per year"
    - "Analytical uses exact formula"

- id: "SCI-046"
  title: "Monty Hall Problem Simulator"
