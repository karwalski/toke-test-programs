      expected_output: "1 2\n1 3\n1 4\n2 3\n2 4\n3 4\nTotal: 6"
    - input: "a b c\n3"
      expected_output: "a b c\nTotal: 1"
  constraints:
    - "Lexicographic order"
    - "k must be <= n"

- id: "SCI-041"
  title: "Catalan Numbers"
