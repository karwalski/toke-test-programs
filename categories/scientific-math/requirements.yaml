      expected_output: "Iteration 1: x=1.500000 f(x)=2.375000\nIteration 2: x=1.148148 f(x)=0.513540\nIteration 3: x=1.018294 f(x)=0.055891\nIteration 4: x=1.000327 f(x)=0.000980\nIteration 5: x=1.000000 f(x)=0.000000\nRoot: 1.000000 (5 iterations)"
