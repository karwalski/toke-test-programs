      expected_output: "1\n2\n3\n4\n5\n6\n7\n8\n9\n153\n370\n371\n407"
    - input: "1"
      expected_output: "1\n2\n3\n4\n5\n6\n7\n8\n9"
  constraints:
    - "n-digit Armstrong: sum of digits each raised to n-th power equals n"
    - "D up to 7 (practical)"

- id: "SCI-096"
  title: "Kaprekar's Routine"
