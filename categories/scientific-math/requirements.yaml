  test_cases:
    - input: "100\n1000"
      expected_output: "Mean final position: ~0.0\nMean max displacement: ~X.XX\nMean returns to 0: ~X.XX\nExpected RMS: 10.00"
    - input: "4\n2"
      expected_output: "(statistics for 2 trials of 4 steps)"
  constraints:
    - "Each step: +1 or -1 with equal probability"
    - "RMS = sqrt(steps)"

- id: "SCI-048"
  title: "Random Walk Simulator (2D)"
