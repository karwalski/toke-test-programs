- id: "GAM-128"
  title: "Codeword Puzzle Solver"
  description: "Solve a codeword (coded crossword) puzzle given partial letter assignments and a dictionary."
  difficulty: 5
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Grid of numbers (1-26), known assignments 'N=L' one per line, dictionary words"
  output_format: "Complete letter assignments or 'No solution'"
  test_cases:
    - input: "1 2 3\n4 5 6\n7 8 9\n1=C 5=A\n\nCAT\nBIG\nCAB\nTAB"
