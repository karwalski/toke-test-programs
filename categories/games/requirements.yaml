  constraints: ["Must read from stdin", "Each number maps to unique letter", "Constraint propagation + backtracking"]

- id: "GAM-129"
  title: "Game Score Leaderboard"
  description: "Maintain a leaderboard from a stream of score events, handling score updates and rank queries."
  difficulty: 2
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Events one per line: 'score PLAYER N', 'rank PLAYER', 'top N'"
  output_format: "Response per rank/top query"
