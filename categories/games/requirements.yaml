- id: "GAM-001"
  title: "Blackjack Hand Evaluator"
  description: "Evaluate a blackjack hand and determine its total value, handling aces as 1 or 11 to avoid busting."
  difficulty: 2
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Space-separated card values on a single line (e.g. A 7 K)"
  output_format: "Integer total followed by 'Bust' if over 21, otherwise 'Safe'"
  test_cases:
    - input: "A 7 K"
      expected_output: "18 Safe"
    - input: "A A 9"
      expected_output: "21 Safe"
    - input: "K Q 5"
      expected_output: "25 Bust"
  constraints: ["Must read from stdin", "Face cards count as 10", "Aces counted optimally"]

- id: "GAM-002"
  title: "Poker Hand Classifier"
  description: "Classify a five-card poker hand into its category (Royal Flush, Straight Flush, Four of a Kind, etc.)."
  difficulty: 3
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Five space-separated cards in rank+suit format (e.g. AS KS QS JS TS)"
  output_format: "Hand category name"
  test_cases:
    - input: "AS KS QS JS TS"
      expected_output: "Royal Flush"
    - input: "2H 2D 2C 2S 5H"
      expected_output: "Four of a Kind"
    - input: "3H 3D 5C 5S 5H"
      expected_output: "Full House"
  constraints: ["Must read from stdin", "Suits: H D C S", "Ranks: 2-9 T J Q K A"]

- id: "GAM-003"
  title: "War Card Game Simulator"
  description: "Simulate a full game of War between two players, dealing a shuffled deck and playing rounds until one player wins all cards."
  difficulty: 3
  stdlib_modules: [std.io, std.str, std.collections, std.crypto]
  input_format: "Integer seed on first line"
  output_format: "Round-by-round results and final winner"
  test_cases:
    - input: "42"
      expected_output: "Player 1 wins after 1184 rounds"
    - input: "7"
      expected_output: "Player 1 wins after 279 rounds"
    - input: "1"
      expected_output: "Player 1 wins after 71 rounds"
    - input: "100"
      expected_output: "Player 2 wins after 169 rounds"
  constraints: ["Must read from stdin", "Use seed for deterministic shuffle", "Handle war ties correctly"]

- id: "GAM-004"
  title: "Tic-Tac-Toe State Checker"
  description: "Given a tic-tac-toe board state, determine if there is a winner, a draw, or the game is still ongoing."
  difficulty: 1
  stdlib_modules: [std.io, std.str]
  input_format: "Three lines of three characters each (X, O, or .)"
  output_format: "'X wins', 'O wins', 'Draw', or 'Ongoing'"
  test_cases:
    - input: "XOX\nXXO\nOXX"
      expected_output: "X wins"
    - input: "XOX\nOXO\nOXO"
      expected_output: "Draw"
    - input: "X..\nOO.\nX.."
      expected_output: "Ongoing"
  constraints: ["Must read from stdin", "Board is always 3x3"]

- id: "GAM-005"
  title: "Tic-Tac-Toe AI (Minimax)"
  description: "Play tic-tac-toe against a minimax AI. Accept a board state and whose turn it is, output the AI's best move."
  difficulty: 4
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Three lines of board state then a line 'X' or 'O' indicating AI's turn"
  output_format: "Row and column of best move (0-indexed, space-separated)"
  test_cases:
    - input: "XOX\nOO.\nX..\nO"
      expected_output: "1 2"
    - input: "...\n...\n...\nX"
      expected_output: "1 1"
  constraints: ["Must read from stdin", "AI must play optimally", "Row then column"]

- id: "GAM-006"
  title: "Connect Four Move Validator"
  description: "Given a Connect Four board and a proposed column move, determine if the move is valid and what row the piece would land in."
  difficulty: 2
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "6 lines of 7 characters (. R Y), then a column number (0-6)"
  output_format: "'Valid row N' or 'Invalid'"
  test_cases:
    - input: ".......\n.......\n.......\n.......\n.......\n.RRYY..\n3"
      expected_output: "Valid row 4"
    - input: "RRRRRRR\nYYYYYYY\nRRRRRRR\nYYYYYYY\nRRRRRRR\nYYYYYYY\n2"
      expected_output: "Invalid"
  constraints: ["Must read from stdin", "Board is 6 rows x 7 cols", "Bottom row is row 5"]

- id: "GAM-007"
  title: "Connect Four Win Detector"
  description: "Detect if a Connect Four board has a winner, checking all horizontal, vertical, and diagonal lines."
  difficulty: 3
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "6 lines of 7 characters (. R Y)"
  output_format: "'R wins', 'Y wins', or 'No winner'"
  test_cases:
    - input: ".......\n.......\n.......\n.......\nRRR....\nRRRR..."
      expected_output: "R wins"
    - input: ".......\n.......\n.......\n.......\n.......\n......."
      expected_output: "No winner"
  constraints: ["Must read from stdin", "Four in a row in any direction wins"]

- id: "GAM-008"
  title: "Chess Piece Move Generator"
  description: "Given a chess piece type and its position on an empty board, list all squares it can legally move to."
  difficulty: 3
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Piece type (K Q R B N P) and position (e.g. e4) on one line"
  output_format: "Sorted list of reachable squares, one per line"
  test_cases:
    - input: "N e4"
      expected_output: "c3\nc5\nd2\nd6\nf2\nf6\ng3\ng5"
    - input: "K a1"
      expected_output: "a2\nb1\nb2"
  constraints: ["Must read from stdin", "Board is 8x8 a1-h8", "Empty board assumed"]

- id: "GAM-009"
  title: "Chess Material Evaluator"
  description: "Evaluate the material balance of a chess position from FEN notation, returning the score difference (positive = white advantage)."
  difficulty: 3
  stdlib_modules: [std.io, std.str]
  input_format: "FEN string (piece placement section only)"
  output_format: "Integer material score (white minus black)"
  test_cases:
    - input: "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR"
      expected_output: "0"
    - input: "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKN1R"
      expected_output: "-3"
  constraints: ["Must read from stdin", "Q=9 R=5 B=3 N=3 P=1", "King has no material value"]

- id: "GAM-010"
  title: "Sudoku Validator"
  description: "Validate whether a completed 9x9 sudoku grid is a valid solution."
  difficulty: 2
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "9 lines of 9 digits (1-9)"
  output_format: "'Valid' or 'Invalid'"
  test_cases:
    - input: "534678912\n672195348\n198342567\n859761423\n426853791\n713924856\n961537284\n287419635\n345286179"
      expected_output: "Valid"
    - input: "534678912\n672195348\n198342567\n859761423\n426853791\n713924856\n961537284\n287419635\n345286178"
      expected_output: "Invalid"
  constraints: ["Must read from stdin", "Check rows, columns, and 3x3 boxes"]

- id: "GAM-011"
  title: "Sudoku Solver"
  description: "Solve a 9x9 sudoku puzzle using backtracking, outputting the completed grid."
  difficulty: 5
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "9 lines of 9 characters (1-9 or . for empty)"
  output_format: "9 lines of 9 digits representing the solution"
  test_cases:
    - input: "53..7....\n6..195...\n.98....6.\n8...6...3\n4..8.3..1\n7...2...6\n.6....28.\n...419..5\n....8..79"
      expected_output: "534678912\n672195348\n198342567\n859761423\n426853791\n713924856\n961537284\n287419635\n345286179"
    - input: ".........\n.........\n.........\n.........\n.........\n.........\n.........\n.........\n........."
      expected_output: "123456789\n456789123\n789123456\n214365897\n365897214\n897214365\n531642978\n642978531\n978531642"
  constraints: ["Must read from stdin", "Exactly one solution guaranteed"]

- id: "GAM-012"
  title: "N-Queens Solver"
  description: "Find all solutions to the N-Queens problem for a given board size N."
  difficulty: 4
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Single integer N"
  output_format: "Number of solutions on first line, then each solution as N space-separated column positions"
  test_cases:
    - input: "4"
      expected_output: "2\n2 4 1 3\n3 1 4 2"
    - input: "1"
      expected_output: "1\n1"
  constraints: ["Must read from stdin", "N between 1 and 12", "Solutions sorted lexicographically"]

- id: "GAM-013"
  title: "Tower of Hanoi Solver"
  description: "Output the sequence of moves to solve the Tower of Hanoi puzzle for N disks."
  difficulty: 2
  stdlib_modules: [std.io, std.str]
  input_format: "Integer N (number of disks)"
  output_format: "One move per line in format 'Move disk D from peg X to peg Y'"
  test_cases:
    - input: "2"
      expected_output: "Move disk 1 from peg A to peg C\nMove disk 2 from peg A to peg B\nMove disk 1 from peg C to peg B"
    - input: "3"
      expected_output: "Move disk 1 from peg A to peg C\nMove disk 2 from peg A to peg B\nMove disk 1 from peg C to peg B\nMove disk 3 from peg A to peg C\nMove disk 1 from peg B to peg A\nMove disk 2 from peg B to peg C\nMove disk 1 from peg A to peg C"
  constraints: ["Must read from stdin", "N between 1 and 15", "Pegs labelled A B C"]

- id: "GAM-014"
  title: "Hangman Game Engine"
  description: "Run one round of hangman: given a word and a sequence of guessed letters, output the masked word and remaining lives."
  difficulty: 2
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Word on first line, guessed letters space-separated on second line"
  output_format: "Masked word (underscores for unguessed) then remaining lives (start 6, lose 1 per wrong guess)"
  test_cases:
    - input: "PYTHON\nP Y O"
      expected_output: "P_T_ON\n5"
    - input: "HELLO\nA B C D"
      expected_output: "_____\n2"
  constraints: ["Must read from stdin", "Uppercase letters only", "6 starting lives"]

- id: "GAM-015"
  title: "Wordle Feedback Generator"
  description: "Given a target word and a guess, output Wordle-style feedback: G (green), Y (yellow), B (black/grey) for each letter."
  difficulty: 2
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Target word on first line, guess on second line (both 5 uppercase letters)"
  output_format: "5-character feedback string using G Y B"
  test_cases:
    - input: "CRANE\nSLATE"
      expected_output: "BBGBB"
    - input: "CRANE\nCRANE"
      expected_output: "GGGGG"
    - input: "CRANE\nCAREL"
      expected_output: "GYBGB"
  constraints: ["Must read from stdin", "Yellow means letter in word but wrong position", "Handle duplicate letters correctly"]

- id: "GAM-016"
  title: "Wordle Solver"
  description: "Given a list of previous guesses with their feedback, output the best next guess from a provided word list."
  difficulty: 4
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Word list (one per line), blank line, then guess:feedback pairs one per line"
  output_format: "Best next guess word"
  test_cases:
    - input: "CRANE\nSLATE\nPOUND\n\nCRANE:BBGBB"
      expected_output: "SLATE"
    - input: "CRANE\nSLATE\n\n"
      expected_output: "CRANE"
  constraints: ["Must read from stdin", "Maximise information entropy", "Output single word"]

- id: "GAM-017"
  title: "Anagram Finder"
  description: "Given a word, find all anagrams of it within a provided dictionary."
  difficulty: 2
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Target word on first line, dictionary words one per line after"
  output_format: "All anagrams sorted alphabetically, one per line"
  test_cases:
    - input: "LISTEN\nENLIST\nTINSEL\nSILENT\nHELLO\nINLETS"
      expected_output: "ENLIST\nINLETS\nSILENT\nTINSEL"
    - input: "CAT\nACT\nTAC\nDOG\nATC"
      expected_output: "ACT\nATC\nTAC"
  constraints: ["Must read from stdin", "Case insensitive", "Exclude the word itself"]

- id: "GAM-018"
  title: "Anagram Chain Builder"
  description: "Given a list of words, find the longest chain where each word is an anagram of the previous."
  difficulty: 4
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Words one per line"
  output_format: "Longest chain words space-separated"
  test_cases:
    - input: "LISTEN\nSILENT\nENLIST\nCAT\nACT\nDOG"
      expected_output: "LISTEN SILENT ENLIST"
    - input: "ABC\nBCA\nCAB\nXYZ"
      expected_output: "ABC BCA CAB"
  constraints: ["Must read from stdin", "Each consecutive pair must be anagrams", "Output first longest found"]

- id: "GAM-019"
  title: "Yahtzee Scorer"
  description: "Given five dice values and a scoring category, calculate the score for that category in Yahtzee."
  difficulty: 2
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Five dice values space-separated on first line, category name on second line"
  output_format: "Integer score"
  test_cases:
    - input: "1 1 1 1 1\nYahtzee"
      expected_output: "50"
    - input: "1 2 3 4 5\nSmall Straight"
      expected_output: "30"
    - input: "3 3 3 2 2\nFull House"
      expected_output: "25"
  constraints: ["Must read from stdin", "Categories: Ones Twos Threes Fours Fives Sixes Three of a Kind Four of a Kind Full House Small Straight Large Straight Yahtzee Chance"]

- id: "GAM-020"
  title: "Yahtzee Optimal Category Selector"
  description: "Given five dice values and a list of remaining scoring categories, recommend the optimal category to score."
  difficulty: 4
  stdlib_modules: [std.io, std.str, std.collections, std.math]
  input_format: "Five dice values on first line, remaining categories one per line"
  output_format: "Best category name"
  test_cases:
    - input: "5 5 5 5 5\nYahtzee\nChance\nFives"
      expected_output: "Yahtzee"
    - input: "1 2 3 4 6\nSmall Straight\nLarge Straight\nChance"
      expected_output: "Small Straight"
  constraints: ["Must read from stdin", "Maximise expected score", "Output single category name"]

- id: "GAM-021"
  title: "Craps Roll Evaluator"
  description: "Evaluate the outcome of a craps roll given the current game state (come-out or point phase)."
  difficulty: 2
  stdlib_modules: [std.io, std.str]
  input_format: "Phase ('comeout' or point number), then two dice values space-separated"
  output_format: "'Win', 'Lose', or 'Point N' indicating the new point"
  test_cases:
    - input: "comeout\n7 4"
      expected_output: "Win"
    - input: "comeout\n2 1"
      expected_output: "Lose"
    - input: "comeout\n4 2"
      expected_output: "Point 6"
    - input: "6\n3 3"
      expected_output: "Win"
  constraints: ["Must read from stdin", "Natural (7,11) wins on come-out", "Craps (2,3,12) loses on come-out"]

- id: "GAM-022"
  title: "24-Game Solver"
  description: "Given four numbers, determine if 24 can be made using each exactly once with +, -, *, / and parentheses."
  difficulty: 4
  stdlib_modules: [std.io, std.str, std.math, std.collections]
  input_format: "Four space-separated integers (1-13)"
  output_format: "An expression equalling 24, or 'Impossible'"
  test_cases:
    - input: "4 1 8 7"
      expected_output: "8 * (7 - (4 * 1))"
    - input: "1 1 1 1"
      expected_output: "Impossible"
    - input: "3 3 8 8"
      expected_output: "8 / (3 - (8 / 3))"
    - input: "5 5 5 5"
      expected_output: "(5 * 5) - (5 / 5)"
    - input: "1 3 4 6"
      expected_output: "6 / (1 - (3 / 4))"
  constraints: ["Must read from stdin", "Use each number exactly once", "Division is real-valued"]

- id: "GAM-023"
  title: "Mastermind Code Breaker"
  description: "Play Mastermind: given a secret code and a guess, return the number of exact (black) and colour-only (white) matches."
  difficulty: 2
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Secret code on first line, guess on second line (4 digits 1-6 each)"
  output_format: "Black pegs count and white pegs count space-separated"
  test_cases:
    - input: "1234\n1256"
      expected_output: "2 0"
    - input: "1234\n4321"
      expected_output: "0 4"
    - input: "1111\n1234"
      expected_output: "1 0"
  constraints: ["Must read from stdin", "Black = right colour right position", "White = right colour wrong position"]

- id: "GAM-024"
  title: "Mastermind AI Solver"
  description: "Implement the Knuth algorithm to solve Mastermind, outputting each guess and the sequence of guesses to crack a code."
  difficulty: 5
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Secret 4-digit code (digits 1-6)"
  output_format: "Each guess on its own line followed by response, then 'Solved in N guesses'"
  test_cases:
    - input: "1234"
      expected_output: "1122 1B0W\n1344 1B1W\n1234 4B0W\nSolved in 3 guesses"
    - input: "6666"
      expected_output: "1122 0B0W\n3344 0B0W\n5566 0B2W\n5665 0B2W\n6556 0B2W\n6666 4B0W\nSolved in 6 guesses"
  constraints: ["Must read from stdin", "Knuth algorithm guarantees <=5 guesses", "Output each guess + response"]

- id: "GAM-025"
  title: "Text Adventure Engine"
  description: "Run a simple text adventure from a map definition file, processing movement commands and tracking player state."
  difficulty: 4
  stdlib_modules: [std.io, std.str, std.collections, std.json]
  input_format: "JSON map on first block (rooms with exits and items), blank line, then commands one per line"
  output_format: "Room description and available exits after each command"
  test_cases:
    - input: "{\"start\":\"hall\",\"rooms\":{\"hall\":{\"desc\":\"A dark hall\",\"exits\":{\"north\":\"garden\"}},\"garden\":{\"desc\":\"A sunny garden\",\"exits\":{\"south\":\"hall\"}}}}\n\nnorth\nlook"
      expected_output: "A sunny garden\nExits: south\nA sunny garden\nExits: south"
    - input: "{\"start\":\"hall\",\"rooms\":{\"hall\":{\"desc\":\"A dark hall\",\"exits\":{}}}}\n\nnorth"
      expected_output: "No exit that way."
  constraints: ["Must read from stdin", "Commands: north south east west up down look", "Track visited rooms"]

- id: "GAM-026"
  title: "Dungeon Room Generator"
  description: "Procedurally generate a dungeon floor layout given dimensions and a seed, outputting an ASCII map."
  difficulty: 4
  stdlib_modules: [std.io, std.str, std.collections, std.crypto]
  input_format: "Width height seed on one line"
  output_format: "ASCII dungeon map using # for walls and . for floor"
  test_cases:
    - input: "20 10 42"
      expected_output: "####################\n#....#.............#\n#....#.............#\n#....###############\n#..................#\n#..................#\n########.####.######\n#..................#\n#..................#\n####################"
    - input: "10 5 1"
      expected_output: "##########\n#........#\n#........#\n#........#\n##########"
  constraints: ["Must read from stdin", "Rooms must be connected", "Border always walls"]

- id: "GAM-027"
  title: "A* Pathfinder"
  description: "Find the shortest path between two points on an ASCII grid using A* search."
  difficulty: 4
  stdlib_modules: [std.io, std.str, std.collections, std.math]
  input_format: "Grid lines (# wall, . floor), blank line, then 'start row col' and 'end row col'"
  output_format: "Path length then grid with path marked as *, or 'No path'"
  test_cases:
    - input: ".....\n.###.\n.....\n\nstart 0 0\nend 2 4"
      expected_output: "8\n*....\n*###.\n****."
    - input: "#####\n#...#\n#####\n\nstart 1 1\nend 1 3"
      expected_output: "2\n#####\n#***#\n#####"
  constraints: ["Must read from stdin", "4-directional movement", "Manhattan distance heuristic"]

- id: "GAM-028"
  title: "Snake Game Line Scorer"
  description: "Given a sequence of snake moves on a grid and food positions, simulate the game and return the final score."
  difficulty: 3
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Grid size on first line, food positions one per line, blank line, move sequence (UDLR)"
  output_format: "Final score and 'Game Over' or 'Alive'"
  test_cases:
    - input: "5\n2 2\n\nRRDDLL"
      expected_output: "0 Alive"
    - input: "5\n1 1\n\nRD"
      expected_output: "1 Alive"
  constraints: ["Must read from stdin", "Snake starts at 0,0 facing right", "Score 1 per food eaten"]

- id: "GAM-029"
  title: "Tetris Line Clearer"
  description: "Given a Tetris board state, identify and remove completed lines, returning the cleared board and score."
  difficulty: 3
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "10 lines of 10 characters (. or X representing empty or filled)"
  output_format: "Lines cleared count, then updated board"
  test_cases:
    - input: "..........\n..........\n..........\n..........\n..........\n..........\n..........\n..........\n..........\nXXXXXXXXXX"
      expected_output: "1\n..........\n..........\n..........\n..........\n..........\n..........\n..........\n..........\n..........\n.........."
    - input: "XXXXXXXXXX\nXXXXXXXXXX\n.........."
      expected_output: "2\n..........\n..........\n.........."
  constraints: ["Must read from stdin", "Full rows cleared and replaced with empty row at top", "Board is exactly 10 wide"]

- id: "GAM-030"
  title: "Tetris Piece Placer"
  description: "Given a Tetris board and a piece type and column, determine the lowest valid row the piece lands in."
  difficulty: 3
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Board lines (. or X), blank line, piece type (I O T S Z J L) and column"
  output_format: "Row number where piece top-left lands (0-indexed), or 'Invalid'"
  test_cases:
    - input: "..........\n..........\n..........\n..........\n.......X..\nXXXXXXXX..\n\nI 0"
      expected_output: "2"
    - input: "..........\nXXXXXXXXXX\n\nO 0"
      expected_output: "Invalid"
  constraints: ["Must read from stdin", "Piece falls to lowest valid position", "Gravity applied"]

- id: "GAM-031"
  title: "Game of Life Step"
  description: "Given a Game of Life grid, compute the next generation according to Conway's rules."
  difficulty: 2
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Grid lines of . (dead) and * (alive)"
  output_format: "Next generation grid"
  test_cases:
    - input: ".....\n.***.\n....."
      expected_output: "..*..\n..*..\n..*.."
    - input: ".**\n.**\n..."
      expected_output: ".**\n.**\n..."
  constraints: ["Must read from stdin", "Standard Conway rules", "Grid edges treated as dead"]

- id: "GAM-032"
  title: "Game of Life Oscillator Detector"
  description: "Run Game of Life for up to 100 generations and detect if the pattern is stable, oscillating, or chaotic."
  difficulty: 3
  stdlib_modules: [std.io, std.str, std.collections]
  input_format: "Grid lines of . and *"
  output_format: "'Stable', 'Oscillator period N', or 'Chaotic'"
  test_cases:
    - input: ".....\n.***.\n....."
      expected_output: "Oscillator period 2"
    - input: ".**\n.**\n..."
      expected_output: "Stable"
  constraints: ["Must read from stdin", "Check up to 100 generations", "Period reported for oscillators"]

- id: "GAM-033"
  title: "Predator-Prey Simulator"
  description: "Simulate a predator-prey ecosystem using Lotka-Volterra equations for N time steps and report population at each step."
  difficulty: 4
  stdlib_modules: [std.io, std.str, std.math]
  input_format: "Initial prey, initial predators, alpha, beta, gamma, delta, steps (space-separated)"
