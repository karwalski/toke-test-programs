- id: "MSG-065"
  title: "Message queue dead letter handling"
  description: "Implement dead letter queue logic: messages that fail delivery N times are moved to DLQ with metadata."
  difficulty: 2
  stdlib_modules: [std.json, std.time, std.str]
  input_format: "Line 1: max retry count. Line 2: JSON array of delivery attempts {msg_id, attempt, success, time}."
  output_format: "Messages in DLQ with failure count and last error time. Messages still active."
  test_cases:
    - input: "3\n[{\"msg_id\":\"m1\",\"attempt\":1,\"success\":false,\"time\":\"10:00\"},{\"msg_id\":\"m1\",\"attempt\":2,\"success\":false,\"time\":\"10:01\"},{\"msg_id\":\"m1\",\"attempt\":3,\"success\":false,\"time\":\"10:02\"},{\"msg_id\":\"m2\",\"attempt\":1,\"success\":true,\"time\":\"10:00\"}]"
      expected_output: "DLQ:\n  m1 (3 failures, last: 10:02)\nDELIVERED:\n  m2 (1 attempt)"
    - input: "2\n[{\"msg_id\":\"a\",\"attempt\":1,\"success\":false,\"time\":\"09:00\"},{\"msg_id\":\"a\",\"attempt\":2,\"success\":true,\"time\":\"09:01\"}]"
      expected_output: "DLQ:\n  (empty)\nDELIVERED:\n  a (2 attempts)"
  constraints: ["Move to DLQ only after max retries exhausted", "Success at any attempt removes from retry queue", "Track all attempt timestamps"]

- id: "MSG-066"
  title: "Message idempotency key generation and validation"
  description: "Generate and validate idempotency keys for message operations to prevent duplicate processing."
  difficulty: 2
  stdlib_modules: [std.crypto, std.time, std.str, std.json]
  input_format: "Line 1: operation (generate/validate). For generate: sender, recipient, content, timestamp. For validate: key and stored keys list."
  output_format: "For generate: idempotency key. For validate: DUPLICATE or UNIQUE."
  test_cases:
    - input: "generate\nalice\nbob\nHello\n2024-01-15T10:00:00Z"
      expected_output: "key: sha256(alice|bob|Hello|2024-01-15T10:00:00Z) = hex_hash"
    - input: "validate\nabc123\n[\"abc123\",\"def456\"]"
      expected_output: "DUPLICATE (matches existing key)"
  constraints: ["Key derived from deterministic hash of inputs", "Include timestamp to allow same content at different times", "Keys expire after 24 hours"]

- id: "MSG-067"
  title: "Conversation summarization metadata"
  description: "Generate conversation summary metadata: message count, active participants, time span, message type distribution."
  difficulty: 1
  stdlib_modules: [std.json, std.time, std.str]
  input_format: "JSON array of messages with sender, type, time fields."
  output_format: "Summary statistics in structured format."
  test_cases:
    - input: "[{\"sender\":\"alice\",\"type\":\"text\",\"time\":\"2024-01-15T10:00:00Z\"},{\"sender\":\"bob\",\"type\":\"text\",\"time\":\"2024-01-15T10:05:00Z\"},{\"sender\":\"alice\",\"type\":\"image\",\"time\":\"2024-01-15T10:10:00Z\"}]"
      expected_output: "messages: 3\nparticipants: 2 (alice: 2, bob: 1)\nduration: 10m\ntypes: text=2, image=1\nfirst: 2024-01-15T10:00:00Z\nlast: 2024-01-15T10:10:00Z"
    - input: "[{\"sender\":\"x\",\"type\":\"text\",\"time\":\"2024-01-01T00:00:00Z\"}]"
      expected_output: "messages: 1\nparticipants: 1 (x: 1)\nduration: 0s\ntypes: text=1\nfirst: 2024-01-01T00:00:00Z\nlast: 2024-01-01T00:00:00Z"
  constraints: ["Handle empty conversation", "Sort participants by message count descending", "Duration in human-readable format"]

- id: "MSG-068"
  title: "Message archive pagination"
  description: "Implement cursor-based pagination for message archive retrieval."
  difficulty: 2
  stdlib_modules: [std.json, std.str]
  input_format: "Line 1: page size. Line 2: cursor (empty for first page). Line 3: JSON array of all messages (id, time, text)."
  output_format: "Page of messages with next/prev cursors."
  test_cases:
    - input: "2\n\n[{\"id\":\"1\",\"time\":\"10:00\",\"text\":\"A\"},{\"id\":\"2\",\"time\":\"10:01\",\"text\":\"B\"},{\"id\":\"3\",\"time\":\"10:02\",\"text\":\"C\"},{\"id\":\"4\",\"time\":\"10:03\",\"text\":\"D\"}]"
      expected_output: "messages: [{\"id\":\"1\",\"text\":\"A\"},{\"id\":\"2\",\"text\":\"B\"}]\nnext_cursor: \"after:2\"\nprev_cursor: null"
    - input: "2\nafter:2\n[{\"id\":\"1\",\"time\":\"10:00\",\"text\":\"A\"},{\"id\":\"2\",\"time\":\"10:01\",\"text\":\"B\"},{\"id\":\"3\",\"time\":\"10:02\",\"text\":\"C\"},{\"id\":\"4\",\"time\":\"10:03\",\"text\":\"D\"}]"
      expected_output: "messages: [{\"id\":\"3\",\"text\":\"C\"},{\"id\":\"4\",\"text\":\"D\"}]\nnext_cursor: null\nprev_cursor: \"before:3\""
  constraints: ["Cursor encodes position opaquely", "Support forward and backward pagination", "Return null cursor when no more pages"]

- id: "MSG-069"
  title: "User blocking and message filtering"
  description: "Filter messages based on a user's block list, suppressing messages from blocked users."
  difficulty: 1
  stdlib_modules: [std.json, std.str]
  input_format: "Line 1: JSON block list [\"user1\",\"user2\"]. Line 2: JSON array of messages with sender and text."
  output_format: "Filtered messages (blocked removed) with count of blocked messages."
  test_cases:
    - input: "[\"spammer\",\"troll\"]\n[{\"sender\":\"alice\",\"text\":\"Hi\"},{\"sender\":\"spammer\",\"text\":\"Buy stuff\"},{\"sender\":\"bob\",\"text\":\"Hello\"},{\"sender\":\"troll\",\"text\":\"Bad\"}]"
      expected_output: "alice: Hi\nbob: Hello\n---\n2 messages blocked from 2 users"
    - input: "[]\n[{\"sender\":\"a\",\"text\":\"X\"}]"
      expected_output: "a: X\n---\n0 messages blocked"
  constraints: ["Case-insensitive username matching", "Preserve message order", "Report per-user block counts"]

- id: "MSG-070"
  title: "Message content encryption with key rotation"
  description: "Encrypt messages using rotating keys, including key version in ciphertext for correct decryption."
  difficulty: 4
  stdlib_modules: [std.crypto, std.str, std.json]
  input_format: "Line 1: JSON key ring [{\"version\":1,\"key\":\"hex\"},{\"version\":2,\"key\":\"hex\"}]. Line 2: active version. Line 3: operation (encrypt/decrypt). Line 4: message or ciphertext."
  output_format: "For encrypt: versioned ciphertext. For decrypt: plaintext with key version used."
  test_cases:
    - input: "[{\"version\":1,\"key\":\"00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff\"},{\"version\":2,\"key\":\"ffeeddccbbaa99887766554433221100ffeeddccbbaa99887766554433221100\"}]\n2\nencrypt\nHello World\n"
      expected_output: "v2:t4uxoNSKzucFCjE="
    - input: "[{\"version\":1,\"key\":\"00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff\"},{\"version\":2,\"key\":\"ffeeddccbbaa99887766554433221100ffeeddccbbaa99887766554433221100\"}]\n1\nencrypt\nThe quick brown fox\n"
      expected_output: "v1:VHlHEzUgDxTjucjJo6qA32Z+Wg=="
    - input: "[{\"version\":1,\"key\":\"00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff\"},{\"version\":2,\"key\":\"ffeeddccbbaa99887766554433221100ffeeddccbbaa99887766554433221100\"}]\n2\ndecrypt\nv1:GHIQIxIRABcGBA8KBg==\n"
      expected_output: "?c2?VDf`����� (decrypted with key v1)"
    - input: "[{\"version\":1,\"key\":\"0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef\"},{\"version\":2,\"key\":\"fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210\"}]\n2\nencrypt\nSecret\n"
      expected_output: "v2:rbnZ6hMg"
  constraints: ["Prefix ciphertext with key version", "Support decryption with any key in ring", "Error on unknown key version", "Active version used for new encryptions only"]

- id: "MSG-071"
  title: "Message queue topic partitioning"
  description: "Partition messages across multiple queue partitions based on a consistent hashing scheme."
  difficulty: 3
  stdlib_modules: [std.crypto, std.str, std.json]
  input_format: "Line 1: number of partitions. Line 2: JSON array of messages with partition_key and text."
  output_format: "Per-partition message assignment with hash values."
  test_cases:
    - input: "4\n[{\"partition_key\":\"user:alice\",\"text\":\"msg1\"},{\"partition_key\":\"user:bob\",\"text\":\"msg2\"},{\"partition_key\":\"user:alice\",\"text\":\"msg3\"}]"
      expected_output: "partition 0: []\npartition 1: [msg2 (user:bob)]\npartition 2: [msg1 (user:alice), msg3 (user:alice)]\npartition 3: []"
    - input: "2\n[{\"partition_key\":\"a\",\"text\":\"X\"},{\"partition_key\":\"b\",\"text\":\"Y\"}]"
      expected_output: "partition 0: [X (a)]\npartition 1: [Y (b)]"
  constraints: ["Same partition key always maps to same partition", "Use consistent hashing (murmur3 or SHA-256 mod N)", "Distribute evenly across partitions"]

- id: "MSG-072"
  title: "Message schema migration"
  description: "Migrate messages from an old schema version to a new one, applying transformation rules."
  difficulty: 2
  stdlib_modules: [std.json, std.str]
  input_format: "Line 1: JSON migration rules {\"rename\":{\"old\":\"new\"},\"add\":{\"field\":\"default\"},\"remove\":[\"field\"]}. Line 2: JSON array of messages in old schema."
  output_format: "JSON array of migrated messages in new schema."
  test_cases:
    - input: "{\"rename\":{\"msg\":\"text\",\"from\":\"sender\"},\"add\":{\"version\":2},\"remove\":[\"legacy_id\"]}\n[{\"msg\":\"Hello\",\"from\":\"alice\",\"legacy_id\":\"x\"}]"
      expected_output: "[{\"text\":\"Hello\",\"sender\":\"alice\",\"version\":2}]"
    - input: "{\"rename\":{},\"add\":{\"type\":\"text\"},\"remove\":[]}\n[{\"content\":\"Hi\"}]"
      expected_output: "[{\"content\":\"Hi\",\"type\":\"text\"}]"
  constraints: ["Apply renames before adds and removes", "Preserve fields not mentioned in rules", "Handle missing source fields for renames gracefully"]

- id: "MSG-073"
  title: "Conversation state machine"
  description: "Implement a conversation state machine tracking states like: idle, composing, sent, delivered, read."
  difficulty: 3
  stdlib_modules: [std.json, std.str]
  input_format: "Line 1: JSON state machine definition {\"states\":[...],\"transitions\":[{\"from\":\"s\",\"to\":\"s\",\"event\":\"e\"},...]}. Line 2: initial state. Following lines: events."
  output_format: "State after each event, or INVALID TRANSITION if not allowed."
  test_cases:
    - input: "{\"states\":[\"idle\",\"composing\",\"sent\",\"delivered\",\"read\"],\"transitions\":[{\"from\":\"idle\",\"to\":\"composing\",\"event\":\"keystroke\"},{\"from\":\"composing\",\"to\":\"sent\",\"event\":\"send\"},{\"from\":\"sent\",\"to\":\"delivered\",\"event\":\"ack\"},{\"from\":\"delivered\",\"to\":\"read\",\"event\":\"read_receipt\"}]}\nidle\nkeystroke\nsend\nack\nread_receipt"
      expected_output: "idle -> composing (keystroke)\ncomposing -> sent (send)\nsent -> delivered (ack)\ndelivered -> read (read_receipt)"
    - input: "{\"states\":[\"idle\",\"composing\",\"sent\"],\"transitions\":[{\"from\":\"idle\",\"to\":\"composing\",\"event\":\"keystroke\"},{\"from\":\"composing\",\"to\":\"sent\",\"event\":\"send\"}]}\nidle\nsend"
      expected_output: "INVALID TRANSITION: idle + send (no valid transition)"
  constraints: ["Reject undefined transitions", "Support self-transitions", "Track transition history"]

- id: "MSG-074"
  title: "Multi-device message sync"
  description: "Synchronize message state across multiple devices using vector clocks for conflict resolution."
  difficulty: 4
  stdlib_modules: [std.json, std.time, std.str]
  input_format: "Line 1: JSON array of device IDs. Line 2: JSON array of sync events {device, msg_id, action, vector_clock}."
  output_format: "Final synchronized state per device and any detected conflicts."
  test_cases:
    - input: "[\"phone\",\"laptop\"]\n[{\"device\":\"phone\",\"msg_id\":\"m1\",\"action\":\"read\",\"clock\":{\"phone\":1}},{\"device\":\"laptop\",\"msg_id\":\"m1\",\"action\":\"delete\",\"clock\":{\"laptop\":1}}]"
      expected_output: "CONFLICT on m1:\n  phone: read {phone:1}\n  laptop: delete {laptop:1}\nresolution: keep both (concurrent)"
    - input: "[\"a\",\"b\"]\n[{\"device\":\"a\",\"msg_id\":\"m1\",\"action\":\"read\",\"clock\":{\"a\":1}},{\"device\":\"b\",\"msg_id\":\"m1\",\"action\":\"read\",\"clock\":{\"a\":1,\"b\":1}}]"
      expected_output: "NO CONFLICT on m1:\n  b supersedes a (causally ordered)\nfinal state: read"
  constraints: ["Use vector clocks for causality", "Detect concurrent modifications as conflicts", "Causally ordered events: later supersedes earlier"]

- id: "MSG-075"
  title: "Certificate pinning validation"
  description: "Validate a server certificate against pinned public key hashes for secure messaging connections."
  difficulty: 3
  stdlib_modules: [std.crypto, std.str, std.json]
  input_format: "Line 1: JSON array of pinned key hashes (SHA-256, base64). Line 2: JSON certificate chain (array of base64 DER certs)."
  output_format: "VALID (matched pin) or INVALID (no pin match) with details."
  test_cases:
    - input: "[\"sha256/base64hash1\",\"sha256/base64hash2\"]\n[\"base64_leaf_cert\",\"base64_intermediate_cert\"]"
      expected_output: "VALID: pin matched at position 0 (leaf certificate)"
    - input: "[\"sha256/unknownhash\"]\n[\"base64_leaf_cert\"]"
      expected_output: "INVALID: no pin matched\nchecked: leaf (sha256/actualhash)"
  constraints: ["Check all certs in chain against pins", "Pin is SHA-256 of SubjectPublicKeyInfo", "Support backup pins", "Report which cert matched"]

- id: "MSG-076"
  title: "Message queue consumer group balancing"
  description: "Implement consumer group partition rebalancing when consumers join or leave."
  difficulty: 3
  stdlib_modules: [std.json, std.str]
  input_format: "Line 1: number of partitions. Line 2: JSON array of events {type: join|leave, consumer: name}."
  output_format: "After each event: partition assignment for all active consumers."
  test_cases:
    - input: "6\n[{\"type\":\"join\",\"consumer\":\"c1\"},{\"type\":\"join\",\"consumer\":\"c2\"},{\"type\":\"join\",\"consumer\":\"c3\"}]"
      expected_output: "after c1 joins: c1=[0,1,2,3,4,5]\nafter c2 joins: c1=[0,1,2], c2=[3,4,5]\nafter c3 joins: c1=[0,1], c2=[2,3], c3=[4,5]"
    - input: "4\n[{\"type\":\"join\",\"consumer\":\"a\"},{\"type\":\"join\",\"consumer\":\"b\"},{\"type\":\"leave\",\"consumer\":\"a\"}]"
      expected_output: "after a joins: a=[0,1,2,3]\nafter b joins: a=[0,1], b=[2,3]\nafter a leaves: b=[0,1,2,3]"
  constraints: ["Use range assignment strategy", "Rebalance on every join/leave", "Even distribution (differ by at most 1)"]

- id: "MSG-077"
  disabled: true
  disabled_reason: "[107-R1-phase-2/failed] non-zero exit (1) on input '3\\nab01cd23ef45678901234567890abcde01234567890abcdef01234567890abcde\\n5\\n': Traceback (most recent call last):\n  File '/tmp/tmprjt04"
