- id: "MSG-001"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: 'encrypted_base64_ciphertext'"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "AES-256 message encryption"
  description: "Encrypt a plaintext message using AES-256-CBC with a provided key and IV, outputting the ciphertext as base64."
  difficulty: 2
  stdlib_modules: [std.crypto, std.str]
  input_format: "Line 1: hex-encoded 256-bit key. Line 2: hex-encoded 128-bit IV. Line 3: plaintext message."
  output_format: "Base64-encoded ciphertext on stdout."
  test_cases:
    - input: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef\n00112233445566778899aabbccddeeff\nHello, World!"
      expected_output: "encrypted_base64_ciphertext"
    - input: "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff\n00000000000000000000000000000000\nTest message"
      expected_output: "encrypted_base64_ciphertext"
  constraints: ["Key must be exactly 256 bits", "IV must be exactly 128 bits", "Use PKCS7 padding"]

- id: "MSG-002"
  disabled: true
  disabled_reason: "[107-R1-phase-2/failed] python printed traceback for input '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef\\n001122334455667'"
  disabled_at: "2026-05-31"
  disabled_by: "107-R1"
  title: "AES-256 message decryption"
  description: "Decrypt a base64-encoded AES-256-CBC ciphertext using a provided key and IV, outputting the original plaintext."
  difficulty: 2
  stdlib_modules: [std.crypto, std.str]
  input_format: "Line 1: hex-encoded 256-bit key. Line 2: hex-encoded 128-bit IV. Line 3: base64-encoded ciphertext."
  output_format: "Decrypted plaintext on stdout."
  test_cases:
    - input: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef\n00112233445566778899aabbccddeeff\nU2FsdGVkX1..."
      expected_output: "Hello, World!"
    - input: "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff\n00000000000000000000000000000000\nbase64_ciphertext"
      expected_output: "Test message"
  constraints: ["Validate padding before output", "Return error on invalid padding", "Handle empty plaintext"]

- id: "MSG-003"
  disabled: true
  disabled_reason: "[non-deterministic] Expected outputs contain literal '...' placeholders, indicating the test harness expects exact string equality against an unfillable template"
  disabled_at: "2026-05-31"
  disabled_by: "107-R1"
  title: "RSA key pair generation"
  description: "Generate an RSA-2048 key pair and output the public and private keys in PEM format."
  difficulty: 3
  stdlib_modules: [std.crypto, std.str]
  input_format: "Line 1: key size in bits (2048 or 4096)."
  output_format: "PEM-encoded private key followed by a blank line, then PEM-encoded public key."
  test_cases:
    - input: "2048"
      expected_output: "-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----\n\n-----BEGIN PUBLIC KEY-----\n...\n-----END PUBLIC KEY-----"
    - input: "4096"
      expected_output: "-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----\n\n-----BEGIN PUBLIC KEY-----\n...\n-----END PUBLIC KEY-----"
  constraints: ["Support 2048 and 4096 bit keys", "Output valid PEM format", "Use secure random number generation"]

- id: "MSG-004"
  disabled: true
  disabled_reason: "[non-deterministic] The test cases expect the literal string 'base64_rsa_ciphertext' as output for two different plaintexts ('Secret' and 'Hello') with truncated/invalid PEM keys ('MIIBI...')"
  disabled_at: "2026-05-31"
  disabled_by: "107-R1"
  title: "RSA message encryption"
  description: "Encrypt a short message using RSA-OAEP with a provided public key."
  difficulty: 3
  stdlib_modules: [std.crypto, std.str]
  input_format: "Line 1: PEM-encoded public key (single line, escaped newlines). Line 2: plaintext message."
  output_format: "Base64-encoded RSA ciphertext."
  test_cases:
    - input: "-----BEGIN PUBLIC KEY-----\\nMIIBI...\\n-----END PUBLIC KEY-----\nSecret"
      expected_output: "base64_rsa_ciphertext"
    - input: "-----BEGIN PUBLIC KEY-----\\nMIIBI...\\n-----END PUBLIC KEY-----\nHello"
      expected_output: "base64_rsa_ciphertext"
  constraints: ["Use OAEP padding with SHA-256", "Message must be shorter than key size minus padding", "Reject oversized messages with error"]

- id: "MSG-005"
  title: "Diffie-Hellman key exchange simulation"
  description: "Simulate a Diffie-Hellman key exchange between two parties, outputting the shared secret."
  difficulty: 3
  stdlib_modules: [std.crypto, std.str]
  input_format: "Line 1: prime p (decimal). Line 2: generator g (decimal). Line 3: Alice's private key a (decimal). Line 4: Bob's private key b (decimal)."
  output_format: "Line 1: Alice's public key. Line 2: Bob's public key. Line 3: shared secret."
  test_cases:
    - input: "23\n5\n6\n15"
      expected_output: "8\n19\n2"
    - input: "97\n5\n36\n58"
      expected_output: "50\n44\n75"
  constraints: ["Validate that p is prime", "Validate that g is a primitive root mod p", "Use modular exponentiation"]

- id: "MSG-006"
  disabled: true
  disabled_reason: "[PLACEHOLDER] test_cases admit trivially-hardcoded constants. Expected sample: 'alice_pub_hex\\nbob_pub_hex\\nshared_secret_hex\\naes_key_hex'"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "ECDH key exchange"
  description: "Perform an Elliptic Curve Diffie-Hellman key exchange using P-256, deriving a shared AES key."
  difficulty: 4
  stdlib_modules: [std.crypto, std.str]
  input_format: "Line 1: Alice's private key (hex). Line 2: Bob's private key (hex)."
  output_format: "Line 1: Alice's public key (hex, uncompressed). Line 2: Bob's public key (hex, uncompressed). Line 3: derived shared secret (hex). Line 4: derived AES-256 key (hex, SHA-256 of shared secret)."
  test_cases:
    - input: "c9afa9d845ba75166b5c215767b1d6934e50c3db36e89b127b8a622b120f6721\n60fc7b12d663b64c1d62de0e2b263b34892a416b3697bd0a96c4e7ad4e6c821a\n"
      expected_output: "0460fed4ba255a9d31c961eb74c6356d68c049b8923b61fa6ce669622e60f29fb67903fe1008b8bc99a41ae9e95628bc64f2f1b20c2d7e9f5177a3c294d4462299\n044d093b866a5bc9e1f97f95de9d005ce9843fa0e32b4586f7e4b504b87c810a29ba06b5826c4fcb35edfa6c6707b8043596d77b13ec558c2750fc96a3b3d52423\nca34be19a613804cfe421d961989ec1f0fb65f881ece0c7c8c84d121397bcdaa\n84f603a599f9e046e92e188bbdf578862a833e3adfa0db2aa469e9ecb72407a8"
