- id: "SEC-086"
  title: "Network Reconnaissance Reporter"
  description: "Reads a CIDR range from stdin. Performs host discovery (ICMP/TCP ping), OS fingerprinting via TTL analysis, and open service identification. Generates a recon report."
  difficulty: 4
  stdlib_modules: [std.net, std.str, std.json, std.time]
  input_format: "First line: CIDR range. Second line: concurrency"
  output_format: "JSON {hostsScanned, hostsUp: [{ip, ttl, likely_os, open_ports: [...], banners: {...}}], summary}"
  test_cases:
    - input: "127.0.0.0/8\n50"
      expected_output: "hostsScanned"
    - input: "192.168.1.0/24\n20"
      expected_output: "hostsUp"
  constraints:
    - "TTL OS guess: >100 = Windows, 64 = Linux/macOS, 255 = network device"
    - "Must limit to RFC 1918 and loopback ranges only"
    - "Open ports: only check common service ports (22, 80, 443, 3306, 5432, 6379, 8080)"

- id: "SEC-087"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: 'baseline_ms:'"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "Blind SQL Injection Time-Based Tester"
  description: "Reads a URL with a {INJECT} placeholder from stdin. Tests for time-based blind SQL injection by measuring response times when sleep/waitfor SQL commands are injected."
  difficulty: 4
  stdlib_modules: [std.http, std.str, std.json, std.time]
  input_format: "Single line: URL with {INJECT} placeholder"
  output_format: "Per payload: baseline_ms, injected_ms, time_delta. VULNERABLE if delta > 4000ms."
  test_cases:
    - input: "http://localhost:8083/users?id={INJECT}"
      expected_output: "baseline_ms:"
    - input: "https://api.example.com/products?name={INJECT}"
      expected_output: "baseline_ms:"
  constraints:
    - "Test payloads: 1; WAITFOR DELAY '0:0:5', 1 AND SLEEP(5), 1' AND SLEEP(5)--"
    - "Must test MySQL, MSSQL, and PostgreSQL sleep variants"
    - "Baseline: 5 requests without injection, average time"

- id: "SEC-088"
  title: "Kubernetes RBAC Auditor"
  description: "Reads a JSON dump of Kubernetes RBAC policies (ClusterRoles, Roles, Bindings) from stdin. Audits for over-privileged service accounts, wildcard permissions, and privilege escalation paths."
  difficulty: 4
  stdlib_modules: [std.json, std.str]
  input_format: "JSON {clusterRoles: [...], roles: [...], clusterRoleBindings: [...], roleBindings: [...]}"
  output_format: "JSON {findings: [{severity, subject, permission, issue, recommendation}], riskScore}"
  test_cases:
    - input: "{\"clusterRoles\":[{\"name\":\"admin-role\",\"rules\":[{\"apiGroups\":[\"*\"],\"resources\":[\"*\"],\"verbs\":[\"*\"]}]}],\"roles\":[],\"clusterRoleBindings\":[{\"name\":\"admin-binding\",\"roleRef\":\"admin-role\",\"subjects\":[{\"kind\":\"ServiceAccount\",\"name\":\"default\"}]}],\"roleBindings\":[]}"
      expected_output: "wildcard"
    - input: "{\"clusterRoles\":[],\"roles\":[],\"clusterRoleBindings\":[],\"roleBindings\":[]}"
      expected_output: "riskScore"
  constraints:
    - "Critical: wildcard verbs/resources/apiGroups, default service account in high-privilege binding"
    - "High: secrets read access, pod exec, privilege escalation verbs (impersonate, escalate, bind)"

- id: "SEC-089"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: 'alerts'"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "OWASP ZAP-style Passive Scanner"
  description: "Reads HTTP response pairs (request + response) from stdin. Passively analyses them for security issues without sending additional requests: information disclosure, insecure redirects."
