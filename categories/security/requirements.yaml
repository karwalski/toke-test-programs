- id: "SEC-077"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: 'server_behaviour'"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "HTTP Parameter Pollution Tester"
  description: "Reads a URL from stdin. Tests for HTTP Parameter Pollution vulnerabilities by sending duplicate parameters with different values and observing which value the server uses."
  difficulty: 3
  stdlib_modules: [std.http, std.str, std.json]
  input_format: "Single line: URL (may include query params)"
  output_format: "JSON {parameter, test_values, server_behaviour (first|last|all|error), vulnerable, potential_impact}"
  test_cases:
    - input: "https://api.example.com/search?q=safe"
      expected_output: "server_behaviour"
    - input: "http://localhost:8083/users?role=user"
      expected_output: "server_behaviour"
  constraints:
    - "Test: ?param=value1&param=value2 and ;param=value2"
    - "Must detect privilege escalation risk (role=user&role=admin)"

- id: "SEC-078"
  title: "Security Misconfiguration Detector"
  description: "Reads a JSON configuration file from stdin (server config, app config, database config). Detects security misconfigurations: debug mode on, default credentials, weak settings."
  difficulty: 3
  stdlib_modules: [std.json, std.str, std.file]
  input_format: "First line: config type (server|app|database|all). Remaining lines: JSON config until EOF"
  output_format: "JSON {findings: [{path, value_redacted, issue, severity, recommendation}], risk_score}"
  test_cases:
    - input: "app\n{\"debug\":true,\"secret_key\":\"development-only-secret\",\"allowed_hosts\":[\"*\"]}"
      expected_output: "debug"
    - input: "database\n{\"host\":\"localhost\",\"user\":\"root\",\"password\":\"\",\"ssl\":false}"
      expected_output: "password"
  constraints:
    - "Detect: debug=true, secret_key with 'dev'/'test'/'default', allowed_hosts=*, empty passwords, SSL disabled, default ports with default creds"

- id: "SEC-079"
  title: "Certificate Transparency Monitor"
  description: "Reads a domain from stdin. Queries crt.sh for recent certificates and alerts on any certificates issued by unexpected CAs or with unexpected SANs."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.str, std.time]
  input_format: "First line: domain. Second line: JSON array of allowed CA names"
  output_format: "JSON {domain, totalCerts, alertCerts: [{issuer, commonName, notBefore, reason}], summary}"
  test_cases:
    - input: "example.com\n[\"Let's Encrypt\",\"DigiCert\"]"
      expected_output: "totalCerts"
    - input: "github.com\n[\"DigiCert Inc\"]"
      expected_output: "summary"
  constraints:
    - "Alert if certificate issued by CA not in allowed list"
    - "Alert if wildcard cert issued for single-level wildcard on TLD"
    - "Must show certs issued in last 90 days"

