- id: "SEC-033"
  title: "CORS Misconfiguration Checker"
  description: "Reads a URL from stdin. Sends CORS preflight requests with various origins (null, evil.com, subdomain.target.com, attacker.target.com) and identifies permissive CORS policies."
  difficulty: 3
  stdlib_modules: [std.http, std.str, std.json]
  input_format: "Single line: URL to test"
