- id: "SEC-018"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: '['"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "Encryption Key Auditor"
  description: "Reads a directory path from stdin. Scans for key files (*.pem, *.key, *.p12, *.pfx, id_rsa, id_ecdsa). Analyses each: key type, size, passphrase-protected, world-readable permissions."
  difficulty: 3
  stdlib_modules: [std.file, std.str, std.crypto, std.json]
  input_format: "Single line: directory path to scan"
  output_format: "JSON array of {path, keyType, keyBits, passphraseProtected, permissions, issues: [...]}"
  test_cases:
    - input: "/tmp/keys"
      expected_output: "["
    - input: "/home/user/.ssh"
      expected_output: "["
  constraints:
    - "Issues: world-readable (critical), no passphrase on private key (warn), key <2048 bits (critical), key <4096 bits (warn)"
    - "Must recurse directories"
    - "Must not print key contents"

- id: "SEC-019"
  title: "Access Log Analyser"
  description: "Reads an nginx/Apache Combined Log Format access log from stdin. Produces a security-focused analysis: top IPs, suspicious user agents, path traversal attempts, anomalous request rates."
  difficulty: 3
  stdlib_modules: [std.file, std.str, std.json, std.time]
  input_format: "First line: log file path. Second line: analysis window in hours"
  output_format: "JSON {top_ips: [...], suspicious_agents: [...], traversal_attempts: [...], rate_anomalies: [...], summary}"
  test_cases:
    - input: "/tmp/access.log\n24"
      expected_output: "summary"
    - input: "/tmp/nginx.log\n1"
      expected_output: "top_ips"
  constraints:
    - "Combined Log Format: <ip> - - [<date>] \"<method> <path> <proto>\" <status> <size> \"<referer>\" \"<ua>\""
    - "Traversal patterns: ../, %2e%2e, ..%2f"
    - "Rate anomaly: >100 req/min from single IP"

- id: "SEC-020"
  title: "Intrusion Detection System (IDS) Rule Matcher"
  description: "Reads Snort-like rules from stdin, then reads network packet summaries and checks them against the rules. Reports matches with rule ID, severity, and description."
  difficulty: 4
  stdlib_modules: [std.str, std.json, std.net]
  input_format: "First block: rules (one per line, blank to finish). Second block: packet summaries (JSON, one per line)"
  output_format: "Per matching packet: {ruleId, packetSummary, severity, description}"
  test_cases:
    - input: "alert tcp any any -> any 22 (msg:\"SSH scan\"; threshold:type both,track by_src,count 5,seconds 60;)\n\n{\"proto\":\"tcp\",\"src\":\"1.2.3.4\",\"dst\":\"10.0.0.1\",\"dport\":22}\n"
      expected_output: "SSH scan"
    - input: "alert tcp any any -> any 80 (msg:\"HTTP flood\";)\n\n{\"proto\":\"tcp\",\"src\":\"5.6.7.8\",\"dst\":\"10.0.0.2\",\"dport\":80}\n"
      expected_output: "HTTP flood"
  constraints:
    - "Support rule fields: alert/log/pass, proto, src/dst CIDR, src/dst port, msg"
    - "Support threshold: count per time window"

- id: "SEC-021"
  disabled: true
  disabled_reason: "[requires-network] auto-flagged from spec scan: 'HTTP server that pretends to be a vulnerable app (fake admin login, phpinfo, .env, wp-admin). Logs all access attempts with IP, user agent,"
  disabled_at: "2026-06-01"
  disabled_by: "107-R2-spec-scan"
  title: "Honeypot Request Logger"
  description: "HTTP server that pretends to be a vulnerable app (fake admin login, phpinfo, .env, wp-admin). Logs all access attempts with IP, user agent, and payload for threat intelligence."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.str, std.time, std.file]
  input_format: "First line: port. Second line: log file path"
  output_format: "Prints 'Honeypot listening on :<port>'. Logs each attempt as JSON to file."
  test_cases:
    - input: "8200\n/tmp/honeypot.log"
      expected_output: "Honeypot listening on :8200"
    - input: "8201\n/tmp/trap.log"
      expected_output: "Honeypot listening on :8201"
  constraints:
    - "Must respond with plausible decoy content (fake login page, fake env file)"
    - "Must never return real system information"
    - "Lure paths: /admin, /login, /.env, /wp-admin, /phpinfo.php, /.git/config"

- id: "SEC-022"
  title: "TLS Configuration Validator"
  description: "Reads a host:port from stdin. Tests the TLS configuration for weak cipher suites, old protocol versions (SSLv3, TLS 1.0, TLS 1.1), and missing features (forward secrecy, HSTS)."
  difficulty: 4
  stdlib_modules: [std.net, std.crypto, std.str, std.json, std.time]
  input_format: "Single line: host:port"
  output_format: "JSON {host, protocols: {TLS13, TLS12, TLS11, TLS10, SSL3}, weakCiphers: [...], forwardSecrecy, hsts, grade (A+|A|B|C|F)}"
  test_cases:
    - input: "example.com:443"
      expected_output: "grade"
    - input: "tls-v1-0.badssl.com:1010"
      expected_output: "C"
  constraints:
    - "Must test each protocol version separately"
    - "Weak ciphers: RC4, DES, 3DES, export ciphers, NULL ciphers"
    - "A+ requires TLS 1.3 only, no weak ciphers, HSTS with preload"

- id: "SEC-023"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: '['"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "Vulnerability Pattern Scanner"
  description: "Reads a source code file path from stdin. Scans for common vulnerability patterns: hardcoded credentials, insecure functions, missing input validation, TODO security items."
  difficulty: 3
  stdlib_modules: [std.file, std.str, std.json]
  input_format: "First line: file path. Second line: language (python|javascript|java|go|toke|any)"
  output_format: "JSON array of {line, col, severity, rule_id, description, snippet (truncated)}"
  test_cases:
    - input: "/tmp/app.py\npython"
      expected_output: "["
    - input: "/tmp/server.js\njavascript"
      expected_output: "["
  constraints:
    - "Detect: hardcoded passwords (password=, secret=, api_key=), eval(), exec(), system(), shell=True, MD5/SHA1 for passwords"
    - "Detect: SQL string concatenation, http:// URLs in code, TODO:.*security"

- id: "SEC-024"
  title: "JWT Security Auditor"
  description: "Reads one or more JWT tokens from stdin. Audits each for security issues: algorithm confusion (none, RS256 vs HS256), missing claims (exp, iss, aud), weak signatures."
  difficulty: 4
  stdlib_modules: [std.str, std.json, std.crypto, std.time]
  input_format: "Lines of JWT tokens until EOF"
  output_format: "Per token: JSON {tokenIndex, algorithm, issues: [{id, severity, description}], risk_score (0-100)}"
  test_cases:
    - input: "eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiIxMjM0In0."
      expected_output: "none_algorithm"
    - input: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
      expected_output: "issues"
  constraints:
    - "Critical issues: alg=none, missing exp, missing iss"
    - "High: exp >24h, missing aud, HS256 with short key"
    - "Must detect and flag algorithm=none as critical"

- id: "SEC-025"
  title: "Password Hash Auditor"
  description: "Reads a password hash database (CSV: user,hash,algorithm) from stdin. Audits for weak or deprecated algorithms (MD5, SHA1, unsalted, bcrypt cost <10)."
  difficulty: 3
  stdlib_modules: [std.crypto, std.str, std.json, std.file]
  input_format: "CSV lines: username,hash,algorithm until EOF"
  output_format: "JSON {total, flagged, findings: [{username, algorithm, issue, severity, recommendation}]}"
  test_cases:
    - input: "alice,5f4dcc3b5aa765d61d8327deb882cf99,md5\nbob,$2b$10$hash,bcrypt\n"
      expected_output: "md5"
    - input: "charlie,$2b$04$hash,bcrypt\n"
      expected_output: "low_cost"
  constraints:
    - "Critical: MD5, SHA1, SHA256 (unsalted)"
    - "High: bcrypt cost <10, scrypt N<16384"
    - "Recommended: bcrypt cost >=12, argon2id"
    - "Must not attempt to crack hashes"

- id: "SEC-026"
  title: "Network WHOIS Lookup Tool"
  description: "Reads an IP address or domain from stdin. Performs a WHOIS-style lookup (using RDAP if available, falling back to raw WHOIS) and presents ownership, abuse contact, and registration dates."
  difficulty: 3
  stdlib_modules: [std.net, std.http, std.str, std.json, std.time]
  input_format: "Single line: IP address or domain name"
  output_format: "JSON {registrant, organization, country, asnumber, registrationDate, expiryDate, abuseContact, nameservers}"
  test_cases:
    - input: "8.8.8.8"
      expected_output: "organization"
    - input: "example.com"
      expected_output: "registrant"
  constraints:
    - "Use RDAP (https://rdap.org) first, fall back to parsing raw WHOIS"
    - "Must handle rate limiting from WHOIS servers"

