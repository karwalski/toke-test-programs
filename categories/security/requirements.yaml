  description: "Reads HTTP request/response pairs from stdin (JSON format). Checks each pair against OWASP Top 10 rules and flags violations with remediation advice."
  difficulty: 4
  stdlib_modules: [std.json, std.str, std.http, std.crypto]
  input_format: "JSON array of {request: {method, url, headers, body}, response: {status, headers, body}}"
  output_format: "JSON {findings: [{owasp_id, title, severity, evidence, remediation}]}"
  test_cases:
    - input: "[{\"request\":{\"method\":\"GET\",\"url\":\"http://api.example.com/users?id=1 OR 1=1\",\"headers\":{},\"body\":null},\"response\":{\"status\":200,\"headers\":{},\"body\":\"[...users...]\"}]"
      expected_output: "A03"
    - input: "[{\"request\":{\"method\":\"GET\",\"url\":\"http://api.example.com/health\",\"headers\":{},\"body\":null},\"response\":{\"status\":200,\"headers\":{\"x-content-type-options\":\"nosniff\"},\"body\":\"ok\"}}]"
      expected_output: "findings"
  constraints:
    - "Check at minimum: A01 Broken Access Control, A02 Cryptographic Failures, A03 Injection, A05 Security Misconfiguration, A07 Auth Failures"
