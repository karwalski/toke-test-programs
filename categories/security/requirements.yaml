- id: "SEC-124"
  title: "Network Segmentation Validator"
  description: "Reads a network topology (JSON) and security policy from stdin. Validates that the segmentation rules are correctly implemented by testing connectivity between segments."
  difficulty: 4
  stdlib_modules: [std.net, std.str, std.json, std.time]
