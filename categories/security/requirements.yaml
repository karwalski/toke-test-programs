# Security requirements
# SEC-001 to SEC-130

- id: "SEC-001"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: 'Summary:'"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "Port Scanner"
  description: "Reads a host and port range from stdin, attempts TCP connections to each port concurrently, and reports open/closed/filtered status with service guesses."
  difficulty: 3
  stdlib_modules: [std.net, std.str, std.time, std.json]
  input_format: "First line: host. Second line: port range (e.g. 1-1024). Third line: concurrency"
  output_format: "OPEN: <port> (<service_guess>) per open port. Summary: N open found in Xs."
  test_cases:
    - input: "localhost\n80-100\n20"
      expected_output: "Summary:"
    - input: "127.0.0.1\n8080-8090\n10"
      expected_output: "Summary:"
  constraints:
    - "Timeout per port: 2 seconds"
    - "Filtered = no response within timeout"
    - "Service guesses based on well-known ports"

- id: "SEC-002"
  title: "Password Strength Analyser"
  description: "Reads a password from stdin and analyses its strength: length, character diversity, common patterns, dictionary words, and entropy. Returns a score and suggestions."
  difficulty: 2
  stdlib_modules: [std.str, std.crypto, std.json]
  input_format: "Single line: password"
  output_format: "JSON {score (0-100), strength (weak|fair|strong|very_strong), entropy_bits, issues: [...], suggestions: [...]}"
  test_cases:
    - input: "password123"
      expected_output: "weak"
    - input: "C0rr3ct-H0rs3-B@tt3ry-St4pl3!"
      expected_output: "very_strong"
  constraints:
    - "Penalise: common words, keyboard patterns (qwerty), repeated chars"
    - "Entropy = log2(charset_size ^ length)"
    - "Must check against top-1000 common passwords list"

- id: "SEC-003"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: '['"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "Brute-Force Attack Detector"
  description: "Reads an access log file path from stdin. Analyses the log for brute-force patterns: >10 failed logins from same IP within 5 minutes. Reports suspicious IPs."
  difficulty: 3
  stdlib_modules: [std.file, std.str, std.json, std.time]
  input_format: "Single line: log file path"
  output_format: "JSON array of {ip, failedAttempts, firstSeen, lastSeen, recommendation: 'block'|'monitor'}"
  test_cases:
    - input: "/tmp/access.log"
      expected_output: "["
    - input: "/tmp/auth.log"
      expected_output: "["
  constraints:
    - "Log format: <timestamp> <ip> <user> <result> (space-separated)"
    - "block if >10 attempts/5min; monitor if 5-10"
    - "Must show attempt window timeline"

- id: "SEC-004"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: '['"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "Log Analyser for Security Events"
  description: "Reads a log file path from stdin. Scans for security-relevant patterns: privilege escalation, suspicious commands (curl|wget piped to bash), file permission changes, cron modifications."
  difficulty: 3
  stdlib_modules: [std.file, std.str, std.json, std.time]
  input_format: "Single line: log file path"
  output_format: "JSON array of {timestamp, severity (info|warn|critical), event_type, line, recommendation}"
  test_cases:
    - input: "/tmp/syslog"
      expected_output: "["
    - input: "/tmp/auth.log"
      expected_output: "["
  constraints:
    - "Patterns to detect: sudo, su, chmod 777, curl.*sh, wget.*sh, /etc/cron, /etc/passwd"
    - "Severity: critical for shell-pipe downloads; warn for sudo; info for permission changes"

- id: "SEC-005"
  title: "Firewall Rule Validator"
  description: "Reads a JSON list of firewall rules from stdin. Validates them for correctness, conflicts, redundancy, and shadow rules. Reports issues with severity."
  difficulty: 4
  stdlib_modules: [std.json, std.str, std.net]
  input_format: "JSON array of {id, action (allow|deny), protocol, src_cidr, dst_cidr, port_range, priority}"
  output_format: "JSON {valid: bool, issues: [{ruleId, issue_type, description, severity}]}"
  test_cases:
    - input: "[{\"id\":1,\"action\":\"allow\",\"protocol\":\"tcp\",\"src_cidr\":\"0.0.0.0/0\",\"dst_cidr\":\"10.0.0.1/32\",\"port_range\":\"80\",\"priority\":100}]"
      expected_output: "valid"
    - input: "[{\"id\":1,\"action\":\"allow\",\"protocol\":\"tcp\",\"src_cidr\":\"0.0.0.0/0\",\"dst_cidr\":\"0.0.0.0/0\",\"port_range\":\"0-65535\",\"priority\":1}]"
      expected_output: "issues"
  constraints:
    - "Detect: shadow rules (higher-priority rule makes lower one unreachable), allow-all rules, duplicate rules"
    - "Must check CIDR notation validity"

- id: "SEC-006"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: 'private'"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "IP Reputation Checker"
  description: "Reads a list of IP addresses from stdin. Checks each against built-in threat intel patterns (known Tor exit nodes prefix list, private RFC 1918, loopback, APIPA, documentation ranges) and classifies reputation."
  difficulty: 2
  stdlib_modules: [std.net, std.str, std.json]
  input_format: "Lines of IP addresses until EOF"
  output_format: "Per IP: JSON {ip, reputation (clean|suspicious|malicious|private|reserved), reason}"
  test_cases:
    - input: "127.0.0.1\n192.168.1.1\n8.8.8.8\n"
      expected_output: "private"
    - input: "10.0.0.1\n172.16.0.1\n1.1.1.1\n"
      expected_output: "private"
  constraints:
    - "Must classify: RFC 1918 (10/8, 172.16/12, 192.168/16), loopback, APIPA (169.254/16), documentation (192.0.2/24, 198.51.100/24, 203.0.113/24)"
    - "Must handle IPv6 addresses"

- id: "SEC-007"
  title: "File Integrity Monitor"
  description: "Reads a directory path from stdin. Computes SHA-256 hashes of all files and stores a baseline. On second run with same dir, compares against baseline and reports changes."
  difficulty: 3
  stdlib_modules: [std.file, std.crypto, std.str, std.json, std.time]
  input_format: "First line: directory path. Second line: mode (baseline|check)"
  output_format: "baseline mode: saves hashes to <dir>/.fim-baseline.json. check mode: prints ADDED/MODIFIED/DELETED per changed file."
  test_cases:
    - input: "/tmp/monitored\nbaseline"
      expected_output: "Baseline saved"
    - input: "/tmp/monitored\ncheck"
      expected_output: "No changes detected"
  constraints:
    - "Must recurse subdirectories"
    - "Must record file size, permissions, and modification time alongside hash"
    - "Must exclude .fim-baseline.json from monitoring"

- id: "SEC-008"
  title: "Role-Based Access Control (RBAC) Engine"
  description: "Reads an RBAC policy (roles, permissions, role-user assignments) and an access check request from stdin. Evaluates whether the user is permitted to perform the action."
  difficulty: 4
  stdlib_modules: [std.json, std.str]
  input_format: "First block: JSON policy {roles, permissions, assignments}. Blank line. Second block: {user, action, resource}"
  output_format: "PERMIT or DENY with the matching rule (or 'no matching rule') as JSON"
  test_cases:
    - input: "{\"roles\":{\"admin\":[\"read\",\"write\",\"delete\"]},\"assignments\":{\"alice\":[\"admin\"]}}\n\n{\"user\":\"alice\",\"action\":\"delete\",\"resource\":\"/data\"}"
      expected_output: "PERMIT"
    - input: "{\"roles\":{\"viewer\":[\"read\"]},\"assignments\":{\"bob\":[\"viewer\"]}}\n\n{\"user\":\"bob\",\"action\":\"write\",\"resource\":\"/data\"}"
      expected_output: "DENY"
  constraints:
    - "Must support role inheritance (role can extend another role)"
    - "Explicit DENY overrides any PERMIT"
    - "Unknown users default to DENY"

- id: "SEC-009"
  title: "Session Management Auditor"
  description: "Reads a JSON dump of active sessions from stdin. Audits for security issues: sessions without expiry, sessions older than 24h, concurrent sessions from different countries, suspicious user agents."
  difficulty: 3
  stdlib_modules: [std.json, std.str, std.time]
  input_format: "JSON array of {sessionId, userId, createdAt, lastActiveAt, ip, userAgent, expiresAt}"
  output_format: "JSON {issues: [{sessionId, issue_type, severity, recommendation}], summary: {total, flagged}}"
  test_cases:
    - input: "[{\"sessionId\":\"s1\",\"userId\":\"u1\",\"createdAt\":\"2020-01-01T00:00:00Z\",\"lastActiveAt\":\"2020-01-01T00:00:00Z\",\"ip\":\"1.2.3.4\",\"userAgent\":\"Mozilla/5.0\",\"expiresAt\":null}]"
      expected_output: "issues"
    - input: "[{\"sessionId\":\"s2\",\"userId\":\"u2\",\"createdAt\":\"2025-01-01T00:00:00Z\",\"lastActiveAt\":\"2025-01-01T01:00:00Z\",\"ip\":\"10.0.0.1\",\"userAgent\":\"Mozilla/5.0\",\"expiresAt\":\"2025-01-02T00:00:00Z\"}]"
      expected_output: "summary"
  constraints:
    - "Flag: no expiry, idle >8h, created >24h ago with no expiry, userAgent changes mid-session"
    - "Severity: critical for no-expiry, warn for idle, info for old sessions"

- id: "SEC-010"
  title: "CSRF Token Generator and Validator"
  description: "Generates CSRF tokens tied to session IDs using HMAC. Reads a command (generate|validate) and session ID from stdin. On validate, also reads the token to check."
  difficulty: 3
  stdlib_modules: [std.crypto, std.str, std.time, std.json]
  input_format: "First line: command (generate|validate). Second line: session ID. Third line (validate only): token to verify"
  output_format: "generate: JSON {token, expiresAt}. validate: VALID or INVALID with reason"
  test_cases:
    - input: "generate\nsession-abc123\n"
      expected_output: "{\"expiresAt\": 1700003600, \"token\": \"9+oX2o9kXgMehJDR803UQRVpTynGMiQQ8tvc/Nshnv0=\"}"
    - input: "generate\nsession-xyz789\n"
      expected_output: "{\"expiresAt\": 1700003600, \"token\": \"bIyG/DOMKWGGZb12oSt6xPRtZxJ+XL89h9vklp8zI6Q=\"}"
    - input: "validate\nsession-abc123\ninvalid-token\n"
      expected_output: "INVALID: token mismatch"
    - input: "validate\nsession-abc123\n"
      expected_output: "INVALID: missing token"
  constraints:
    - "Token = base64(HMAC-SHA256(sessionId + timestamp, secret))"
    - "Tokens expire after 1 hour"
    - "Must detect token reuse after validation (single-use tokens)"

- id: "SEC-011"
  title: "Input Sanitiser"
  description: "Reads a raw user input string from stdin. Sanitises it for safe use in HTML, SQL, shell commands, and file paths. Returns sanitised versions and a summary of what was removed."
  difficulty: 3
  stdlib_modules: [std.str, std.json, std.crypto]
  input_format: "First line: context (html|sql|shell|filepath|all). Second line: raw input"
  output_format: "JSON {original, sanitised, removedPatterns: [{pattern, count, context}]}"
  test_cases:
    - input: "html\n<script>alert('xss')</script>"
      expected_output: "&lt;script&gt;"
    - input: "sql\nSELECT * FROM users WHERE id='1' OR '1'='1'"
      expected_output: "sanitised"
  constraints:
    - "HTML: escape <, >, &, \", '"
    - "SQL: escape quotes, remove/neutralise SQL keywords"
    - "Shell: escape metacharacters: ; | & $ ` ( ) { } [ ] < >"
    - "Filepath: remove .. sequences, null bytes, absolute path prefixes"

- id: "SEC-012"
  disabled: true
  disabled_reason: "[requires-network] auto-flagged from spec scan: 'Reads HTTP request logs (or raw SQL queries) from stdin and identifies SQL injection patterns. Classifies attack types and suggests paramet"
  disabled_at: "2026-06-01"
