- id: "SEC-035"
  title: "Two-Factor Authentication TOTP Generator/Validator"
  description: "Reads a TOTP secret and command (generate|validate) from stdin. Generates a current TOTP code or validates a provided code against the secret."
  difficulty: 3
  stdlib_modules: [std.crypto, std.str, std.time, std.json]
  input_format: "First line: base32 TOTP secret. Second line: command (generate|validate). Third line (validate): 6-digit code"
  output_format: "generate: current TOTP code and seconds remaining. validate: VALID or INVALID"
  test_cases:
    - input: "JBSWY3DPEHPK3PXP\ngenerate"
      expected_output: "Code:"
    - input: "JBSWY3DPEHPK3PXP\nvalidate\n000000"
      expected_output: "INVALID"
  constraints:
    - "RFC 6238 TOTP: HMAC-SHA1, 30-second steps, 6-digit codes"
    - "Validation allows 1 step clock drift (±30s)"
    - "Must be time-constant in comparison"

- id: "SEC-036"
  title: "Clickjacking Detector"
  description: "Reads a URL from stdin. Checks if the page is vulnerable to clickjacking by inspecting X-Frame-Options and Content-Security-Policy frame-ancestors directive."
  difficulty: 2
  stdlib_modules: [std.http, std.str, std.json]
  input_format: "Single line: URL"
  output_format: "JSON {url, protected, method (X-Frame-Options|CSP|none), value, vulnerable, recommendation}"
  test_cases:
    - input: "https://github.com"
      expected_output: "protected"
    - input: "http://example.com"
      expected_output: "vulnerable"
  constraints:
    - "X-Frame-Options: DENY or SAMEORIGIN = protected"
    - "CSP frame-ancestors 'none' or 'self' = protected"
    - "Missing both = vulnerable"

- id: "SEC-037"
  title: "Cryptographic Weakness Detector"
  description: "Reads source code from stdin. Scans for uses of deprecated or weak cryptographic primitives: MD5, SHA1, DES, RC4, ECB mode, small key sizes, hardcoded IVs."
  difficulty: 3
  stdlib_modules: [std.str, std.json, std.file]
  input_format: "First line: language. Remaining lines: source code until EOF"
  output_format: "JSON array of {line, finding_type, severity, code_snippet (truncated), recommendation}"
  test_cases:
    - input: "python\nimport hashlib\nhashlib.md5(data).hexdigest()"
      expected_output: "MD5"
    - input: "javascript\nconst cipher = crypto.createCipheriv('DES', key, iv)"
      expected_output: "DES"
  constraints:
    - "Critical: MD5/SHA1 for password hashing, DES, RC4, ECB mode"
    - "High: SHA1 for digital signatures, 1024-bit RSA, 128-bit AES for secrets"
    - "Must not flag MD5 used for non-security purposes (checksums) at critical"

