  title: "HTTP Request Smuggling Detector"
  description: "Reads raw HTTP request strings from stdin. Analyses them for HTTP request smuggling vulnerabilities: conflicting Content-Length and Transfer-Encoding headers, malformed chunked encoding."
  difficulty: 5
  stdlib_modules: [std.str, std.json]
  input_format: "HTTP request strings separated by '---' lines"
  output_format: "Per request: SAFE or VULNERABLE with attack type (CL.TE, TE.CL, TE.TE) and explanation"
  test_cases:
    - input: "POST / HTTP/1.1\nContent-Length: 13\nTransfer-Encoding: chunked\n\n0\n\nSMUGGLED\n---"
      expected_output: "CL.TE"
    - input: "GET / HTTP/1.1\nHost: example.com\n\n---"
      expected_output: "SAFE"
  constraints:
    - "Must detect CL.TE (Content-Length leads, proxy uses TE)"
    - "Must detect TE.CL (TE leads, backend uses CL)"
    - "Must detect obfuscated TE headers: Transfer-Encoding: xchunked"

- id: "SEC-029"
  title: "Open Redirect Detector"
  description: "Reads a list of URLs from stdin. Tests each for open redirect vulnerabilities by checking if redirect_uri, next, url, return_to query parameters can redirect to external domains."
  difficulty: 3
  stdlib_modules: [std.http, std.str, std.json, std.net]
  input_format: "Lines of URLs until EOF"
  output_format: "Per URL: SAFE or VULNERABLE with redirect destination and parameter name"
  test_cases:
    - input: "https://app.example.com/login?next=https://evil.com\n"
      expected_output: "VULNERABLE"
    - input: "https://app.example.com/login?next=/dashboard\n"
      expected_output: "SAFE"
  constraints:
    - "Only flag redirects to different domains (not same-origin)"
    - "Test params: next, redirect, url, return_to, redirect_uri, destination, goto"
    - "Must make actual HTTP request to verify redirect"

- id: "SEC-030"
  title: "SSRF Vulnerability Scanner"
  description: "Reads a list of API endpoints from stdin. Tests each for Server-Side Request Forgery by injecting internal IP addresses and metadata service URLs into URL parameters."
  difficulty: 4
  stdlib_modules: [std.http, std.str, std.json, std.net]
  input_format: "Lines of URLs with {URL_PARAM} placeholder until EOF"
  output_format: "Per endpoint: SAFE or POTENTIAL_SSRF with evidence (unexpected response, timing difference)"
  test_cases:
    - input: "https://api.example.com/fetch?url={URL_PARAM}\n"
      expected_output: "POTENTIAL_SSRF"
    - input: "https://api.example.com/user?id={URL_PARAM}\n"
      expected_output: "SAFE"
  constraints:
    - "Test payloads: http://169.254.169.254/latest/meta-data, http://127.0.0.1:22, http://10.0.0.1"
    - "Timing-based detection: much faster response may indicate internal access"
    - "Must not send payloads to non-placeholder URLs"

