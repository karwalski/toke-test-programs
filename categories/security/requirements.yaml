  title: "Security-Focused HTTP Client"
  description: "HTTP client with built-in security: certificate pinning, request signing (HMAC), automatic sensitive-header scrubbing from logs, and anomaly detection on responses."
  difficulty: 4
  stdlib_modules: [std.http, std.crypto, std.str, std.json, std.time, std.file]
  input_format: "First line: URL. Second line: pinned cert hash (SHA256). Third line: HMAC signing secret"
  output_format: "Response body; security log showing cert validation, signature, and anomaly checks"
