  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: 'Testing'"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "API Gateway WAF Rule Tester"
  description: "Reads a WAF-protected API URL from stdin. Tests common WAF bypass techniques: encoding variations, case changes, comment injection, and HTTP parameter pollution."
  difficulty: 4
  stdlib_modules: [std.http, std.str, std.json]
  input_format: "First line: URL. Second line: known-blocked payload"
  output_format: "Per bypass variant: BLOCKED or BYPASSED with variant description and payload used"
  test_cases:
    - input: "https://waf.example.com/api\n<script>alert(1)</script>"
      expected_output: "Testing"
    - input: "http://localhost:8017\nSELECT * FROM users"
      expected_output: "Testing"
  constraints:
    - "Bypass variants: URL encoding, double encoding, HTML entity encoding, case variation, null byte insertion"
    - "Must test at least 10 variants per payload"

- id: "SEC-073"
  disabled: true
  disabled_reason: "[ALL_TESTS_SAME_OUTPUT] test_cases admit trivially-hardcoded constants. Expected sample: 'valid'"
  disabled_at: "2026-06-01"
  disabled_by: "107-R7-trivial-test-cases"
  title: "Digital Signature Verifier"
  description: "Reads a message, signature (hex or base64), and public key (PEM) from stdin. Verifies the digital signature and reports the algorithm, validity, and key details."
  difficulty: 3
  stdlib_modules: [std.crypto, std.str, std.json, std.file]
  input_format: "First line: algorithm (RSA-SHA256|ECDSA-SHA256|Ed25519). Second line: public key path. Third line: message. Fourth line: signature (hex)"
  output_format: "JSON {valid, algorithm, keyType, keyBits, message_hash, signature_hex_prefix}"
  test_cases:
    - input: "HMAC-SHA256\nsecretkey123\nhello world\n"
      expected_output: "{\"algorithm\": \"HMAC-SHA256\", \"keyBits\": 96, \"keyType\": \"HMAC\", \"message_hash\": \"b94d27b9934d3e08a52e52d7da7dabfac484efe37a5380ee9088f7ace2efcde9\", \"signature_hex_prefix\": \"62e36a36ecf3013d\", \"valid\": true}"
    - input: "HMAC-SHA256\nanotherkey\nThe quick brown fox jumps over the lazy dog\n"
      expected_output: "{\"algorithm\": \"HMAC-SHA256\", \"keyBits\": 80, \"keyType\": \"HMAC\", \"message_hash\": \"d7a8fbb307d7809469ca9abcb0082e4f8d5651e46d3cdb762d02d0bf37c9e592\", \"signature_hex_prefix\": \"df1c07aad46b19b9\", \"valid\": true}"
    - input: "HMAC-SHA512\nmypassword\ntest message\n"
      expected_output: "{\"algorithm\": \"HMAC-SHA512\", \"keyBits\": 80, \"keyType\": \"HMAC\", \"message_hash\": \"950b2a7effa78f51a63515ec45e03ecebe50ef2f1c41e69629b50778f11bc080002e4db8112b59d09389d10f3558f85bfdeb4f1cc55a34217af0f8547700ebf3\", \"signature_hex_prefix\": \"16032b34039c285e\", \"valid\": true}"
    - input: "SHA256\n\nhello world\n"
      expected_output: "{\"algorithm\": \"SHA256\", \"keyBits\": 0, \"keyType\": \"none\", \"message_hash\": \"b94d27b9934d3e08a52e52d7da7dabfac484efe37a5380ee9088f7ace2efcde9\", \"signature_hex_prefix\": \"b94d27b9934d3e08\", \"valid\": true}"
  constraints:
    - "Must support RSA-SHA256, ECDSA-SHA256, Ed25519"
    - "Must verify signature before reporting key details"

- id: "SEC-074"
  title: "Password Policy Enforcer"
  description: "Reads a password policy (JSON) and a list of passwords from stdin. Validates each password against the policy and returns pass/fail with specific violation details."
  difficulty: 2
  stdlib_modules: [std.json, std.str, std.crypto]
  input_format: "First line: JSON policy. Subsequent lines: passwords to validate (blank to finish)"
  output_format: "Per password: PASS or FAIL with list of violated rules"
  test_cases:
    - input: "{\"minLength\":12,\"requireUpper\":true,\"requireLower\":true,\"requireDigit\":true,\"requireSpecial\":true}\nStrongPass1!\nweakpass\n\n"
      expected_output: "PASS\nFAIL minLength,requireUpper,requireDigit,requireSpecial"
    - input: "{\"minLength\":8,\"requireDigit\":true}\nnodigits\nhas1digit\n\n"
      expected_output: "FAIL requireDigit\nPASS"
    - input: "{\"minLength\":6,\"maxLength\":12,\"maxRepeating\":2,\"disallowCommon\":true}\naaabbb\npassword\nGoodOne\n\n"
      expected_output: "FAIL maxRepeating\nFAIL disallowCommon\nPASS"
    - input: "{\"minLength\":10,\"requireUpper\":true,\"requireSpecial\":true,\"maxRepeating\":3}\nshort\nALLUPPER!!\nFinePass1!\n\n"
      expected_output: "FAIL minLength,requireUpper,requireSpecial\nPASS\nPASS"
  constraints:
    - "Policy fields: minLength, maxLength, requireUpper, requireLower, requireDigit, requireSpecial, maxRepeating, disallowCommon"
    - "Must list all violations, not just first"

- id: "SEC-075"
  disabled: true
  disabled_reason: "[107-R1-phase-2/parse-err] Phase-2 worker could not produce self-consistent stdlib Python"
  disabled_at: "2026-05-31"
  disabled_by: "107-R1"
  title: "Encrypted Backup Verifier"
  description: "Reads an encrypted backup file path and decryption key from stdin. Verifies the backup can be decrypted, checks its integrity (hash), and validates it is not corrupted."
  difficulty: 3
  stdlib_modules: [std.file, std.crypto, std.str, std.json]
  input_format: "First line: backup file path. Second line: base64 decryption key. Third line: expected SHA-256 hash of plaintext"
  output_format: "JSON {decryptable, integrityValid, algorithm, keyBits, plaintextSize, issues: [...]}"
  test_cases:
    - input: "/tmp/backup.enc\n<base64key>\n<expected_hash>"
      expected_output: "decryptable"
    - input: "/tmp/corrupted.enc\n<base64key>\n<hash>"
      expected_output: "integrityValid"
  constraints:
    - "Must support AES-256-GCM and AES-256-CBC formats"
    - "Must verify HMAC/GCM tag before reporting integrity valid"

