- id: "SEC-028"
  disabled: true
  disabled_reason: "[requires-network] auto-flagged from spec scan: 'Reads raw HTTP request strings from stdin. Analyses them for HTTP request smuggling vulnerabilities: conflicting Content-Length and Transfe"
