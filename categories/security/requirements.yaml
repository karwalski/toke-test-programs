- id: "SEC-122"
  title: "XML Bomb (Billion Laughs) Detector"
  description: "Reads XML content from stdin. Detects XML bomb/billion laughs attacks: recursive entity expansion patterns that cause memory exhaustion."
  difficulty: 3
  stdlib_modules: [std.str, std.json]
  input_format: "Lines of XML content until EOF"
  output_format: "SAFE or VULNERABLE with expansion_depth, estimated_expanded_size, and example chain"
  test_cases:
    - input: "<?xml version=\"1.0\"?><!DOCTYPE bomb [<!ENTITY a \"AAAA\"><!ENTITY b \"&a;&a;&a;&a;\">]><bomb>&b;</bomb>"
      expected_output: "VULNERABLE"
    - input: "<?xml version=\"1.0\"?><root><item>safe</item></root>"
      expected_output: "SAFE"
  constraints:
    - "Must detect: recursive entity definitions, deeply nested entities"
    - "Estimate expanded size without actually expanding"
