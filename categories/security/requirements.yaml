- id: "SEC-118"
  title: "Cryptographic Key Derivation Auditor"
  description: "Reads a password and KDF configuration from stdin. Evaluates the KDF parameters (PBKDF2/bcrypt/scrypt/argon2) for security and estimates crack time on modern hardware."
  difficulty: 3
