- id: "SEC-040"
  title: "Content Security Policy Analyser"
  description: "Reads a CSP header value from stdin. Parses it and identifies unsafe directives, missing directives, and bypass-enabling configurations."
  difficulty: 3
  stdlib_modules: [std.str, std.json]
  input_format: "Single line: CSP header value"
  output_format: "JSON {directives: {<name>: <values>}, issues: [{directive, issue, severity, bypass_technique, recommendation}], score (0-100)}"
  test_cases:
    - input: "default-src 'self'; script-src 'unsafe-inline' 'unsafe-eval' *;"
      expected_output: "unsafe-inline"
    - input: "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'"
      expected_output: "score"
  constraints:
    - "Critical: unsafe-inline, unsafe-eval in script-src; wildcard (*) in script-src"
    - "High: missing default-src, object-src not 'none', base-uri not set"
    - "Must detect nonce/hash-based allowlists (these mitigate unsafe-inline)"

- id: "SEC-041"
  title: "Insecure Deserialization Detector"
  description: "Reads serialised object data from stdin (Java serialised, Python pickle, PHP serialised, JSON with class hints). Detects patterns indicating unsafe deserialisation."
  difficulty: 4
  stdlib_modules: [std.str, std.json, std.crypto]
  input_format: "First line: format (java|pickle|php|json). Remaining lines: serialised data (hex or base64 for binary formats)"
  output_format: "SAFE or DANGEROUS with detected gadget chains or exploit patterns"
  test_cases:
    - input: "java\naced0005737200"
      expected_output: "Java serialisation magic bytes"
    - input: "json\n{\"__class__\":\"subprocess.Popen\",\"args\":[[\"id\"]]}"
      expected_output: "class hint"
  constraints:
    - "Java: detect magic bytes aced0005, known gadget class names (CommonsCollections)"
    - "PHP: detect O: class instantiation patterns"
    - "JSON: detect __class__, @type, $type hints"

- id: "SEC-042"
  title: "API Rate Limit Security Tester"
  description: "Reads an API URL and endpoint from stdin. Tests whether rate limiting is properly enforced on authentication and sensitive endpoints by firing rapid requests."
  difficulty: 3
  stdlib_modules: [std.http, std.str, std.json, std.time]
  input_format: "First line: URL. Second line: N requests to fire. Third line: expected_limit"
  output_format: "Results: requests sent, 200s, 429s, 5xxs. Assessment: PROTECTED or UNPROTECTED with details"
  test_cases:
    - input: "http://localhost:8092/login\n50\n10"
      expected_output: "PROTECTED"
    - input: "http://localhost:8083/users\n20\n100"
      expected_output: "Assessment:"
  constraints:
    - "Fire all requests as fast as possible (no artificial delay)"
    - "PROTECTED if >10% of requests returned 429"
    - "Must report X-RateLimit headers if present"

