  title: "SQL Injection Pattern Detector"
  description: "Reads HTTP request logs (or raw SQL queries) from stdin and identifies SQL injection patterns. Classifies attack types and suggests parameterised query fixes."
  difficulty: 3
  stdlib_modules: [std.str, std.json, std.file]
  input_format: "Lines of raw query strings or HTTP query params until EOF"
  output_format: "Per detected injection: {input, attack_type, confidence (high|medium|low), example_fix}"
  test_cases:
    - input: "id=1' OR '1'='1\n"
      expected_output: "boolean_based"
    - input: "name=alice\n"
      expected_output: "[]"
  constraints:
    - "Detect: union-based, boolean-based, time-based blind, error-based, stacked queries"
    - "Must flag but not block ambiguous inputs at medium confidence"

- id: "SEC-013"
  title: "XSS Filter"
  description: "Reads HTML content from stdin. Detects and removes XSS payloads (script tags, event handlers, javascript: URLs, data: URIs) while preserving safe HTML structure."
  difficulty: 3
  stdlib_modules: [std.str, std.json]
  input_format: "Lines of HTML content until EOF"
  output_format: "Sanitised HTML to stdout; JSON summary of removed elements to stderr"
  test_cases:
    - input: "<p>Hello <script>alert(1)</script> World</p>"
      expected_output: "<p>Hello  World</p>"
    - input: "<a href=\"javascript:void(0)\" onclick=\"steal()\">Click</a>"
      expected_output: "<a>Click</a>"
  constraints:
    - "Remove: <script>, <iframe>, <object>, <embed>, <base>"
    - "Remove: on* event attributes"
    - "Remove: href/src with javascript:, data:, vbscript: schemes"
    - "Must preserve safe tags: p, div, span, a (without js), img (without data:)"

- id: "SEC-014"
  title: "TLS Certificate Checker"
  description: "Reads a host:port from stdin. Connects via TLS and inspects the certificate chain: expiry, issuer, SANs, key size, signature algorithm, and known vulnerabilities (SHA1, short keys)."
  difficulty: 4
  stdlib_modules: [std.net, std.crypto, std.str, std.json, std.time]
  input_format: "Single line: host:port"
  output_format: "JSON {subject, issuer, notBefore, notAfter, daysUntilExpiry, sans, keyBits, sigAlg, issues: [...], grade (A|B|C|F)}"
  test_cases:
    - input: "example.com:443"
      expected_output: "grade"
    - input: "expired.badssl.com:443"
      expected_output: "issues"
  constraints:
    - "Flag: expiry <30 days (warn), <7 days (critical), expired (critical)"
    - "Flag: SHA1 signature (critical), RSA key <2048 bits (critical), RSA <4096 (warn)"
    - "Grade A: no issues. B: warnings only. C: major warnings. F: critical issues."

- id: "SEC-015"
  title: "Security Audit Report Generator"
  description: "Reads a JSON security scan result from stdin (list of findings from multiple tools). Aggregates, deduplicates, and generates a formatted security audit report."
  difficulty: 3
  stdlib_modules: [std.json, std.str, std.time, std.file]
  input_format: "JSON array of {tool, severity, category, title, description, file?, line?, cve?}"
  output_format: "Formatted text report: executive summary, findings by severity, remediation list"
  test_cases:
    - input: "[{\"tool\":\"bandit\",\"severity\":\"high\",\"category\":\"sql_injection\",\"title\":\"SQL injection\",\"description\":\"Unparameterised query\"}]"
      expected_output: "CRITICAL"
    - input: "[]"
      expected_output: "No findings"
  constraints:
    - "Group findings by severity: critical, high, medium, low, info"
    - "Deduplicate identical findings from multiple tools"
    - "Must include remediation priority recommendation"

- id: "SEC-016"
  title: "Security Header Checker"
  description: "Reads a URL from stdin. Fetches it and grades the response headers against OWASP security header best practices. Returns a detailed report with score and remediation steps."
  difficulty: 2
  stdlib_modules: [std.http, std.str, std.json]
  input_format: "Single line: URL"
  output_format: "JSON {url, score (0-100), grade (A-F), headers: {<name>: {present, value, status (good|warn|missing), recommendation}}}"
  test_cases:
    - input: "https://github.com"
      expected_output: "grade"
    - input: "http://example.com"
      expected_output: "score"
  constraints:
    - "Headers checked: Strict-Transport-Security, Content-Security-Policy, X-Frame-Options, X-Content-Type-Options, Referrer-Policy, Permissions-Policy, Cross-Origin-Opener-Policy"
    - "HSTS must include includeSubDomains and preload for full score"

- id: "SEC-017"
  disabled: true
  disabled_reason: "[requires-network] auto-flagged from spec scan: 'Reads HTTP request/response pairs from stdin (JSON format). Checks each pair against OWASP Top 10 rules and flags violations with remediati"
  disabled_at: "2026-06-01"
  disabled_by: "107-R2-spec-scan"
