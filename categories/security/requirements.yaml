      expected_output: "corsEnabled"
    - input: "http://localhost:8091/api"
      expected_output: "issues"
  constraints:
    - "Critical: Access-Control-Allow-Origin: * with Access-Control-Allow-Credentials: true"
    - "High: arbitrary origin reflected with credentials"
    - "Medium: null origin allowed with credentials"

