  input_format: "First line: algorithm (pbkdf2|bcrypt|scrypt|argon2id). Second line: JSON parameters"
  output_format: "JSON {algorithm, parameters, derivation_time_ms, security_rating (weak|fair|strong|very_strong), estimated_crack_time, recommendations}"
  test_cases:
    - input: "pbkdf2\n{\"iterations\":1000,\"hash\":\"sha1\",\"key_len\":32}"
