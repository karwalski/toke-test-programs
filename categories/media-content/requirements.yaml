- id: "MED-001"
  title: "Markdown to Plain Text"
  description: "Strips all Markdown syntax and returns clean plain text"
  difficulty: 1
  stdlib_modules: [std.str, std.io]
  input_format: "Markdown text on stdin"
  output_format: "Plain text on stdout with Markdown syntax removed"
  test_cases:
    - input: "# Hello\n**world**"
      expected_output: "Hello\nworld"
    - input: "_italic_ and `code`"
      expected_output: "italic and code"
  constraints: ["Must handle headings, bold, italic, code, links"]

- id: "MED-002"
  title: "Markdown Heading Extractor"
  description: "Extracts all headings from Markdown and prints them with their level"
  difficulty: 1
  stdlib_modules: [std.str, std.io]
  input_format: "Markdown text on stdin"
  output_format: "Lines of 'H<level>: <text>' for each heading"
  test_cases:
    - input: "# Title\n## Subtitle\n### Section"
      expected_output: "H1: Title\nH2: Subtitle\nH3: Section"
    - input: "No headings here"
      expected_output: ""
  constraints: ["Must support H1 through H6"]

- id: "MED-003"
  title: "Table of Contents Generator"
  description: "Generates a Markdown TOC with anchor links from heading structure"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Markdown document on stdin"
  output_format: "Markdown unordered list with anchor links"
  test_cases:
    - input: "# Intro\n## Setup\n## Usage"
      expected_output: "- [Intro](#intro)\n  - [Setup](#setup)\n  - [Usage](#usage)"
    - input: "# One"
      expected_output: "- [One](#one)"
  constraints: ["Anchor slugs must be lowercase with hyphens"]

- id: "MED-004"
  title: "HTML Tag Stripper"
  description: "Removes all HTML tags from input and returns plain text"
  difficulty: 1
  stdlib_modules: [std.str, std.html, std.io]
  input_format: "HTML string on stdin"
  output_format: "Text with all tags removed"
  test_cases:
    - input: "<p>Hello <b>world</b></p>"
      expected_output: "Hello world"
    - input: "<h1>Title</h1><p>Body</p>"
      expected_output: "TitleBody"
  constraints: ["Must handle nested tags", "Must not decode entities"]

- id: "MED-005"
  title: "HTML Entity Encoder"
  description: "Encodes special characters as HTML entities"
  difficulty: 1
  stdlib_modules: [std.str, std.html, std.io]
  input_format: "Plain text on stdin"
  output_format: "Text with <, >, &, \", ' encoded as HTML entities"
  test_cases:
    - input: "<script>alert('xss')</script>"
      expected_output: "&lt;script&gt;alert(&#39;xss&#39;)&lt;/script&gt;"
    - input: "AT&T"
      expected_output: "AT&amp;T"
  constraints: ["Must encode all five standard HTML entities"]

- id: "MED-006"
  title: "Simple HTML Generator"
  description: "Wraps each input line in an HTML paragraph tag"
  difficulty: 1
  stdlib_modules: [std.str, std.html, std.io]
  input_format: "Plain text lines on stdin"
  output_format: "HTML document with each line wrapped in <p> tags"
  test_cases:
    - input: "Hello\nWorld"
      expected_output: "<p>Hello</p>\n<p>World</p>"
    - input: "One line"
      expected_output: "<p>One line</p>"
  constraints: ["Must produce valid HTML5 paragraphs"]

- id: "MED-007"
  title: "Word Counter"
  description: "Counts words, lines, and characters in input text"
  difficulty: 1
  stdlib_modules: [std.str, std.io]
  input_format: "Text on stdin"
  output_format: "Three lines: 'words: N', 'lines: N', 'chars: N'"
  test_cases:
    - input: "hello world\nfoo bar"
      expected_output: "words: 4\nlines: 2\nchars: 19"
    - input: "one"
      expected_output: "words: 1\nlines: 1\nchars: 3"
  constraints: ["Words delimited by whitespace", "Chars includes newlines"]

- id: "MED-008"
  title: "Readability Score (Flesch-Kincaid)"
  description: "Computes the Flesch-Kincaid Reading Ease score for text"
  difficulty: 3
  stdlib_modules: [std.str, std.io, std.math]
  input_format: "English prose on stdin"
  output_format: "Single line 'score: N.N' where N.N is the FK score"
  test_cases:
    - input: "The cat sat on the mat."
      expected_output: "score: 116.1"
    - input: "The acquisition of multisyllabic vocabulary constitutes a formidable intellectual undertaking."
      expected_output: "score: 10.2"
  constraints: ["Score = 206.835 - 1.015*(words/sentences) - 84.6*(syllables/words)", "Round to one decimal place"]

- id: "MED-009"
  title: "Readability Score (Gunning Fog)"
  description: "Computes the Gunning Fog Index for text complexity"
  difficulty: 3
  stdlib_modules: [std.str, std.io, std.math]
  input_format: "English prose on stdin"
  output_format: "Single line 'fog: N.N'"
  test_cases:
    - input: "The cat sat on the mat. It was a nice day."
      expected_output: "fog: 1.6"
    - input: "The obfuscation of parliamentary procedures represents a significant challenge."
      expected_output: "fog: 17.0"
  constraints: ["Fog = 0.4 * ((words/sentences) + 100*(complex_words/words))", "Complex words have 3+ syllables"]

- id: "MED-010"
  title: "Spell Checker"
  description: "Detects words not found in a built-in dictionary list provided on first stdin line"
  difficulty: 3
  stdlib_modules: [std.str, std.io, std.collections]
  input_format: "First line: comma-separated dictionary words. Remaining lines: text to check"
  output_format: "One misspelled word per line, in order of appearance, deduplicated"
  test_cases:
    - input: "cat,dog,the\nthe cat sat on a mat"
      expected_output: "sat\non\na\nmat"
    - input: "hello,world\nhello world"
      expected_output: ""
  constraints: ["Case-insensitive matching", "Ignore punctuation attached to words"]

- id: "MED-011"
  title: "Slug Generator"
  description: "Converts a title string into a URL-safe slug"
  difficulty: 1
  stdlib_modules: [std.str, std.io]
  input_format: "One title per line on stdin"
  output_format: "One slug per line"
  test_cases:
    - input: "Hello World!\nMy Blog Post"
      expected_output: "hello-world\nmy-blog-post"
    - input: "  Spaces & Special--Chars  "
      expected_output: "spaces-special-chars"
  constraints: ["Lowercase", "Replace non-alphanumeric with hyphens", "Collapse multiple hyphens", "Trim leading/trailing hyphens"]

- id: "MED-012"
  title: "RSS Feed Parser"
  description: "Parses an RSS 2.0 XML feed and lists item titles with publication dates"
  difficulty: 3
  stdlib_modules: [std.str, std.io, std.time]
  input_format: "RSS 2.0 XML on stdin"
  output_format: "Lines of 'YYYY-MM-DD | <title>' sorted newest first"
  test_cases:
    - input: "<rss><channel><item><title>Post A</title><pubDate>Mon, 01 Jan 2024 00:00:00 +0000</pubDate></item></channel></rss>"
      expected_output: "2024-01-01 | Post A"
    - input: "<rss><channel><item><title>B</title><pubDate>Tue, 02 Jan 2024 00:00:00 +0000</pubDate></item><item><title>A</title><pubDate>Mon, 01 Jan 2024 00:00:00 +0000</pubDate></item></channel></rss>"
      expected_output: "2024-01-02 | B\n2024-01-01 | A"
  constraints: ["Parse pubDate in RFC 822 format", "Sort descending by date"]

- id: "MED-013"
  title: "Sitemap Generator"
  description: "Generates an XML sitemap from a list of URLs"
  difficulty: 2
  stdlib_modules: [std.str, std.io, std.time]
  input_format: "One URL per line on stdin"
  output_format: "XML sitemap conforming to sitemaps.org schema"
  test_cases:
    - input: "https://example.com/\nhttps://example.com/about"
      expected_output: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n  <url><loc>https://example.com/</loc></url>\n  <url><loc>https://example.com/about</loc></url>\n</urlset>"
    - input: "https://site.com/page"
      expected_output: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n  <url><loc>https://site.com/page</loc></url>\n</urlset>"
  constraints: ["Valid XML", "One <url> per input line"]

- id: "MED-014"
  title: "SEO Analyser"
  description: "Analyses an HTML page for basic SEO signals"
  difficulty: 3
  stdlib_modules: [std.str, std.html, std.io]
  input_format: "HTML document on stdin"
  output_format: "Key: value lines for title length, meta description presence, H1 count, image alt coverage"
  test_cases:
    - input: "<html><head><title>Hi</title><meta name=\"description\" content=\"ok\"></head><body><h1>Hello</h1><img src=\"x\" alt=\"y\"></body></html>"
      expected_output: "title_length: 2\nmeta_description: yes\nh1_count: 1\nimg_alt_coverage: 100%"
    - input: "<html><head></head><body><img src=\"x\"></body></html>"
      expected_output: "title_length: 0\nmeta_description: no\nh1_count: 0\nimg_alt_coverage: 0%"
  constraints: ["Title length in characters", "Alt coverage = images with alt / total images * 100"]

- id: "MED-015"
  title: "Tag Cloud Generator"
  description: "Counts word frequency and outputs a weighted tag cloud as text"
  difficulty: 2
  stdlib_modules: [std.str, std.io, std.collections]
  input_format: "Text on stdin"
  output_format: "Words sorted by frequency descending, format 'word(N)' space-separated, top 10 words"
  test_cases:
    - input: "the cat sat the cat"
      expected_output: "the(2) cat(2) sat(1)"
    - input: "a b a b a"
      expected_output: "a(3) b(2)"
  constraints: ["Case-insensitive", "Skip stopwords: the, a, an, is, it, in, on, at, to, of", "Top 10 only"]

- id: "MED-016"
  title: "Link Extractor"
  description: "Extracts all hyperlinks from an HTML document"
  difficulty: 2
  stdlib_modules: [std.str, std.html, std.io]
  input_format: "HTML on stdin"
  output_format: "One URL per line from href attributes of <a> tags"
  test_cases:
    - input: "<a href=\"https://example.com\">Link</a><a href=\"/about\">About</a>"
      expected_output: "https://example.com\n/about"
    - input: "<p>No links here</p>"
      expected_output: ""
  constraints: ["Only <a> href attributes", "Preserve order of appearance"]

- id: "MED-017"
  title: "Heading Hierarchy Validator"
  description: "Validates that Markdown headings never skip a level"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Markdown text on stdin"
  output_format: "'PASS' or lines describing each hierarchy violation"
  test_cases:
    - input: "# H1\n## H2\n### H3"
      expected_output: "PASS"
    - input: "# H1\n### H3"
      expected_output: "Line 2: jumped from H1 to H3"
  constraints: ["First heading can be any level", "Detect forward skips only"]

- id: "MED-018"
  title: "Footnote Processor"
  description: "Converts inline footnote markers to a numbered reference list"
  difficulty: 3
  stdlib_modules: [std.str, std.io]
  input_format: "Text with [^N] markers and footnote definitions on stdin"
  output_format: "Body text with [N] superscripts followed by numbered reference list"
  test_cases:
    - input: "Hello world[^1].\n\n[^1]: A note."
      expected_output: "Hello world[1].\n\nReferences:\n1. A note."
    - input: "Text[^1] and[^2].\n\n[^1]: First.\n[^2]: Second."
      expected_output: "Text[1] and[2].\n\nReferences:\n1. First.\n2. Second."
  constraints: ["References section added at end", "Markers renumbered sequentially"]

- id: "MED-019"
  title: "APA Citation Formatter"
  description: "Formats bibliography entries in APA 7th edition style"
  difficulty: 3
  stdlib_modules: [std.str, std.io]
  input_format: "JSON lines on stdin, each with fields: author_last, author_first, year, title, journal, volume, issue, pages"
  output_format: "One APA citation per line"
  test_cases:
    - input: "{\"author_last\":\"Smith\",\"author_first\":\"J.\",\"year\":2020,\"title\":\"A study\",\"journal\":\"Journal of Things\",\"volume\":5,\"issue\":2,\"pages\":\"10-20\"}"
      expected_output: "Smith, J. (2020). A study. Journal of Things, 5(2), 10-20."
    - input: "{\"author_last\":\"Doe\",\"author_first\":\"A. B.\",\"year\":2021,\"title\":\"Another\",\"journal\":\"Science\",\"volume\":1,\"issue\":1,\"pages\":\"1-5\"}"
      expected_output: "Doe, A. B. (2021). Another. Science, 1(1), 1-5."
  constraints: ["Period after title", "Volume in italics represented as-is in plain text"]

- id: "MED-020"
  title: "MLA Citation Formatter"
  description: "Formats bibliography entries in MLA 9th edition style"
  difficulty: 3
  stdlib_modules: [std.str, std.io]
  input_format: "JSON lines on stdin with fields: author_last, author_first, title, container, volume, issue, year, pages"
  output_format: "One MLA citation per line"
  test_cases:
    - input: "{\"author_last\":\"Smith\",\"author_first\":\"John\",\"title\":\"A Study\",\"container\":\"Good Journal\",\"volume\":\"3\",\"issue\":\"1\",\"year\":\"2020\",\"pages\":\"5-10\"}"
      expected_output: "Smith, John. \"A Study.\" Good Journal, vol. 3, no. 1, 2020, pp. 5-10."
    - input: "{\"author_last\":\"Lee\",\"author_first\":\"A.\",\"title\":\"Research\",\"container\":\"Science\",\"volume\":\"10\",\"issue\":\"2\",\"year\":\"2022\",\"pages\":\"100-110\"}"
      expected_output: "Lee, A. \"Research.\" Science, vol. 10, no. 2, 2022, pp. 100-110."
  constraints: ["Title in quotes", "Container italicised represented as plain text", "Periods between major elements"]

- id: "MED-021"
  title: "Bibliography Sorter"
  description: "Sorts bibliography entries alphabetically by author last name"
  difficulty: 2
  stdlib_modules: [std.str, std.io, std.collections]
  input_format: "One citation per line on stdin"
  output_format: "Citations sorted A-Z by first word"
  test_cases:
    - input: "Smith, J. (2020). Title.\nDoe, A. (2019). Other."
      expected_output: "Doe, A. (2019). Other.\nSmith, J. (2020). Title."
    - input: "Zebra, Z.\nAlpha, A."
      expected_output: "Alpha, A.\nZebra, Z."
  constraints: ["Stable sort", "Case-insensitive comparison"]

- id: "MED-022"
  title: "Inline Diff Viewer"
  description: "Shows an inline diff between two texts passed as stdin blocks"
  difficulty: 4
  stdlib_modules: [std.str, std.io]
  input_format: "Two text blocks separated by a line containing '---'"
  output_format: "Lines prefixed with ' ' (same), '-' (removed), '+' (added)"
  test_cases:
    - input: "hello\nworld\n---\nhello\nearth"
      expected_output: " hello\n-world\n+earth"
    - input: "a\nb\n---\na\nb"
      expected_output: " a\n b"
  constraints: ["Line-level diff only", "No context limit"]

- id: "MED-023"
  title: "Word Frequency Analyser"
  description: "Counts and ranks word frequency in a text corpus"
  difficulty: 2
  stdlib_modules: [std.str, std.io, std.collections]
  input_format: "Text on stdin"
  output_format: "Lines of 'word: N' sorted by frequency descending then alphabetically"
  test_cases:
    - input: "cat bat cat rat bat cat"
      expected_output: "cat: 3\nbat: 2\nrat: 1"
    - input: "one one two"
      expected_output: "one: 2\ntwo: 1"
  constraints: ["Case-insensitive", "Strip punctuation", "All words, no stopword filtering"]

- id: "MED-024"
  title: "Bigram Extractor"
  description: "Extracts all word bigrams (2-grams) from text and counts frequency"
  difficulty: 2
  stdlib_modules: [std.str, std.io, std.collections]
  input_format: "Text on stdin"
  output_format: "Lines of '\"w1 w2\": N' sorted by count descending"
  test_cases:
    - input: "the cat sat the cat"
      expected_output: "\"the cat\": 2\n\"cat sat\": 1\n\"sat the\": 1"
    - input: "a b c"
      expected_output: "\"a b\": 1\n\"b c\": 1"
  constraints: ["Case-insensitive", "Consecutive word pairs only"]

- id: "MED-025"
  title: "Trigram Extractor"
  description: "Extracts all word trigrams (3-grams) from text and counts frequency"
  difficulty: 2
  stdlib_modules: [std.str, std.io, std.collections]
  input_format: "Text on stdin"
  output_format: "Lines of '\"w1 w2 w3\": N' sorted by count descending"
  test_cases:
    - input: "a b c a b c"
      expected_output: "\"a b c\": 2"
    - input: "one two three four"
      expected_output: "\"one two three\": 1\n\"two three four\": 1"
  constraints: ["Case-insensitive", "Consecutive triplets only"]

- id: "MED-026"
  title: "Sentence Splitter"
  description: "Splits text into individual sentences"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Paragraph text on stdin"
  output_format: "One sentence per line, trimmed"
  test_cases:
    - input: "Hello world. How are you? I am fine!"
      expected_output: "Hello world.\nHow are you?\nI am fine!"
    - input: "Dr. Smith went home. He was tired."
      expected_output: "Dr. Smith went home.\nHe was tired."
  constraints: ["Split on '. ', '? ', '! '", "Handle common abbreviations: Dr., Mr., Mrs., etc."]

- id: "MED-027"
  title: "Paragraph Formatter"
  description: "Re-wraps text to a specified column width preserving paragraph breaks"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "First line: integer column width. Remaining lines: text (blank line = paragraph break)"
  output_format: "Re-wrapped text with paragraph breaks preserved"
  test_cases:
    - input: "20\nThis is a long line that should be wrapped."
      expected_output: "This is a long line\nthat should be\nwrapped."
    - input: "40\nShort line."
      expected_output: "Short line."
  constraints: ["Do not break words", "Paragraph break = blank line in input/output"]

- id: "MED-028"
  title: "Line Wrapper"
  description: "Hard-wraps lines at a given column width"
  difficulty: 1
  stdlib_modules: [std.str, std.io]
  input_format: "First line: column width integer. Remaining lines: text"
  output_format: "Text hard-wrapped at exactly the given column width"
  test_cases:
    - input: "10\nHelloWorld12345"
      expected_output: "HelloWorld\n12345"
    - input: "5\nABCDE"
      expected_output: "ABCDE"
  constraints: ["Character-level wrap, not word-level", "No partial line at end if exact fit"]

- id: "MED-029"
  title: "Indent Normaliser"
  description: "Normalises mixed tab/space indentation to spaces"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "First line: integer spaces-per-tab. Remaining lines: indented text"
  output_format: "Text with tabs replaced by given number of spaces"
  test_cases:
    - input: "4\n\thello\n\t\tworld"
      expected_output: "    hello\n        world"
    - input: "2\n\tA"
      expected_output: "  A"
  constraints: ["Replace only leading tabs", "Mixed leading spaces preserved as-is"]

- id: "MED-030"
  title: "ANSI Colour Stripper"
  description: "Removes ANSI escape codes from terminal output"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Text with ANSI escape sequences on stdin"
  output_format: "Plain text with all ANSI sequences removed"
  test_cases:
    - input: "\u001b[31mRed text\u001b[0m"
      expected_output: "Red text"
    - input: "\u001b[1;32mBold green\u001b[0m normal"
      expected_output: "Bold green normal"
  constraints: ["Remove ESC[ sequences", "Handle multi-parameter sequences"]

- id: "MED-031"
  title: "ANSI Colour Injector"
  description: "Wraps words matching a pattern with ANSI colour codes"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "First line: regex pattern. Second line: ANSI colour code number (e.g. 31). Remaining: text"
  output_format: "Text with matching words wrapped in ESC[<code>m...ESC[0m"
  test_cases:
    - input: "error\n31\nThis is an error message"
      expected_output: "This is an \u001b[31merror\u001b[0m message"
    - input: "ok\n32\nAll ok here"
      expected_output: "All \u001b[32mok\u001b[0m here"
  constraints: ["Word-boundary matching", "Only wrap exact matches"]

- id: "MED-032"
  title: "CSV Table Formatter"
  description: "Formats a CSV file as a fixed-width plain-text table"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "CSV with header on stdin"
  output_format: "Plain-text table with aligned columns and separator rows"
  test_cases:
    - input: "name,age\nAlice,30\nBob,25"
      expected_output: "+-------+-----+\n| name  | age |\n+-------+-----+\n| Alice | 30  |\n| Bob   | 25  |\n+-------+-----+"
    - input: "x,y\n1,2"
      expected_output: "+---+---+\n| x | y |\n+---+---+\n| 1 | 2 |\n+---+---+"
  constraints: ["Column width = max(header, data) + 2 padding", "Header separator row"]

- id: "MED-033"
  title: "Email Template Renderer"
  description: "Renders a plain-text email template with variable substitution"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "First block: template with {{var}} placeholders. '---' separator. Second block: KEY=VALUE pairs"
  output_format: "Rendered template with all placeholders replaced"
  test_cases:
    - input: "Hello {{name}},\nWelcome to {{service}}.\n---\nname=Alice\nservice=Toke"
      expected_output: "Hello Alice,\nWelcome to Toke."
    - input: "Hi {{user}}!\n---\nuser=Bob"
      expected_output: "Hi Bob!"
  constraints: ["Unknown variables left as-is", "KEY=VALUE one per line"]

- id: "MED-034"
  title: "Markdown Bold/Italic Toggler"
  description: "Converts **bold** to _bold_ style and vice versa given a mode flag"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "First line: 'to-underscore' or 'to-asterisk'. Remaining: Markdown text"
  output_format: "Markdown text with bold/italic markers converted"
  test_cases:
    - input: "to-underscore\n**bold** and *italic*"
      expected_output: "__bold__ and _italic_"
    - input: "to-asterisk\n__bold__ and _italic_"
      expected_output: "**bold** and *italic*"
  constraints: ["Only convert top-level markers", "No nested conversion"]

- id: "MED-035"
  title: "Image Tag Extractor"
  description: "Extracts all image sources and alt text from HTML"
  difficulty: 2
  stdlib_modules: [std.str, std.html, std.io]
  input_format: "HTML on stdin"
  output_format: "Lines of 'src | alt' for each <img>"
  test_cases:
    - input: "<img src=\"a.png\" alt=\"A\"><img src=\"b.jpg\" alt=\"\">"
      expected_output: "a.png | A\nb.jpg | "
    - input: "<p>No images</p>"
      expected_output: ""
  constraints: ["Empty alt string if attribute missing", "Preserve order"]

- id: "MED-036"
  title: "Markdown Code Block Extractor"
  description: "Extracts all fenced code blocks from a Markdown document"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Markdown text on stdin"
  output_format: "Each code block separated by '---', prefixed by 'lang: <language>'"
  test_cases:
    - input: "Text\n```python\nprint('hi')\n```"
      expected_output: "lang: python\nprint('hi')"
    - input: "```\nno lang\n```\n```js\nconsole.log()\n```"
      expected_output: "lang: \nno lang\n---\nlang: js\nconsole.log()"
  constraints: ["Preserve internal whitespace", "Support triple backtick fences only"]

- id: "MED-037"
  title: "Markdown Link Checker Formatter"
  description: "Extracts all Markdown links and formats them as a numbered list"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Markdown text on stdin"
  output_format: "Numbered list: 'N. [text](url)'"
  test_cases:
    - input: "[Google](https://google.com) and [GitHub](https://github.com)"
