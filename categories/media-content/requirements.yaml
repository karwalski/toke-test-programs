      expected_output: "2/3 completed\nNot done"
    - input: "- [x] All done"
      expected_output: "1/1 completed"
  constraints: ["Support - [x] and - [ ] syntax", "Only list incomplete items"]

- id: "MED-091"
  title: "Sentence Complexity Scorer"
  description: "Scores sentence complexity by counting clauses indicated by commas and conjunctions"
  difficulty: 3
  stdlib_modules: [std.str, std.io]
  input_format: "Text on stdin, one sentence per line"
  output_format: "Lines of 'sentence N: score M' where M = comma_count + conjunction_count"
  test_cases:
    - input: "The cat sat.\nAlthough tired, and hungry, she ran."
      expected_output: "sentence 1: score 0\nsentence 2: score 3"
    - input: "He ran and jumped."
      expected_output: "sentence 1: score 1"
  constraints: ["Conjunctions: and, but, or, nor, for, yet, so, although, because, if, when", "Case-insensitive"]

- id: "MED-092"
  title: "Smart Quote Replacer"
  description: "Replaces straight quotes with typographic curly quotes"
  difficulty: 3
  stdlib_modules: [std.str, std.io]
  input_format: "Text with straight quotes on stdin"
  output_format: "Text with typographic quotes"
  test_cases:
    - input: "He said \"hello\" and 'goodbye'."
      expected_output: "He said \u201chello\u201d and \u2018goodbye\u2019."
    - input: "\"test\""
      expected_output: "\u201ctest\u201d"
  constraints: ["Opening \" -> U+201C, closing \" -> U+201D", "Opening ' -> U+2018, closing ' -> U+2019"]

- id: "MED-093"
  title: "Whitespace Normaliser"
  description: "Normalises various whitespace characters to standard spaces and newlines"
