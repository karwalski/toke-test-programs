      expected_output: "bold and italic and both"
    - input: "plain text"
      expected_output: "plain text"
  constraints: ["Handle triple, double, single markers", "Preserve inner text"]

- id: "MED-079"
  title: "HTML Minifier"
  description: "Removes unnecessary whitespace from HTML while preserving semantics"
  difficulty: 3
  stdlib_modules: [std.str, std.html, std.io]
  input_format: "HTML on stdin"
  output_format: "Minified HTML with collapsed whitespace between tags"
  test_cases:
    - input: "<p>  Hello   World  </p>"
      expected_output: "<p>Hello World</p>"
    - input: "<ul>\n  <li>A</li>\n  <li>B</li>\n</ul>"
      expected_output: "<ul><li>A</li><li>B</li></ul>"
  constraints: ["Collapse whitespace nodes between tags", "Preserve whitespace in <pre> and <script>"]

- id: "MED-080"
  title: "Markdown Emoji Shortcode Expander"
  description: "Expands :shortcode: emoji shortcodes to Unicode emoji characters"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Text with :shortcode: patterns on stdin"
  output_format: "Text with shortcodes replaced by Unicode emoji"
  test_cases:
    - input: "Hello :smile: world :thumbsup:"
      expected_output: "Hello 😄 world 👍"
    - input: "No emoji here"
      expected_output: "No emoji here"
  constraints: ["Support at least: smile, thumbsup, heart, star, fire, check, x, wave, rocket, tada"]

- id: "MED-081"
  title: "Sentence Length Analyser"
  description: "Reports min, max, and average sentence length in words"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Prose text on stdin"
  output_format: "Three lines: 'min: N', 'max: N', 'avg: N.N'"
  test_cases:
    - input: "Hi. Hello world. One two three four."
      expected_output: "min: 1\nmax: 4\navg: 2.3"
    - input: "Just one sentence here with five words."
      expected_output: "min: 7\nmax: 7\navg: 7.0"
  constraints: ["avg rounded to 1 decimal", "Sentences split by . ? !"]

- id: "MED-082"
  title: "Vocabulary Richness Calculator"
  description: "Calculates type-token ratio (unique words / total words)"
  difficulty: 2
  stdlib_modules: [std.str, std.io, std.collections]
  input_format: "Text on stdin"
  output_format: "Single line 'ttr: N.NNN' (3 decimal places)"
  test_cases:
    - input: "cat cat cat cat"
      expected_output: "ttr: 0.250"
    - input: "the quick brown fox"
      expected_output: "ttr: 1.000"
  constraints: ["TTR = unique_words / total_words", "Case-insensitive", "Strip punctuation"]

- id: "MED-083"
  title: "Long Sentence Detector"
  description: "Flags sentences exceeding a word-count threshold"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "First line: integer threshold. Remaining: text"
  output_format: "Lines of 'Sentence N (W words): <sentence>' for flagged sentences"
  test_cases:
    - input: "5\nShort sentence. This one is much much longer than allowed by the threshold."
      expected_output: "Sentence 2 (14 words): This one is much much longer than allowed by the threshold."
    - input: "3\nHi. Bye."
      expected_output: ""
  constraints: ["Sentences split by . ? !", "Count by whitespace-delimited words"]

- id: "MED-084"
  title: "Repeated Word Detector"
  description: "Detects consecutive repeated words in text"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Text on stdin"
  output_format: "Lines of 'Line N: repeated word \"<word>\"' for each occurrence"
  test_cases:
    - input: "the the cat\nfoo bar bar"
      expected_output: "Line 1: repeated word \"the\"\nLine 2: repeated word \"bar\""
    - input: "Hello world"
      expected_output: ""
  constraints: ["Case-insensitive", "Only immediately consecutive repeats"]

- id: "MED-085"
  title: "Text Diff Word-Level"
  description: "Shows word-level diff between two text blocks"
  difficulty: 4
  stdlib_modules: [std.str, std.io]
  input_format: "Two text lines separated by '---'"
  output_format: "Inline diff with [-removed-] and {+added+} markers"
  test_cases:
    - input: "the quick brown fox\n---\nthe slow brown fox"
      expected_output: "the [-quick-] {+slow+} brown fox"
    - input: "hello world\n---\nhello world"
      expected_output: "hello world"
  constraints: ["Word-level granularity", "Unchanged words have no marker"]

- id: "MED-086"
  title: "Longest Word Finder"
  description: "Finds the longest word(s) in a text"
  difficulty: 1
  stdlib_modules: [std.str, std.io]
  input_format: "Text on stdin"
  output_format: "One word per line for all words sharing the maximum length, sorted alphabetically"
  test_cases:
    - input: "the hippopotamus sat"
      expected_output: "hippopotamus"
    - input: "cat bat rat hat"
      expected_output: "bat\ncat\nhat\nrat"
  constraints: ["Strip punctuation from words", "Alphabetical tie-break"]

- id: "MED-087"
  title: "Acronym Generator"
  description: "Generates an acronym from a phrase"
  difficulty: 1
  stdlib_modules: [std.str, std.io]
