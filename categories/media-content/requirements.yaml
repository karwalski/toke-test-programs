  output_format: "Lines of 'YYYY-MM-DD HH:MM | <SUMMARY>' sorted by date"
  test_cases:
    - input: "BEGIN:VCALENDAR\nBEGIN:VEVENT\nDTSTART:20240101T090000Z\nSUMMARY:New Year Meeting\nEND:VEVENT\nEND:VCALENDAR"
      expected_output: "2024-01-01 09:00 | New Year Meeting"
    - input: "BEGIN:VCALENDAR\nEND:VCALENDAR"
      expected_output: ""
  constraints: ["Parse DTSTART in YYYYMMDDTHHMMSSZ format", "Sort ascending by date"]

- id: "MED-119"
  title: "Plain Text to Markdown"
  description: "Detects structure in plain text and adds basic Markdown formatting"
  difficulty: 4
  stdlib_modules: [std.str, std.io]
  input_format: "Plain text on stdin"
  output_format: "Markdown with detected headers, lists, and paragraphs"
  test_cases:
    - input: "INTRODUCTION\n\nThis is a paragraph.\n\n- item one\n- item two"
      expected_output: "# INTRODUCTION\n\nThis is a paragraph.\n\n- item one\n- item two"
    - input: "Normal paragraph."
      expected_output: "Normal paragraph."
  constraints: ["ALL CAPS lines become H1", "Lines starting with - stay as list", "Other blocks become paragraphs"]

- id: "MED-120"
  title: "Abbreviation Expander"
  description: "Expands common abbreviations to their full forms"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "First line: JSON object mapping abbreviations to expansions. Remaining: text"
  output_format: "Text with abbreviations replaced by full forms"
  test_cases:
    - input: "{\"etc\":\"et cetera\",\"eg\":\"for example\"}\nDo this, etc. Also, eg, try that."
      expected_output: "Do this, et cetera. Also, for example, try that."
    - input: "{\"asap\":\"as soon as possible\"}\nPlease reply asap."
      expected_output: "Please reply as soon as possible."
  constraints: ["Case-insensitive matching", "Whole-word matching only", "Preserve capitalisation of replacement based on original"]

- id: "MED-121"
  title: "Readability Level Classifier"
  description: "Classifies text reading level based on Flesch-Kincaid grade"
  difficulty: 3
  stdlib_modules: [std.str, std.io]
  input_format: "Text on stdin"
  output_format: "Single line with grade level: 'grade: N' and label"
  test_cases:
    - input: "See the cat. The cat is fat."
      expected_output: "grade: 1\nlevel: Elementary"
    - input: "The utilisation of sophisticated grammatical constructs demonstrates significant intellectual proficiency."
      expected_output: "grade: 16\nlevel: College Graduate"
  constraints: ["FK Grade = 0.39*(words/sentences) + 11.8*(syllables/words) - 15.59", "Levels: Elementary(1-5), Middle(6-8), High School(9-12), College(13-15), College Graduate(16+)"]

- id: "MED-122"
  title: "Content Similarity Scorer"
  description: "Computes Jaccard similarity between two text documents"
  difficulty: 3
  stdlib_modules: [std.str, std.io, std.collections]
  input_format: "Two documents separated by a line containing '---'"
  output_format: "Single line 'similarity: N.NNN'"
  test_cases:
    - input: "cat dog bird\n---\ncat dog fish"
      expected_output: "similarity: 0.500"
    - input: "hello world\n---\nhello world"
      expected_output: "similarity: 1.000"
  constraints: ["Jaccard = |intersection| / |union| of word sets", "Case-insensitive", "3 decimal places"]

- id: "MED-123"
  title: "Unicode Category Counter"
  description: "Counts characters by Unicode general category"
  difficulty: 3
  stdlib_modules: [std.str, std.io]
  input_format: "Text on stdin"
  output_format: "Lines of 'Category: N' sorted by count descending"
  test_cases:
    - input: "Hello, World! 123"
      expected_output: "Letter: 10\nDecimalDigit: 3\nSpace: 2\nPunctuation: 2"
    - input: "abc"
      expected_output: "Letter: 3"
  constraints: ["Categories: Letter, DecimalDigit, Space, Punctuation, Symbol, Other", "Skip zero-count categories"]

- id: "MED-124"
  title: "Markdown Reference Link Resolver"
  description: "Converts Markdown reference-style links to inline links"
  difficulty: 3
  stdlib_modules: [std.str, std.io]
  input_format: "Markdown with reference-style links on stdin"
  output_format: "Markdown with all references converted to inline [text](url)"
  test_cases:
    - input: "[Google][1]\n\n[1]: https://google.com"
      expected_output: "[Google](https://google.com)"
    - input: "See [this][ref].\n\n[ref]: /page \"Title\""
      expected_output: "See [this](/page \"Title\")."
  constraints: ["Remove reference definitions from output", "Preserve link titles if present"]

- id: "MED-125"
  title: "Content Warning Detector"
  description: "Scans text for a configurable list of flagged words and reports matches"
  difficulty: 2
  stdlib_modules: [std.str, std.io, std.collections]
  input_format: "First line: comma-separated flagged words. Remaining: text"
  output_format: "Lines of 'Line N, col M: <word>' for each match, or 'CLEAN' if none"
  test_cases:
    - input: "spam,fraud\nThis is spam and fraud.\nNormal line."
      expected_output: "Line 1, col 9: spam\nLine 1, col 18: fraud"
    - input: "spam\nClean text here."
      expected_output: "CLEAN"
  constraints: ["Case-insensitive", "Whole-word matching", "Column is 1-indexed"]

- id: "MED-126"
  title: "Markdown Bold Extractor"
  description: "Extracts all bold text spans from Markdown"
  difficulty: 1
  stdlib_modules: [std.str, std.io]
  input_format: "Markdown text on stdin"
  output_format: "One bold phrase per line without markers"
  test_cases:
    - input: "This is **bold** and **very bold** text."
      expected_output: "bold\nvery bold"
    - input: "No bold here"
      expected_output: ""
  constraints: ["** delimiters only", "Each span on its own line"]

- id: "MED-127"
  title: "Template Validator"
  description: "Validates that all {{var}} placeholders in a template have corresponding values"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "First block: template. '---' separator. Second block: KEY=VALUE pairs"
  output_format: "'VALID' or lines of 'MISSING: varname' for unresolved placeholders"
  test_cases:
    - input: "Hello {{name}} from {{place}}.\n---\nname=Alice\nplace=Earth"
      expected_output: "VALID"
    - input: "Hello {{name}} from {{place}}.\n---\nname=Alice"
      expected_output: "MISSING: place"
  constraints: ["Report all missing variables", "Extra values are not errors"]

- id: "MED-128"
  title: "XML to JSON Converter"
  description: "Converts simple XML documents to JSON"
  difficulty: 4
  stdlib_modules: [std.str, std.io, std.json]
  input_format: "Simple XML on stdin (no namespaces, no attributes)"
  output_format: "JSON representation of XML hierarchy"
  test_cases:
    - input: "<root><name>Alice</name><age>30</age></root>"
      expected_output: "{\"root\":{\"name\":\"Alice\",\"age\":\"30\"}}"
    - input: "<items><item>A</item><item>B</item></items>"
      expected_output: "{\"items\":{\"item\":[\"A\",\"B\"]}}"
  constraints: ["No attribute support", "Repeated tags become arrays", "Text content as string"]

- id: "MED-129"
  title: "Markdown Admonition Formatter"
  description: "Converts NOTE/WARNING/TIP prefixed paragraphs to styled admonition blocks"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Markdown text where paragraphs start with 'NOTE:', 'WARNING:', or 'TIP:'"
  output_format: "Markdown with admonitions wrapped in fenced blocks with type label"
  test_cases:
    - input: "NOTE: This is important."
      expected_output: "```note\nThis is important.\n```"
    - input: "WARNING: Be careful here."
      expected_output: "```warning\nBe careful here.\n```"
  constraints: ["Supported prefixes: NOTE, WARNING, TIP, INFO", "Lowercase fence type"]

- id: "MED-130"
  title: "Full Markdown to HTML Renderer"
  description: "Renders a Markdown document to a complete HTML5 page"
  difficulty: 5
  stdlib_modules: [std.str, std.html, std.md, std.io]
  input_format: "Markdown document on stdin"
  output_format: "Complete HTML5 document with <html>, <head>, <body> structure"
  test_cases:
    - input: "# Hello\n\nThis is **bold** text.\n\n- item one\n- item two"
      expected_output: "<!DOCTYPE html>\n<html>\n<head><meta charset=\"utf-8\"></head>\n<body>\n<h1>Hello</h1>\n<p>This is <strong>bold</strong> text.</p>\n<ul>\n<li>item one</li>\n<li>item two</li>\n</ul>\n</body>\n</html>"
    - input: "## Subheading\n\n> A quote"
      expected_output: "<!DOCTYPE html>\n<html>\n<head><meta charset=\"utf-8\"></head>\n<body>\n<h2>Subheading</h2>\n<blockquote><p>A quote</p></blockquote>\n</body>\n</html>"
  constraints: ["Support h1-h6, p, strong, em, ul, ol, li, blockquote, code, pre, hr", "Valid HTML5"]
