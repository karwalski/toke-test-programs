      expected_output: "[{\"name\":\"Alice\",\"age\":\"30\"},{\"name\":\"Bob\",\"age\":\"25\"}]"
    - input: "x,y\n1,2"
      expected_output: "[{\"x\":\"1\",\"y\":\"2\"}]"
  constraints: ["All values as strings", "No type inference", "Compact JSON output"]

- id: "MED-102"
