    - input: "[{\"name\":\"Alice\",\"age\":\"30\"},{\"name\":\"Bob\",\"age\":\"25\"}]"
      expected_output: "name,age\nAlice,30\nBob,25"
    - input: "[{\"x\":\"1\",\"y\":\"2\"}]"
      expected_output: "x,y\n1,2"
  constraints: ["Header order from first object", "Quote values containing commas", "All values as strings"]

