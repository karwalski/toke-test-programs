      expected_output: "978-3-16-148410-0: VALID\n0-306-40615-2: VALID"
    - input: "978-3-16-148410-1"
      expected_output: "978-3-16-148410-1: INVALID"
  constraints: ["Strip hyphens before validating", "ISBN-13: mod 10 check", "ISBN-10: mod 11 check"]

