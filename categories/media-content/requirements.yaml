  test_cases:
    - input: "user@example.com\nbadatgmail.com\ntest+tag@sub.domain.org"
      expected_output: "user@example.com: VALID\nbadatgmail.com: INVALID\ntest+tag@sub.domain.org: VALID"
    - input: "@nodomain.com"
      expected_output: "@nodomain.com: INVALID"
  constraints: ["Require local@domain.tld format", "No spaces allowed"]

- id: "MED-096"
