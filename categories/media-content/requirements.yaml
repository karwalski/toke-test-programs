    - input: "US\n2024-03-25"
      expected_output: "03/25/2024"
  constraints: ["ISO=YYYY-MM-DD, US=MM/DD/YYYY, EU=DD.MM.YYYY, LONG=January 15 2024", "Auto-detect input format"]

