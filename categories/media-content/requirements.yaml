      expected_output: "ASAP\nGPU"
    - input: "American Standard Code for Information Interchange"
      expected_output: "ASCII"
  constraints: ["First letter of each word", "Uppercase output", "Skip words of fewer than 2 chars? No — include all first letters"]

- id: "MED-088"
  title: "Pig Latin Translator"
  description: "Translates English words to Pig Latin"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Text on stdin"
  output_format: "Pig Latin translation"
  test_cases:
    - input: "hello world"
      expected_output: "ellohay orldway"
    - input: "apple orange"
      expected_output: "appleway orangeway"
  constraints: ["Vowel-start words: append 'way'", "Consonant-start words: move consonant cluster to end + 'ay'", "Lowercase output"]

- id: "MED-089"
  title: "Text Columnar Formatter"
  description: "Formats a list of items into N evenly distributed columns"
  difficulty: 3
  stdlib_modules: [std.str, std.io]
  input_format: "First line: integer N (columns). Remaining: one item per line"
  output_format: "Items arranged in N columns, left-aligned, space-separated"
  test_cases:
    - input: "3\nalpha\nbeta\ngamma\ndelta\nepsilon"
      expected_output: "alpha  beta   gamma\ndelta  epsilon"
    - input: "2\na\nb\nc"
      expected_output: "a  b\nc"
  constraints: ["Column width = max item length + 2", "Row-major order"]

- id: "MED-090"
  title: "Markdown Checklist Parser"
  description: "Parses Markdown task list checkboxes and reports completion status"
  difficulty: 2
  stdlib_modules: [std.str, std.io]
  input_format: "Markdown task list on stdin"
  output_format: "Summary: 'N/M completed' followed by incomplete item titles"
  test_cases:
