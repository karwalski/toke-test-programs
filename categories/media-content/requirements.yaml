  output_format: "Formatted as +CC (NXX) NXX-XXXX or original if unparseable"
  test_cases:
    - input: "14155551234"
      expected_output: "+1 (415) 555-1234"
    - input: "555-1234"
      expected_output: "555-1234"
  constraints: ["Support 10 and 11 digit numbers", "Unparseable numbers passed through unchanged"]

- id: "MED-095"
  title: "Email Address Validator"
  description: "Validates email addresses using RFC 5322 simplified rules"
  difficulty: 2
