  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, user_id"
  output_format: "stdout: JSON response with follow status"
  test_cases:
    - input: "{\"action\":\"follow\",\"token\":\"eyJ...\",\"user_id\":2}"
      expected_output: "{\"user_id\":2,\"following\":true,\"status\":\"followed\"}"
  constraints: ["REST API pattern", "JSON in/out", "Cannot follow self"]

- id: "SOC-072"
  title: "Unfollow user"
