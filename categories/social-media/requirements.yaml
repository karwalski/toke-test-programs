      expected_output: "{\"user_id\":5,\"status\":\"pending\",\"requested_at\":\"2026-01-01T00:00:00Z\"}"
  constraints: ["REST API pattern", "JSON in/out", "Only for private accounts"]

- id: "SOC-078"
  title: "Accept/reject follow request"
  description: "Accept or reject a pending follow request."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, requester_id, decision"
  output_format: "stdout: JSON response with decision result"
  test_cases:
    - input: "{\"action\":\"decide_follow_request\",\"token\":\"eyJ...\",\"requester_id\":3,\"decision\":\"accept\"}"
      expected_output: "{\"requester_id\":3,\"decision\":\"accepted\",\"status\":\"now_following\"}"
  constraints: ["REST API pattern", "JSON in/out", "Accept or reject only"]

- id: "SOC-079"
  title: "Remove follower"
