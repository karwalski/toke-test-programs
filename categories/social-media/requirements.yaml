      expected_output: "{\"suggestions\":[{\"type\":\"query\",\"text\":\"machine learning\"},{\"type\":\"user\",\"text\":\"@macdev\"},{\"type\":\"hashtag\",\"text\":\"#macos\"}]}"
  constraints: ["REST API pattern", "JSON in/out", "Mixed result types"]

- id: "SOC-088"
  title: "Recent searches"
  description: "Retrieve and manage the user's recent search history."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token"
  output_format: "stdout: JSON response with recent searches"
  test_cases:
    - input: "{\"action\":\"recent_searches\",\"token\":\"eyJ...\"}"
      expected_output: "{\"searches\":[{\"query\":\"rust programming\",\"searched_at\":\"2026-01-01T00:00:00Z\"},{\"query\":\"@alice\",\"searched_at\":\"2025-12-31T00:00:00Z\"}]}"
  constraints: ["REST API pattern", "JSON in/out", "Max 50 entries"]

- id: "SOC-089"
