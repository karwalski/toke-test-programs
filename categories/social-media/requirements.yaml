  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db]
  input_format: "stdin: JSON request with action, list_id, cursor, limit"
  output_format: "stdout: JSON response with list members"
  test_cases:
    - input: "{\"action\":\"list_members\",\"list_id\":\"lst_1\",\"cursor\":null,\"limit\":50}"
      expected_output: "{\"list_id\":\"lst_1\",\"members\":[{\"id\":2,\"username\":\"bob\",\"added_at\":\"2026-01-01T00:00:00Z\"}],\"total\":1,\"next_cursor\":null}"
  constraints: ["REST API pattern", "JSON in/out", "Public lists visible to all"]

- id: "SOC-140"
  title: "Subscribe to list"
  description: "Subscribe to another user's public list to see it in your lists tab."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, list_id"
  output_format: "stdout: JSON response with subscription status"
  test_cases:
    - input: "{\"action\":\"subscribe_list\",\"token\":\"eyJ...\",\"list_id\":\"lst_1\"}"
      expected_output: "{\"list_id\":\"lst_1\",\"subscribed\":true,\"status\":\"subscribed\"}"
  constraints: ["REST API pattern", "JSON in/out", "Public lists only"]

- id: "SOC-141"
  title: "Get user's lists"
  description: "Retrieve all lists created by or subscribed to by the authenticated user."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token"
  output_format: "stdout: JSON response with lists array"
  test_cases:
    - input: "{\"action\":\"my_lists\",\"token\":\"eyJ...\"}"
      expected_output: "{\"owned\":[{\"id\":\"lst_1\",\"name\":\"Tech Leaders\",\"member_count\":5}],\"subscribed\":[{\"id\":\"lst_2\",\"name\":\"News Sources\",\"owner\":\"bob\",\"member_count\":20}]}"
  constraints: ["REST API pattern", "JSON in/out", "Auth required"]

- id: "SOC-142"
  title: "Delete list"
  description: "Delete a user-created list and all its memberships."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, list_id"
  output_format: "stdout: JSON response with deletion status"
  test_cases:
    - input: "{\"action\":\"delete_list\",\"token\":\"eyJ...\",\"list_id\":\"lst_1\"}"
      expected_output: "{\"list_id\":\"lst_1\",\"status\":\"deleted\"}"
  constraints: ["REST API pattern", "JSON in/out", "Owner only"]

- id: "SOC-143"
  title: "Create interest group"
  description: "Create a public or private interest group that users can join."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, name, description, rules, private"
  output_format: "stdout: JSON response with group object"
  test_cases:
    - input: "{\"action\":\"create_group\",\"token\":\"eyJ...\",\"name\":\"Rust Developers\",\"description\":\"For Rust enthusiasts\",\"rules\":[\"Be respectful\",\"Stay on topic\"],\"private\":false}"
      expected_output: "{\"group_id\":\"grp_1\",\"name\":\"Rust Developers\",\"description\":\"For Rust enthusiasts\",\"member_count\":1,\"status\":\"created\"}"
  constraints: ["REST API pattern", "JSON in/out", "Creator becomes admin"]

- id: "SOC-144"
  title: "Join group"
  description: "Join a public group or request to join a private group."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, group_id"
  output_format: "stdout: JSON response with join status"
  test_cases:
    - input: "{\"action\":\"join_group\",\"token\":\"eyJ...\",\"group_id\":\"grp_1\"}"
      expected_output: "{\"group_id\":\"grp_1\",\"member\":true,\"role\":\"member\",\"status\":\"joined\"}"
  constraints: ["REST API pattern", "JSON in/out", "Private groups need approval"]

- id: "SOC-145"
  title: "Group post"
  description: "Create a post within a group, visible only to group members."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, group_id, content"
  output_format: "stdout: JSON response with group post object"
  test_cases:
    - input: "{\"action\":\"group_post\",\"token\":\"eyJ...\",\"group_id\":\"grp_1\",\"content\":\"Anyone tried the new Rust 2026 features?\"}"
      expected_output: "{\"id\":50,\"group_id\":\"grp_1\",\"content\":\"Anyone tried the new Rust 2026 features?\",\"author\":\"alice\",\"visibility\":\"group\",\"status\":\"created\"}"
  constraints: ["REST API pattern", "JSON in/out", "Member only"]

# =============================================================================
# API DESIGN & UTILITY (SOC-146 to SOC-150)
