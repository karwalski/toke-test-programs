      expected_output: "{\"user_id\":2,\"following\":false,\"status\":\"unfollowed\"}"
  constraints: ["REST API pattern", "JSON in/out", "Idempotent"]

- id: "SOC-073"
  title: "Get followers list"
  description: "Retrieve paginated list of users following a specific user."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db]
  input_format: "stdin: JSON request with action, user_id, cursor, limit"
  output_format: "stdout: JSON response with followers array"
  test_cases:
    - input: "{\"action\":\"get_followers\",\"user_id\":1,\"cursor\":null,\"limit\":20}"
      expected_output: "{\"user_id\":1,\"followers\":[{\"id\":2,\"username\":\"bob\",\"followed_at\":\"2026-01-01T00:00:00Z\"}],\"total\":1,\"next_cursor\":null}"
  constraints: ["REST API pattern", "JSON in/out", "Cursor pagination"]

- id: "SOC-074"
  title: "Get following list"
  description: "Retrieve paginated list of users that a specific user is following."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db]
  input_format: "stdin: JSON request with action, user_id, cursor, limit"
  output_format: "stdout: JSON response with following array"
  test_cases:
    - input: "{\"action\":\"get_following\",\"user_id\":1,\"cursor\":null,\"limit\":20}"
      expected_output: "{\"user_id\":1,\"following\":[{\"id\":3,\"username\":\"carol\",\"followed_at\":\"2026-01-01T00:00:00Z\"}],\"total\":1,\"next_cursor\":null}"
  constraints: ["REST API pattern", "JSON in/out", "Cursor pagination"]

- id: "SOC-075"
  title: "Mutual followers"
