      expected_output: "{\"trending\":[{\"rank\":1,\"query\":\"world cup\",\"search_volume\":50000},{\"rank\":2,\"query\":\"new album\",\"search_volume\":35000}],\"updated_at\":\"2026-01-01T00:00:00Z\"}"
  constraints: ["REST API pattern", "JSON in/out", "Regional filtering"]

