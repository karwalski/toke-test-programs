- id: "SOC-146"
  title: "Rate limit status"
  description: "Check current API rate limit status and remaining quota."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.auth, std.time]
  input_format: "stdin: JSON request with action, token"
  output_format: "stdout: JSON response with rate limit info"
  test_cases:
    - input: "{\"action\":\"rate_limit_status\",\"token\":\"eyJ...\"}"
      expected_output: "{\"limit\":300,\"remaining\":250,\"reset_at\":\"2026-01-01T00:15:00Z\",\"window_seconds\":900}"
  constraints: ["REST API pattern", "JSON in/out", "Per-user limits"]

- id: "SOC-147"
  title: "API health check"
  description: "Check API service health and response time across subsystems."
  difficulty: 1
  stdlib_modules: [std.http, std.json, std.time]
  input_format: "stdin: JSON request with action"
  output_format: "stdout: JSON response with health status"
  test_cases:
    - input: "{\"action\":\"health_check\"}"
      expected_output: "{\"status\":\"healthy\",\"services\":{\"database\":\"up\",\"cache\":\"up\",\"search\":\"up\"},\"response_time_ms\":12,\"version\":\"1.0.0\"}"
  constraints: ["REST API pattern", "JSON in/out", "No auth required"]

- id: "SOC-148"
  title: "Batch operations"
  description: "Execute multiple API operations in a single request for efficiency."
  difficulty: 4
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, operations array"
  output_format: "stdout: JSON response with results per operation"
  test_cases:
    - input: "{\"action\":\"batch\",\"token\":\"eyJ...\",\"operations\":[{\"action\":\"like_post\",\"post_id\":1},{\"action\":\"like_post\",\"post_id\":2},{\"action\":\"follow\",\"user_id\":3}]}"
      expected_output: "{\"results\":[{\"index\":0,\"status\":\"success\",\"data\":{\"liked\":true}},{\"index\":1,\"status\":\"success\",\"data\":{\"liked\":true}},{\"index\":2,\"status\":\"success\",\"data\":{\"following\":true}}],\"total\":3,\"succeeded\":3,\"failed\":0}"
  constraints: ["REST API pattern", "JSON in/out", "Max 25 operations per batch"]

- id: "SOC-149"
  title: "Webhook registration"
  description: "Register a webhook URL to receive real-time notifications for events."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.crypto]
  input_format: "stdin: JSON request with action, token, url, events"
  output_format: "stdout: JSON response with webhook registration"
  test_cases:
    - input: "{\"action\":\"register_webhook\",\"token\":\"eyJ...\",\"url\":\"https://myapp.com/hooks/social\",\"events\":[\"new_follower\",\"new_mention\"]}"
      expected_output: "{\"webhook_id\":\"wh_1\",\"url\":\"https://myapp.com/hooks/social\",\"events\":[\"new_follower\",\"new_mention\"],\"secret\":\"whsec_abc123\",\"status\":\"active\"}"
  constraints: ["REST API pattern", "JSON in/out", "HMAC signature verification"]

- id: "SOC-150"
  title: "API versioning"
  description: "Handle API version negotiation and return appropriate response format."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.str]
  input_format: "stdin: JSON request with action, api_version"
  output_format: "stdout: JSON response with version info and deprecation warnings"
  test_cases:
    - input: "{\"action\":\"version_info\",\"api_version\":\"v1\"}"
      expected_output: "{\"current_version\":\"v2\",\"requested_version\":\"v1\",\"supported\":true,\"deprecated\":true,\"sunset_date\":\"2026-06-01\",\"migration_guide\":\"https://docs.social.app/migrate/v1-to-v2\"}"
  constraints: ["REST API pattern", "JSON in/out", "Backward compatible"]
