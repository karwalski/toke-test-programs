      expected_output: "{\"users\":[{\"id\":10,\"username\":\"topdev\",\"verified\":true,\"followers\":5000,\"bio\":\"Senior developer\"}],\"total\":1}"
  constraints: ["REST API pattern", "JSON in/out", "Combinable filters"]

- id: "SOC-091"
