# Social Media Engine - Program Requirements
# 130+ unique requirements covering user management, content, feeds, interactions,
# comments, social graph, search, notifications, moderation, analytics, API design,
# trending, DMs, lists/groups. All REST API patterns with JSON request/response.

# =============================================================================
# USER MANAGEMENT (SOC-001 to SOC-015)
# =============================================================================

- id: "SOC-001"
  title: "User registration"
  description: "Register a new user with email, username, and password. Hash password before storage."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.crypto]
  input_format: "stdin: JSON request with action, email, username, password"
  output_format: "stdout: JSON response with user id and status"
  test_cases:
    - input: "{\"action\":\"register\",\"email\":\"alice@example.com\",\"username\":\"alice\",\"password\":\"s3cur3!\"}"
      expected_output: "{\"id\":1,\"username\":\"alice\",\"status\":\"registered\"}"
  constraints: ["REST API pattern", "JSON in/out", "Password must be hashed"]

- id: "SOC-002"
  title: "User login with JWT"
  description: "Authenticate user with email and password, return a JWT access token."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.crypto, std.auth]
  input_format: "stdin: JSON request with action, email, password"
  output_format: "stdout: JSON response with token and expiry"
  test_cases:
    - input: "{\"action\":\"login\",\"email\":\"alice@example.com\",\"password\":\"s3cur3!\"}"
      expected_output: "{\"token\":\"eyJ...\",\"expires_in\":3600,\"status\":\"authenticated\"}"
  constraints: ["REST API pattern", "JSON in/out", "JWT token format"]

- id: "SOC-003"
  title: "User profile retrieval"
  description: "Fetch a user profile by user ID, returning public profile information."
  difficulty: 1
  stdlib_modules: [std.http, std.json, std.db]
  input_format: "stdin: JSON request with action and user_id"
  output_format: "stdout: JSON response with user profile fields"
  test_cases:
    - input: "{\"action\":\"get_profile\",\"user_id\":1}"
      expected_output: "{\"id\":1,\"username\":\"alice\",\"bio\":\"\",\"avatar_url\":null,\"follower_count\":0,\"following_count\":0}"
  constraints: ["REST API pattern", "JSON in/out"]

- id: "SOC-004"
  title: "Update user profile"
  description: "Update bio, display name, and avatar URL for the authenticated user."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, and profile fields"
  output_format: "stdout: JSON response with updated profile"
  test_cases:
    - input: "{\"action\":\"update_profile\",\"token\":\"eyJ...\",\"bio\":\"Hello world\",\"display_name\":\"Alice W\"}"
      expected_output: "{\"id\":1,\"bio\":\"Hello world\",\"display_name\":\"Alice W\",\"status\":\"updated\"}"
  constraints: ["REST API pattern", "JSON in/out", "Auth required"]

- id: "SOC-005"
  title: "Change password"
  description: "Allow authenticated user to change password by providing old and new password."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.crypto, std.auth]
  input_format: "stdin: JSON request with action, token, old_password, new_password"
  output_format: "stdout: JSON response with status"
  test_cases:
    - input: "{\"action\":\"change_password\",\"token\":\"eyJ...\",\"old_password\":\"s3cur3!\",\"new_password\":\"n3wP@ss\"}"
      expected_output: "{\"status\":\"password_changed\"}"
  constraints: ["REST API pattern", "JSON in/out", "Verify old password first"]

- id: "SOC-006"
  title: "Password reset request"
  description: "Generate a password reset token and return it for email delivery."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.crypto, std.time]
  input_format: "stdin: JSON request with action and email"
  output_format: "stdout: JSON response with reset token and expiry"
  test_cases:
    - input: "{\"action\":\"request_reset\",\"email\":\"alice@example.com\"}"
      expected_output: "{\"reset_token\":\"abc123\",\"expires_in\":900,\"status\":\"reset_sent\"}"
  constraints: ["REST API pattern", "JSON in/out", "Token expires in 15 minutes"]

- id: "SOC-007"
  title: "Deactivate account"
  description: "Soft-delete user account, marking it as deactivated but preserving data."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, confirmation"
  output_format: "stdout: JSON response with status"
  test_cases:
    - input: "{\"action\":\"deactivate\",\"token\":\"eyJ...\",\"confirm\":true}"
      expected_output: "{\"status\":\"deactivated\",\"reactivation_window_days\":30}"
  constraints: ["REST API pattern", "JSON in/out", "Soft delete only"]

- id: "SOC-008"
  title: "User search by username"
  description: "Search for users by partial username match, returning paginated results."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.str]
  input_format: "stdin: JSON request with action, query, page, limit"
  output_format: "stdout: JSON response with matched users array and pagination"
  test_cases:
    - input: "{\"action\":\"search_users\",\"query\":\"ali\",\"page\":1,\"limit\":10}"
      expected_output: "{\"users\":[{\"id\":1,\"username\":\"alice\"}],\"total\":1,\"page\":1,\"has_next\":false}"
  constraints: ["REST API pattern", "JSON in/out", "Case-insensitive match"]

- id: "SOC-009"
  title: "Email verification"
  description: "Verify a user's email address using a verification token."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.crypto]
  input_format: "stdin: JSON request with action and verification_token"
  output_format: "stdout: JSON response with verification status"
  test_cases:
    - input: "{\"action\":\"verify_email\",\"verification_token\":\"tok_abc123\"}"
      expected_output: "{\"status\":\"verified\",\"email\":\"alice@example.com\"}"
  constraints: ["REST API pattern", "JSON in/out", "Token single-use"]

- id: "SOC-010"
  title: "User session management"
  description: "List active sessions for a user and allow revoking specific sessions."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token"
  output_format: "stdout: JSON response with sessions array"
  test_cases:
    - input: "{\"action\":\"list_sessions\",\"token\":\"eyJ...\"}"
      expected_output: "{\"sessions\":[{\"id\":\"s1\",\"device\":\"Chrome/Mac\",\"created_at\":\"2026-01-01T00:00:00Z\",\"current\":true}]}"
  constraints: ["REST API pattern", "JSON in/out", "Mark current session"]

- id: "SOC-011"
  title: "Revoke session"
  description: "Revoke a specific user session by session ID."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, session_id"
  output_format: "stdout: JSON response with status"
  test_cases:
    - input: "{\"action\":\"revoke_session\",\"token\":\"eyJ...\",\"session_id\":\"s2\"}"
      expected_output: "{\"status\":\"revoked\",\"session_id\":\"s2\"}"
  constraints: ["REST API pattern", "JSON in/out", "Cannot revoke current session"]

- id: "SOC-012"
  title: "Two-factor authentication setup"
  description: "Generate a TOTP secret and provisioning URI for 2FA enrollment."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.crypto, std.auth]
  input_format: "stdin: JSON request with action, token"
  output_format: "stdout: JSON response with secret and provisioning_uri"
  test_cases:
    - input: "{\"action\":\"setup_2fa\",\"token\":\"eyJ...\"}"
      expected_output: "{\"secret\":\"JBSWY3DPEHPK3PXP\",\"provisioning_uri\":\"otpauth://totp/SocialApp:alice?secret=JBSWY3DPEHPK3PXP\",\"status\":\"pending_verification\"}"
  constraints: ["REST API pattern", "JSON in/out", "TOTP standard"]

- id: "SOC-013"
  title: "Verify 2FA code"
  description: "Verify a TOTP code to complete 2FA enrollment or login."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.crypto, std.auth]
  input_format: "stdin: JSON request with action, token, code"
  output_format: "stdout: JSON response with verification status"
  test_cases:
    - input: "{\"action\":\"verify_2fa\",\"token\":\"eyJ...\",\"code\":\"123456\"}"
      expected_output: "{\"status\":\"2fa_enabled\",\"backup_codes\":[\"abc123\",\"def456\"]}"
  constraints: ["REST API pattern", "JSON in/out", "Time-based OTP validation"]

- id: "SOC-014"
  title: "User privacy settings"
  description: "Get and update user privacy settings: profile visibility, DM permissions, activity visibility."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, settings object"
  output_format: "stdout: JSON response with updated settings"
  test_cases:
    - input: "{\"action\":\"update_privacy\",\"token\":\"eyJ...\",\"settings\":{\"profile_public\":true,\"allow_dms\":\"followers\",\"show_activity\":false}}"
      expected_output: "{\"settings\":{\"profile_public\":true,\"allow_dms\":\"followers\",\"show_activity\":false},\"status\":\"updated\"}"
  constraints: ["REST API pattern", "JSON in/out", "Auth required"]

- id: "SOC-015"
  title: "Account data export"
  description: "Request a full data export of user account, returning a job ID for async processing."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, format"
  output_format: "stdout: JSON response with job_id and estimated completion"
  test_cases:
    - input: "{\"action\":\"export_data\",\"token\":\"eyJ...\",\"format\":\"json\"}"
      expected_output: "{\"job_id\":\"exp_001\",\"status\":\"processing\",\"estimated_minutes\":5}"
  constraints: ["REST API pattern", "JSON in/out", "GDPR compliance"]

# =============================================================================
# CONTENT CRUD (SOC-016 to SOC-030)
# =============================================================================

- id: "SOC-016"
  title: "Create text post"
  description: "Create a new text post with content, optional tags, and visibility setting."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, content, tags, visibility"
  output_format: "stdout: JSON response with post object"
  test_cases:
    - input: "{\"action\":\"create_post\",\"token\":\"eyJ...\",\"content\":\"Hello world!\",\"tags\":[\"intro\"],\"visibility\":\"public\"}"
      expected_output: "{\"id\":1,\"content\":\"Hello world!\",\"tags\":[\"intro\"],\"visibility\":\"public\",\"created_at\":\"2026-01-01T00:00:00Z\",\"status\":\"created\"}"
  constraints: ["REST API pattern", "JSON in/out", "Max 500 chars"]

- id: "SOC-017"
  title: "Create media post"
  description: "Create a post with attached media URLs and alt text descriptions."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, content, media array"
  output_format: "stdout: JSON response with post object including media"
  test_cases:
    - input: "{\"action\":\"create_media_post\",\"token\":\"eyJ...\",\"content\":\"Check this out\",\"media\":[{\"url\":\"https://img.example.com/1.jpg\",\"alt\":\"sunset\"}]}"
      expected_output: "{\"id\":2,\"content\":\"Check this out\",\"media\":[{\"url\":\"https://img.example.com/1.jpg\",\"alt\":\"sunset\"}],\"status\":\"created\"}"
  constraints: ["REST API pattern", "JSON in/out", "Max 4 media items"]

- id: "SOC-018"
  title: "Get post by ID"
  description: "Retrieve a single post by its ID including engagement counts."
  difficulty: 1
  stdlib_modules: [std.http, std.json, std.db]
  input_format: "stdin: JSON request with action and post_id"
  output_format: "stdout: JSON response with full post object"
  test_cases:
    - input: "{\"action\":\"get_post\",\"post_id\":1}"
      expected_output: "{\"id\":1,\"author\":{\"id\":1,\"username\":\"alice\"},\"content\":\"Hello world!\",\"likes\":0,\"shares\":0,\"comments\":0,\"created_at\":\"2026-01-01T00:00:00Z\"}"
  constraints: ["REST API pattern", "JSON in/out"]

- id: "SOC-019"
  title: "Update post content"
  description: "Edit an existing post's content. Only the author can edit. Track edit history."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, post_id, content"
  output_format: "stdout: JSON response with updated post and edit timestamp"
  test_cases:
    - input: "{\"action\":\"update_post\",\"token\":\"eyJ...\",\"post_id\":1,\"content\":\"Hello world! (edited)\"}"
      expected_output: "{\"id\":1,\"content\":\"Hello world! (edited)\",\"edited_at\":\"2026-01-01T01:00:00Z\",\"status\":\"updated\"}"
  constraints: ["REST API pattern", "JSON in/out", "Author only"]

- id: "SOC-020"
  title: "Delete post"
  description: "Soft-delete a post. Only the author or a moderator can delete."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, post_id"
  output_format: "stdout: JSON response with deletion status"
  test_cases:
    - input: "{\"action\":\"delete_post\",\"token\":\"eyJ...\",\"post_id\":1}"
      expected_output: "{\"post_id\":1,\"status\":\"deleted\"}"
  constraints: ["REST API pattern", "JSON in/out", "Soft delete"]

- id: "SOC-021"
  title: "Create poll post"
  description: "Create a post with an embedded poll containing 2-4 options and a duration."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, question, options, duration_hours"
  output_format: "stdout: JSON response with poll post object"
  test_cases:
    - input: "{\"action\":\"create_poll\",\"token\":\"eyJ...\",\"question\":\"Favorite color?\",\"options\":[\"Red\",\"Blue\",\"Green\"],\"duration_hours\":24}"
      expected_output: "{\"id\":3,\"type\":\"poll\",\"question\":\"Favorite color?\",\"options\":[{\"id\":1,\"text\":\"Red\",\"votes\":0},{\"id\":2,\"text\":\"Blue\",\"votes\":0},{\"id\":3,\"text\":\"Green\",\"votes\":0}],\"expires_at\":\"2026-01-02T00:00:00Z\",\"status\":\"created\"}"
  constraints: ["REST API pattern", "JSON in/out", "2-4 options required"]

- id: "SOC-022"
  title: "Vote on poll"
  description: "Cast a vote on a poll option. Each user can vote once per poll."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, post_id, option_id"
  output_format: "stdout: JSON response with updated poll results"
  test_cases:
    - input: "{\"action\":\"vote_poll\",\"token\":\"eyJ...\",\"post_id\":3,\"option_id\":2}"
      expected_output: "{\"post_id\":3,\"voted_option\":2,\"results\":[{\"id\":1,\"text\":\"Red\",\"votes\":0},{\"id\":2,\"text\":\"Blue\",\"votes\":1},{\"id\":3,\"text\":\"Green\",\"votes\":0}],\"status\":\"voted\"}"
  constraints: ["REST API pattern", "JSON in/out", "One vote per user"]

- id: "SOC-023"
  title: "Schedule post"
  description: "Create a post scheduled for future publication at a specified time."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, content, scheduled_at"
  output_format: "stdout: JSON response with scheduled post object"
  test_cases:
    - input: "{\"action\":\"schedule_post\",\"token\":\"eyJ...\",\"content\":\"Coming soon!\",\"scheduled_at\":\"2026-02-01T12:00:00Z\"}"
      expected_output: "{\"id\":4,\"content\":\"Coming soon!\",\"scheduled_at\":\"2026-02-01T12:00:00Z\",\"status\":\"scheduled\"}"
  constraints: ["REST API pattern", "JSON in/out", "Must be future time"]

- id: "SOC-024"
  title: "Pin post to profile"
  description: "Pin a post to the top of the user's profile. Max 3 pinned posts."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, post_id"
  output_format: "stdout: JSON response with pin status"
  test_cases:
    - input: "{\"action\":\"pin_post\",\"token\":\"eyJ...\",\"post_id\":1}"
      expected_output: "{\"post_id\":1,\"pinned\":true,\"pin_position\":1,\"status\":\"pinned\"}"
  constraints: ["REST API pattern", "JSON in/out", "Max 3 pins"]

- id: "SOC-025"
  title: "Get user posts timeline"
  description: "Retrieve all posts by a specific user in reverse chronological order with pagination."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.time]
  input_format: "stdin: JSON request with action, user_id, cursor, limit"
  output_format: "stdout: JSON response with posts array and pagination cursor"
  test_cases:
    - input: "{\"action\":\"user_posts\",\"user_id\":1,\"cursor\":null,\"limit\":20}"
      expected_output: "{\"posts\":[{\"id\":1,\"content\":\"Hello world!\",\"created_at\":\"2026-01-01T00:00:00Z\"}],\"next_cursor\":null,\"has_more\":false}"
  constraints: ["REST API pattern", "JSON in/out", "Cursor pagination"]

- id: "SOC-026"
  title: "Create thread"
  description: "Create a thread of multiple connected posts in sequence."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, posts array"
  output_format: "stdout: JSON response with thread object"
  test_cases:
    - input: "{\"action\":\"create_thread\",\"token\":\"eyJ...\",\"posts\":[{\"content\":\"Thread 1/3\"},{\"content\":\"Thread 2/3\"},{\"content\":\"Thread 3/3\"}]}"
      expected_output: "{\"thread_id\":\"t1\",\"posts\":[{\"id\":5,\"content\":\"Thread 1/3\",\"position\":1},{\"id\":6,\"content\":\"Thread 2/3\",\"position\":2},{\"id\":7,\"content\":\"Thread 3/3\",\"position\":3}],\"status\":\"created\"}"
  constraints: ["REST API pattern", "JSON in/out", "Max 25 posts per thread"]

- id: "SOC-027"
  title: "Repost content"
  description: "Repost another user's post to your timeline, optionally with a quote."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, post_id, quote"
  output_format: "stdout: JSON response with repost object"
  test_cases:
    - input: "{\"action\":\"repost\",\"token\":\"eyJ...\",\"post_id\":1,\"quote\":\"Great post!\"}"
      expected_output: "{\"id\":8,\"type\":\"repost\",\"original_post_id\":1,\"quote\":\"Great post!\",\"status\":\"created\"}"
  constraints: ["REST API pattern", "JSON in/out", "Cannot repost own posts"]

- id: "SOC-028"
  title: "Post visibility update"
  description: "Change post visibility between public, followers-only, and private."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, post_id, visibility"
  output_format: "stdout: JSON response with updated visibility"
  test_cases:
    - input: "{\"action\":\"set_visibility\",\"token\":\"eyJ...\",\"post_id\":1,\"visibility\":\"followers\"}"
      expected_output: "{\"post_id\":1,\"visibility\":\"followers\",\"status\":\"updated\"}"
  constraints: ["REST API pattern", "JSON in/out", "Author only"]

- id: "SOC-029"
  title: "Content warning label"
  description: "Add or remove a content warning label on a post."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, post_id, warning_text"
  output_format: "stdout: JSON response with updated post"
  test_cases:
    - input: "{\"action\":\"add_content_warning\",\"token\":\"eyJ...\",\"post_id\":1,\"warning_text\":\"Spoiler alert\"}"
      expected_output: "{\"post_id\":1,\"content_warning\":\"Spoiler alert\",\"status\":\"updated\"}"
  constraints: ["REST API pattern", "JSON in/out", "Author only"]

- id: "SOC-030"
  title: "Post translation"
  description: "Request machine translation of a post to a target language."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.str]
  input_format: "stdin: JSON request with action, post_id, target_language"
  output_format: "stdout: JSON response with translated content"
  test_cases:
    - input: "{\"action\":\"translate_post\",\"post_id\":1,\"target_language\":\"es\"}"
      expected_output: "{\"post_id\":1,\"original_language\":\"en\",\"target_language\":\"es\",\"translated_content\":\"Hola mundo!\",\"status\":\"translated\"}"
  constraints: ["REST API pattern", "JSON in/out", "ISO 639-1 language codes"]

# =============================================================================
# FEEDS (SOC-031 to SOC-042)
# =============================================================================

- id: "SOC-031"
  title: "Home feed - chronological"
  description: "Retrieve home feed showing posts from followed users in reverse chronological order."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, cursor, limit"
  output_format: "stdout: JSON response with feed posts and pagination"
  test_cases:
    - input: "{\"action\":\"home_feed\",\"token\":\"eyJ...\",\"cursor\":null,\"limit\":20}"
      expected_output: "{\"posts\":[{\"id\":1,\"author\":\"alice\",\"content\":\"Hello!\",\"created_at\":\"2026-01-01T00:00:00Z\"}],\"next_cursor\":\"c_abc\",\"has_more\":true}"
  constraints: ["REST API pattern", "JSON in/out", "Only followed users"]

- id: "SOC-032"
  title: "Home feed - algorithmic"
  description: "Retrieve algorithmically ranked feed based on engagement signals and user preferences."
  difficulty: 4
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, cursor, limit"
  output_format: "stdout: JSON response with ranked feed posts"
  test_cases:
    - input: "{\"action\":\"algorithmic_feed\",\"token\":\"eyJ...\",\"cursor\":null,\"limit\":20}"
      expected_output: "{\"posts\":[{\"id\":5,\"author\":\"bob\",\"content\":\"Viral post\",\"score\":0.95,\"reason\":\"trending_in_network\"}],\"next_cursor\":\"c_def\",\"has_more\":true}"
  constraints: ["REST API pattern", "JSON in/out", "Score-based ranking"]

- id: "SOC-033"
  title: "Explore feed"
  description: "Public discovery feed showing popular content from users not yet followed."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, category, cursor"
  output_format: "stdout: JSON response with discover posts"
  test_cases:
    - input: "{\"action\":\"explore_feed\",\"token\":\"eyJ...\",\"category\":\"all\",\"cursor\":null}"
      expected_output: "{\"posts\":[{\"id\":10,\"author\":\"charlie\",\"content\":\"Trending content\",\"likes\":500}],\"next_cursor\":\"c_ghi\",\"has_more\":true}"
  constraints: ["REST API pattern", "JSON in/out", "Exclude followed users"]

- id: "SOC-034"
  title: "Tag feed"
  description: "Retrieve posts matching a specific hashtag, sorted by recency."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.str, std.time]
  input_format: "stdin: JSON request with action, tag, cursor, limit"
  output_format: "stdout: JSON response with tagged posts"
  test_cases:
    - input: "{\"action\":\"tag_feed\",\"tag\":\"programming\",\"cursor\":null,\"limit\":20}"
      expected_output: "{\"tag\":\"programming\",\"posts\":[{\"id\":12,\"content\":\"Love coding!\",\"author\":\"dev1\"}],\"total_posts\":150,\"next_cursor\":\"c_jkl\"}"
  constraints: ["REST API pattern", "JSON in/out", "Case-insensitive tag matching"]

- id: "SOC-035"
  title: "Bookmarked posts feed"
  description: "Retrieve the authenticated user's bookmarked posts in saved order."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, cursor, limit"
  output_format: "stdout: JSON response with bookmarked posts"
  test_cases:
    - input: "{\"action\":\"bookmarks_feed\",\"token\":\"eyJ...\",\"cursor\":null,\"limit\":20}"
