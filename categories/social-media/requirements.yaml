  stdlib_modules: [std.http, std.json, std.db]
  input_format: "stdin: JSON request with action, user_id_a, user_id_b, limit"
  output_format: "stdout: JSON response with mutual followers"
  test_cases:
    - input: "{\"action\":\"mutual_followers\",\"user_id_a\":1,\"user_id_b\":2,\"limit\":20}"
      expected_output: "{\"mutual\":[{\"id\":3,\"username\":\"carol\"}],\"total\":1}"
  constraints: ["REST API pattern", "JSON in/out", "Set intersection"]

- id: "SOC-076"
  title: "Follow suggestions"
  description: "Generate follow suggestions based on mutual connections and interests."
  difficulty: 4
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, limit"
  output_format: "stdout: JSON response with suggested users and reasons"
  test_cases:
    - input: "{\"action\":\"follow_suggestions\",\"token\":\"eyJ...\",\"limit\":10}"
      expected_output: "{\"suggestions\":[{\"id\":4,\"username\":\"dave\",\"reason\":\"followed_by_3_mutuals\",\"mutual_count\":3}]}"
  constraints: ["REST API pattern", "JSON in/out", "Exclude already-followed"]

- id: "SOC-077"
  title: "Follow request (private accounts)"
