  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, user_id"
  output_format: "stdout: JSON response with removal status"
  test_cases:
    - input: "{\"action\":\"remove_follower\",\"token\":\"eyJ...\",\"user_id\":2}"
      expected_output: "{\"user_id\":2,\"removed\":true,\"status\":\"follower_removed\"}"
  constraints: ["REST API pattern", "JSON in/out", "Does not block"]

- id: "SOC-080"
  title: "Close friends list"
  description: "Manage a close friends list for sharing exclusive content."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, user_ids to add"
  output_format: "stdout: JSON response with close friends list"
  test_cases:
    - input: "{\"action\":\"update_close_friends\",\"token\":\"eyJ...\",\"add_user_ids\":[2,3]}"
      expected_output: "{\"close_friends\":[{\"id\":2,\"username\":\"bob\"},{\"id\":3,\"username\":\"carol\"}],\"total\":2,\"status\":\"updated\"}"
  constraints: ["REST API pattern", "JSON in/out", "Max 100 members"]

- id: "SOC-081"
  title: "Relationship status check"
  description: "Check the relationship status between two users: following, followed_by, blocked, muted."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.auth]
  input_format: "stdin: JSON request with action, token, user_id"
  output_format: "stdout: JSON response with relationship details"
  test_cases:
    - input: "{\"action\":\"check_relationship\",\"token\":\"eyJ...\",\"user_id\":2}"
      expected_output: "{\"user_id\":2,\"following\":true,\"followed_by\":true,\"blocked\":false,\"muted\":false,\"close_friend\":false}"
  constraints: ["REST API pattern", "JSON in/out", "Auth required"]

- id: "SOC-082"
  title: "Follower growth analytics"
  description: "Retrieve follower count changes over time for the authenticated user."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.auth, std.time]
  input_format: "stdin: JSON request with action, token, period"
  output_format: "stdout: JSON response with growth data points"
