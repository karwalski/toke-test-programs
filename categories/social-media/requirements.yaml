      expected_output: "{\"saved_search_id\":\"ss_1\",\"query\":\"toke language\",\"notify\":true,\"status\":\"saved\"}"
  constraints: ["REST API pattern", "JSON in/out", "Max 25 saved searches"]

- id: "SOC-093"
  title: "Trending searches"
  description: "Get currently trending search queries across the platform."
  difficulty: 2
  stdlib_modules: [std.http, std.json, std.db, std.time]
  input_format: "stdin: JSON request with action, region, limit"
  output_format: "stdout: JSON response with trending queries"
  test_cases:
