      expected_output: "{\"cleared\":true,\"status\":\"search_history_cleared\"}"
  constraints: ["REST API pattern", "JSON in/out", "Auth required"]

- id: "SOC-090"
  title: "Search users with filters"
  description: "Search users with filters: verified status, follower count range, location."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.str]
  input_format: "stdin: JSON request with action, query, filters"
  output_format: "stdout: JSON response with filtered user results"
  test_cases:
