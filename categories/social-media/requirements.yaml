  constraints: ["REST API pattern", "JSON in/out", "Daily granularity"]

- id: "SOC-083"
  title: "Social graph distance"
  description: "Calculate the shortest path distance between two users in the follow graph."
  difficulty: 5
  stdlib_modules: [std.http, std.json, std.db]
  input_format: "stdin: JSON request with action, user_id_a, user_id_b, max_depth"
  output_format: "stdout: JSON response with distance and path"
  test_cases:
    - input: "{\"action\":\"graph_distance\",\"user_id_a\":1,\"user_id_b\":10,\"max_depth\":4}"
      expected_output: "{\"distance\":2,\"path\":[{\"id\":1,\"username\":\"alice\"},{\"id\":5,\"username\":\"eve\"},{\"id\":10,\"username\":\"frank\"}],\"status\":\"found\"}"
  constraints: ["REST API pattern", "JSON in/out", "BFS with max depth limit"]

# =============================================================================
# SEARCH (SOC-084 to SOC-093)
