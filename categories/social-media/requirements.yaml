  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.str]
  input_format: "stdin: JSON request with action, query, page, limit"
  output_format: "stdout: JSON response with matched posts and relevance scores"
  test_cases:
    - input: "{\"action\":\"search_posts\",\"query\":\"machine learning\",\"page\":1,\"limit\":20}"
      expected_output: "{\"results\":[{\"id\":15,\"content\":\"Machine learning is amazing\",\"author\":\"techie\",\"relevance\":0.95}],\"total\":5,\"page\":1}"
  constraints: ["REST API pattern", "JSON in/out", "Relevance-ranked"]

- id: "SOC-085"
  title: "Search with filters"
  description: "Advanced search with filters: date range, author, media type, engagement threshold."
  difficulty: 3
  stdlib_modules: [std.http, std.json, std.db, std.str, std.time]
  input_format: "stdin: JSON request with action, query, filters"
  output_format: "stdout: JSON response with filtered results"
  test_cases:
    - input: "{\"action\":\"search_advanced\",\"query\":\"rust\",\"filters\":{\"from_user\":\"alice\",\"has_media\":true,\"min_likes\":10,\"date_from\":\"2026-01-01\"}}"
      expected_output: "{\"results\":[{\"id\":20,\"content\":\"Rust with images\",\"author\":\"alice\",\"likes\":15,\"has_media\":true}],\"total\":1}"
  constraints: ["REST API pattern", "JSON in/out", "All filters optional"]

- id: "SOC-086"
