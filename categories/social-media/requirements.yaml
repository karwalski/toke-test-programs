      expected_output: "{\"hashtags\":[{\"tag\":\"programming\",\"post_count\":1500,\"trending\":true},{\"tag\":\"productivity\",\"post_count\":800,\"trending\":false}]}"
  constraints: ["REST API pattern", "JSON in/out", "Prefix matching"]

- id: "SOC-087"
  title: "Search suggestions"
