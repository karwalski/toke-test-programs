  test_cases:
    - input: "ssh.service\nnonexistent.service\n"
      expected_output: "ssh.service: active sub=running pid=579\nnonexistent.service: not-found sub=dead pid=-"
    - input: "cron.service\nfoo.bar.baz\n"
      expected_output: "cron.service: active sub=running pid=391\nfoo.bar.baz: not-found sub=dead pid=-"
    - input: "systemd-journald.service\n"
      expected_output: "systemd-journald.service: active sub=running pid=127"
  constraints:
    - "Use systemctl show command"
    - "Graceful on non-systemd systems (report N/A)"

- id: "SYS-117"
  title: "Executable PATH Scanner"
  description: "List all executables in PATH directories, optionally filtering by name prefix."
  difficulty: 2
  stdlib_modules: [std.env, std.file, std.path, std.io, std.str]
  input_format: "Optional: name prefix filter"
  output_format: "path_to_executable (one per line, sorted)"
  test_cases:
    - input: "git"
      expected_output: "(all git* executables in PATH)"
    - input: ""
      expected_output: "(all executables in PATH)"
  constraints:
    - "Deduplicate by filename (keep first in PATH order)"
    - "Only include files with execute permission"

- id: "SYS-118"
  title: "Stdin JSON Streamer"
  description: "Read newline-delimited JSON from stdin, apply a jq-style filter, and output matching results."
  difficulty: 3
  stdlib_modules: [std.json, std.io, std.str]
  input_format: "Line 1: field path (e.g. .name or .user.email). Remaining: newline-delimited JSON objects."
  output_format: "Extracted field value per line"
  test_cases:
    - input: ".name\n{\"name\":\"alice\",\"age\":30}\n{\"name\":\"bob\",\"age\":25}"
      expected_output: "alice\nbob"
    - input: ".user.email\n{\"user\":{\"email\":\"x@y.com\"}}"
      expected_output: "x@y.com"
  constraints:
    - "Skip lines where field is absent (with warning)"
    - "Support simple dot-notation paths only"

- id: "SYS-119"
  title: "Kernel Module Lister"
  description: "List loaded kernel modules with name, size, and use count."
  difficulty: 1
  stdlib_modules: [std.process, std.file, std.str, std.io]
  input_format: "Optional: name filter"
  output_format: "name size_KB use_count (one per module)"
  test_cases:
    - input: "---\next4 737280 1 - Live 0x0000000000000000\nbtrfs 1245184 0 - Live 0x0000000000000000\nxfs 1564672 2 - Live 0x0000000000000000\nvfat 24576 1 - Live 0x0000000000000000\next2 86016 0 - Live 0x0000000000000000\n"
      expected_output: "ext4 720 1\nbtrfs 1216 0\nxfs 1528 2\nvfat 24 1\next2 84 0"
    - input: "ext\n---\next4 737280 1 - Live 0x0000000000000000\nbtrfs 1245184 0 - Live 0x0000000000000000\nxfs 1564672 2 - Live 0x0000000000000000\nvfat 24576 1 - Live 0x0000000000000000\next2 86016 0 - Live 0x0000000000000000\n"
      expected_output: "ext4 720 1\next2 84 0"
    - input: "btrfs\n---\next4 737280 1 - Live 0x0000000000000000\nbtrfs 1245184 0 - Live 0x0000000000000000\n"
      expected_output: "btrfs 1216 0"
    - input: "xyz\n---\next4 737280 1 - Live 0x0000000000000000\n"
      expected_output: ""
  constraints:
    - "Read from /proc/modules on Linux"
    - "Graceful on macOS (use kextstat)"

- id: "SYS-120"
  title: "File Decompressor"
  description: "Detect compression format (gzip, bzip2, xz, zstd) and decompress a file."
  difficulty: 2
  stdlib_modules: [std.process, std.file, std.path, std.io]
  input_format: "Line 1: compressed file path. Line 2: output file path (or - for stdout)"
  output_format: "Decompressed: N bytes to OUTPUT"
  test_cases:
    - input: "/tmp/test.gz\n/tmp/out.txt"
      expected_output: "Decompressed: N bytes to /tmp/out.txt"
    - input: "/tmp/test.bz2\n-"
      expected_output: "(decompressed content to stdout)"
  constraints:
    - "Auto-detect format by magic bytes, not extension"
    - "Report error if format not recognised"

- id: "SYS-121"
  title: "Watch Command (repeated exec)"
  description: "Run a command repeatedly every N seconds and display output, clearing screen between runs."
  difficulty: 2
  stdlib_modules: [std.process, std.time, std.io]
  input_format: "Line 1: interval_seconds. Line 2: iterations (0=unlimited, use small N for tests). Line 3: command"
  output_format: "--- Run N at TIMESTAMP ---\\n(command output)\\n"
  test_cases:
    - input: "1\n2\ndate"
      expected_output: "--- Run 1 at ... ---\n(date output)\n--- Run 2 at ... ---\n(date output)"
    - input: "0\n1\necho hi"
      expected_output: "ERROR: interval must be > 0"
  constraints:
    - "Do not clear actual terminal; use separator instead"
    - "Show last run's output until next run completes"

- id: "SYS-122"
  title: "Disk I/O Statistics"
  description: "Report per-disk I/O stats: reads/s, writes/s, read_MB/s, write_MB/s, utilisation%."
  difficulty: 3
  stdlib_modules: [std.process, std.file, std.str, std.io, std.time]
  input_format: "Line 1: sample_interval_seconds. Line 2: samples"
  output_format: "disk reads/s writes/s read_MB/s write_MB/s util%"
  test_cases:
    - input: "1\n2"
      expected_output: "(disk stats for each disk, N samples averaged)"
    - input: "0\n1"
      expected_output: "ERROR: interval must be > 0"
  constraints:
    - "Read from /proc/diskstats on Linux"
    - "Use iostat if available"

- id: "SYS-123"
  title: "Network Bandwidth Monitor"
  description: "Report per-interface bytes sent/received per second over a sampling period."
  difficulty: 3
  stdlib_modules: [std.process, std.file, std.str, std.io, std.time]
  input_format: "Line 1: interval_seconds. Line 2: samples"
  output_format: "iface: rx=X.XX MB/s tx=X.XX MB/s"
  test_cases:
    - input: "1\n2"
      expected_output: "(per-interface bandwidth per sample)"
    - input: "0\n1"
      expected_output: "ERROR: interval must be > 0"
  constraints:
    - "Read from /proc/net/dev on Linux or netstat -ib on macOS"
    - "Values to 2 decimal places"

- id: "SYS-124"
  title: "Init System Detector"
  description: "Detect the init system in use (systemd, sysvinit, openrc, launchd, etc.) and report version."
  difficulty: 1
  stdlib_modules: [std.process, std.file, std.io, std.str]
  input_format: "No input"
  output_format: "Init system: NAME version VERSION"
  test_cases:
    - input: ""
      expected_output: "Init system: systemd version ... (or launchd, etc.)"
    - input: "ignored"
      expected_output: "(same)"
  constraints:
    - "Check PID 1 name"
    - "Fall back to 'unknown' if undetected"

- id: "SYS-125"
  title: "File Type Identifier"
  description: "Identify file types using magic bytes (not extension) for a list of files."
  difficulty: 2
  stdlib_modules: [std.file, std.io, std.str]
  input_format: "Lines of file paths"
  output_format: "filepath: TYPE_DESCRIPTION"
  test_cases:
    - input: "/tmp/test.txt"
      expected_output: "/tmp/test.txt: ASCII text"
    - input: "/tmp/image.png"
      expected_output: "/tmp/image.png: PNG image"
  constraints:
    - "Use file command or magic byte detection"
    - "Handle unreadable files with ERROR"

- id: "SYS-126"
  title: "Terminal Size Reporter"
  description: "Report current terminal dimensions (rows, columns) and resize events."
  difficulty: 1
  stdlib_modules: [std.process, std.io]
  input_format: "Line 1: watch_duration_seconds (0=just report once)"
  output_format: "Rows: N Cols: N [then resize events if watching]"
  test_cases:
    - input: "0"
      expected_output: "Rows: N Cols: N"
    - input: "1"
      expected_output: "Rows: N Cols: N (then any resize events)"
  constraints:
    - "Use tput or ioctl TIOCGWINSZ"
    - "Default if not in terminal: Rows: 24 Cols: 80"

- id: "SYS-127"
  title: "Temporary Directory Manager"
  description: "Create and track named temporary directories with automatic cleanup on exit or after a timeout."
  difficulty: 2
  stdlib_modules: [std.file, std.path, std.time, std.io]
  input_format: "Lines of: CREATE name ttl_seconds | LIST | CLEANUP"
  output_format: "CREATE: /tmp/managed/name. LIST: name path created_at ttl. CLEANUP: Removed N directories."
  test_cases:
    - input: "CREATE mywork 60\nLIST\nCLEANUP"
      expected_output: "/tmp/managed/mywork\nmywork ...(list)\nRemoved 0 directories."
    - input: "CREATE old 0\nCLEANUP"
      expected_output: "/tmp/managed/old\nRemoved 1 directories."
  constraints:
    - "TTL=0 means already expired"
    - "Persist state between invocations via JSON file"

- id: "SYS-128"
  title: "Stdin Hex Patcher"
  description: "Apply hex patches (offset:hex_bytes) to a binary file, writing patched output."
  difficulty: 3
  stdlib_modules: [std.file, std.io, std.str]
  input_format: "Line 1: input file (or - for stdin). Line 2: output file (or - for stdout). Remaining: OFFSET:HEXBYTES"
  output_format: "Patched N bytes at M offsets. Output written to PATH."
  test_cases:
    - input: "/tmp/test.bin\n/tmp/patched.bin\n0:4865\n2:6c6c6f"
      expected_output: "Patched 5 bytes at 2 offsets. Output written to /tmp/patched.bin."
    - input: "/tmp/test.bin\n/tmp/p.bin\n9999:ff"
      expected_output: "ERROR: offset 9999 out of range (file is N bytes)"
  constraints:
    - "Hex bytes as continuous string (no spaces)"
    - "Reject patches beyond file end"

- id: "SYS-129"
  disabled: true
  disabled_reason: "[107-R1-phase-2/unfixable] The spec requires reading actual system mount state (/proc/mounts or mount command), which is non-deterministic across environments and depends on system state "
  disabled_at: "2026-05-31"
  disabled_by: "107-R1"
  title: "Mount Point Analyser"
  description: "List all mount points, their filesystem type, options, and read/write status."
  difficulty: 2
  stdlib_modules: [std.process, std.file, std.str, std.io]
  input_format: "No input"
  output_format: "device on mountpoint type FSTYPE (OPTIONS)"
  test_cases:
    - input: ""
      expected_output: "(at least rootfs entry)"
    - input: "ignored"
      expected_output: "(same)"
  constraints:
    - "Read from /proc/mounts on Linux or mount on macOS"
    - "Include rw/ro status in options"

- id: "SYS-130"
  title: "System Entropy Reporter"
  description: "Report the current entropy pool size and entropy available from /dev/random. Warn if low."
  difficulty: 1
  stdlib_modules: [std.file, std.process, std.io]
  input_format: "No input"
  output_format: "Entropy available: N bits\\nEntropy pool: N bits\\n[WARNING: low entropy if < 256 bits]"
  test_cases:
    - input: ""
      expected_output: "Entropy available: N bits\nEntropy pool: N bits"
    - input: "ignored"
      expected_output: "(same)"
  constraints:
    - "Read from /proc/sys/kernel/random/entropy_avail on Linux"
    - "Use sysctl kern.random on macOS"
