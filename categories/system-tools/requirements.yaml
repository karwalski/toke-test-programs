  output_format: "Template with all ${VAR}/$VAR replaced by their values (or empty string if unset)"
  test_cases:
    - input: "-\n-\nHello ${USER}, welcome!\nUSER=$USER"
      expected_output: "Hello alice, welcome!\nUSER=alice"
