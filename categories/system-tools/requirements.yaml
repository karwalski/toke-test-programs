    - "Hash each file with SHA-256"

- id: "SYS-031"
  title: "Log Parser"
  description: "Parse common log formats (Apache/Nginx combined, syslog) and extract fields into structured output."
  difficulty: 3
  stdlib_modules: [std.io, std.str, std.json]
  input_format: "Line 1: format (apache|syslog). Remaining lines: log entries."
  output_format: "JSON object per line with extracted fields"
  test_cases:
