  difficulty: 2
  stdlib_modules: [std.io, std.str, std.time]
  input_format: "Line 1: min_level (DEBUG|INFO|WARN|ERROR). Line 2: keyword (or empty). Remaining: log lines."
  output_format: "Matching log lines verbatim"
  test_cases:
