      expected_output: "{\"host\":\"127.0.0.1\",\"user\":\"frank\",\"method\":\"GET\",\"path\":\"/index.html\",\"status\":200,\"bytes\":2326}"
    - input: "syslog\nJan  1 00:00:00 host kernel: message here"
      expected_output: "{\"month\":\"Jan\",\"day\":1,\"time\":\"00:00:00\",\"host\":\"host\",\"program\":\"kernel\",\"message\":\"message here\"}"
  constraints:
