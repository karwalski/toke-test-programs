  input_format: "Line 1: directory. Line 2: command (snapshot|diff). For diff: Line 3: previous snapshot file."
  output_format: "snapshot: Snapshot saved to FILE (N files). diff: ADDED/MODIFIED/DELETED filepath per change."
  test_cases:
