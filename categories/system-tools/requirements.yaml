      expected_output: "04164106\n88550225"
    - input: "12\nalpha\n4\n7\n"
      expected_output: "ujzPdeIgxLdG\nncfBAepfJBdK\nhoOOLdKLzdoc\nJisAjIhKtJRl"
    - input: "10\nalnum\n2\n999\n"
      expected_output: "YRf53KKIFE\ni4ZPuPYP20"
