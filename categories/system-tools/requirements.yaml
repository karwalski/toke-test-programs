      expected_output: "2026-01-01 ERROR boom"
    - input: "INFO\nfoo\n2026-01-01 INFO foo bar\n2026-01-01 INFO baz"
      expected_output: "2026-01-01 INFO foo bar"
  constraints:
    - "Level hierarchy: DEBUG < INFO < WARN < ERROR"
    - "Keyword match is case-insensitive substring"

- id: "SYS-033"
