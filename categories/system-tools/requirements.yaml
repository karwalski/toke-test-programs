  difficulty: 2
  stdlib_modules: [std.env, std.file, std.json, std.io]
  input_format: "Line 1: command (snapshot|restore). Line 2: snapshot file path. For restore: Line 3: command to run."
  output_format: "snapshot: Saved N variables to PATH. restore: Running CMD with restored environment."
  test_cases:
    - input: "snapshot\n/tmp/env.json"
      expected_output: "Saved N variables to /tmp/env.json"
    - input: "restore\n/tmp/env.json\nprintenv MY_VAR"
      expected_output: "(value of MY_VAR from snapshot)"
  constraints:
    - "Snapshot as JSON object"
    - "Merge restored vars with current environment"

