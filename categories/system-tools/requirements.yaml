      expected_output: "file1.log:2:error: disk full\nfile1.log:5:another error here"
    - input: "TODO\n---\nsrc/main.py|src/utils.py|README.md\n# main.py\ndef foo():\n    # TODO: implement\n    pass\n--FILE--\n# utils.py\ndef bar():\n    return 42\n# TODO refactor\n--FILE--\n# README\nNo todos here\n---\nyes"
      expected_output: "src/main.py:3:    # TODO: implement\nsrc/utils.py:4:# TODO refactor"
