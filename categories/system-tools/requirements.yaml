  input_format: "Line 1: JSON file path. Subsequent lines: KEY TYPE (string|int|bool|array|object)"
  output_format: "OK key | MISSING key | WRONG_TYPE key (expected TYPE got TYPE)"
  test_cases:
    - input: "/tmp/config.json\nhost string\nport int"
      expected_output: "OK host\nOK port"
    - input: "/tmp/config.json\nmissing_key string"
      expected_output: "MISSING missing_key"
  constraints:
    - "Report all errors, not just first"
    - "Nested keys with dot notation (e.g. server.port)"

- id: "SYS-034"
  title: "Environment Variable Expander"
