id: "CAT-NNN"
title: "Short descriptive title"
description: "What the program should do, in detail"
category: "games"
difficulty: 3  # 1-5
stdlib_modules:
  - std.io
  - std.str
input_format: "stdin: one integer per line"
output_format: "stdout: result as single integer"
test_cases:
  - input: "5\n"
    expected_output: "120\n"
  - input: "0\n"
    expected_output: "1\n"
constraints:
  - "Must read from stdin, not hardcoded"
  - "Must handle edge cases (0, negative)"
companion_notes: "Explain the algorithm choice and complexity"
